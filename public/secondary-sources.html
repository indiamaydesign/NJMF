the design of computer-based systems include:\n1. A clear distinction based on negotiations between union and management roles in the design process is not in opposition to, but a prerequisite for\ncooperation and the democratization of decision making in the work organization.\n2. The design and use of computer-based systems requires new trade union activities .\n3. The most important prerequisite for trade union participation in the design process is a parallel and independent process of accumulation of knowledge\non the part of the union.\n4. Local unions need external resources and support in their design activities.\n5. A local trade union strategy has to be based on solidarity between the different groups of workers involved--a solidarity that goes beyond the traditional\ndivision of labor in the labor process and the traditional jurisdictions between the unions involved.\nSome speciﬁc lessons on national trade union support for democratization of the design and use of computer-based systems include:\n1. Today's computer-based systems often restrict the ability of trade unions to reach local objectives, especially with respect to skill but also with respect to\nwork organization. 2. However, it is possible to design computer-based technology based on criteria such as skill and democracy at work.\n3. National trade unions must inﬂuence the process of research and development of new technology to change the supply of technological and\norganizational solutions.\n4. Equally important is a trade union strategy to inﬂuence the demand for these technological and organizational alternatives.\n5. National trade unions must provide training with a trade union perspective on the design and use of computer artifacts, and inﬂuence the supply of\nprofessional training for skilled work.\n6. A strategy like the new Scandinavian model for research and technological development--focusing on a new form of cooperation among governments,\ntrade unions, and high tech industry in the production of new technology that supports good working conditions and good use quality products and\nservices--is a promising approach to support more democratic design and use of computer-based systems.", "snippet": "The UTOPIA Project Although growing, the extent and impact of research on designing for democratization in NJMF, DEMOS and similar projects did not meet initial expectations. It se"}, {"page": null, "stem": "ehn-6", "section": "Towards a Philosophical Foundation", "text": "TOWARDS A PHILOSOPHICAL FOUNDATION FOR SKILL-BASED PARTICIPATORY DESIGN\nThis paper does not argue for a reinvention of the wheel. The instrumental power of systems thinking for purposive rational action is beyond doubt. Many of the\ncomputer applications that function well today could not have been designed without rational methods. Instead, I suggest a reinterpretation of design methods to\ntake us beyond the deeply embedded Cartesian mind-body dualism and beyond the limits of formalization towards an understanding that supports more creative\nways of thinking and doing design as participatory work (involving the skills of both users and designers).\nEfforts to pursue such a rethinking of the design of computer-based systems and to develop a new practice of design are now emerging within computer science.\nOne important example is a new orientation in software engineering proposed by Christiane Floyd (1987). It is based on a dissatisfaction with \"anomalies\" in the\nproduct-oriented view of software engineering that treats computer programs as formal mathematical objects derived by formalized procedures from an abstract\nspeciﬁcation. Floyd argues that the product-oriented view leaves the relationship between programs and the living human world entirely unexplored, providing\nno way to check the relevance of the speciﬁcation or to accommodate learning and communication.\n\nAs a remedy to these anomalies, Floyd sees a new process-oriented paradigm in software engineering with a focus on human learning and communication in\nboth the use and development of the software. She views the products of this process as tools or working environments for people and not as pieces code or an\nabstract software system. Hence, the quality of the product depends on its relevance, suitability, or adequacy in practical use. Quality cannot be reduced to\nfeatures of the product such as reliability and efﬁciency. From this perspective, prototyping can be seen as an alternative or complement to traditional, more\nformalized, and detached descriptions.\nAnother important example of new tendencies in the design of computer-based systems is the development of a new philosophical foundation in the tradition of\nhermeneutics and phenomenology proposed by Hubert and Stuart Dreyfus (1986) and Terry Winograd and Fernando Flores (1986). This philosophical endeavor\nfocuses on the differences between human activity and computer performance. In doing so, it departs from other traditions by focusing on what people do with\ncomputers, how in cooperation with one another they use computers, and what they might do better with computers. In this approach, the origin of design is in\ninvolved practical use and understanding, not detached reﬂection, and design is seen as an interaction between understanding and creation. This research aims\nnot to create just another design method but to create a new foundation for a science of design.\nIn the following, I will propose that this new understanding can be buttressed by an awareness of language games and the ordinary language philosophy of\nLudwig Wittgenstein. My focus is on the shift in design from language as description towards language as action.\nRethinking Systems Descriptions\nA few years ago I was struck by something I had not noticed before. While thinking about how perspectives make us select certain aspects of reality as important\nin a description, I realized I had completely overlooked my own presumption that descriptions in one way or another are mirror images of a given reality. My\nearlier reasoning had been that because there are different interests in the world, we should always question the objectivity of design choices that claimed to ﬂow\nfrom design as a process of rational decision making. Hence, I had argued that we needed to create descriptions from different perspectives in order to form a\ntruer picture. I did not, however, question the Cartesian epis ontology of an inner world of experiences (mind) and an outer world of objects (external reality).\nNor did I question the assumption that language was our way of mirroring this outer world of real objects. By focusing on which objects and which relations\nshould be represented in a systems description, I took for granted the Cartesian mind-body dualism that Wittgenstein had so convincingly rejected in\nPhilosophical Investigations (1953). Hence, although my purpose was the opposite, my perspective blinded me to the subjectivity of craft, artistry, passion, love,\nand care in the system descriptions.\nOur experiences with the UTOPIA project caused me to re-examine my philosophical assumptions. Working with the end users of the design, the graphics\nworkers, some design methods failed while others succeeded. Requirement speciﬁcations and systems descriptions based on information from interviews were\nnot very successful. Improvements came when we made joint visits to interesting plants, trade shows, and vendors and had discussions with other users; when\nwe dedicated considerably more time to learning from each other, designers from graphics workers and graphics workers from designers; when we started to use\ndesign-by-doing methods and descriptions such as mockups and work organization games; and when we started to understand and use traditional tools as a\ndesign ideal for computer-based systems.\nThe turnaround can be understood in the light of two Wittgensteinian lessons. The ﬁrst is not to underestimate the importance of skill in design. As Peter Winch\n(1958) has put it, \"A cook is not a man who ﬁrst has a vision of a pie and then tries to make it. He is a man skilled in cookery, and both his projects and his\nachievements spring from that skill.\" The second is not to mistake the role of description methods in design: Wittgenstein argues convincingly that what a picture\ndescribes is determined by its use.\n\nIn the following I will illustrate how our \"new\" UTOPIAN design methods may be understood from a Wittgensteinian position, that is, why design-by-doing and\na skill-based participatory design process works. More generally, I will argue that design tools such as models, prototypes, mockups, descriptions, and\nrepresentations act as reminders and paradigm cases for our contemplation of future computer-based systems and their use. Such design tools are effective\nbecause they recall earlier experiences to mind. It is in this sense that we should understand them as representations. I will begin with a few words on practice,\nthe alternative to the \"picture theory of reality\".\nPractice is Reality\nPractice as the social construction of reality is a strong candidate for replacing the picture theory of reality. In short, practice is our everyday practical activity. It\nis the human form of life. It precedes subject-object relations. Through practice, we produce the world, both the world of objects and our knowledge about this\nworld. Practice is both action and reﬂection. But practice is also a social activity; it is produced in cooperation with others. To share practice is also to share an\nunderstanding of the world with others. However, this production of the world and our understanding of it takes place in an already existing world. The world is\nalso the product of former practice. Hence, as part of practice, knowledge has to be understood socially--as producing or reproducing social processes and\nstructures as well as being the product of them (Kosik, 1967; Berger & Luckmann, 1966).\nAgainst this background, we can understand the design of computer applications as a concerned social- and historical-conditioned activity in which tools and\ntheir use are envisioned. This is an activity and form of knowledge that is both planned and creative.\nOnce struck by the \"naive\" Cartesian presumptions of a picture theory, what can be gained in design by shifting focus from the correctness of descriptions to\nintervention into practice? What does it imply to take the position that what a picture describes is determined by its use? Most importantly, it sensitizes us to the\ncrucial role of skill and participation in design, and to the opportunity in practical design to transcend some of the limits of formalization through the use of more\naction-oriented design artifacts.\nLanguage as Action\nThink of the classical example of a carpenter and his or her hammering activity. In the professional language of carpenters, there are not only hammers and nails.\nIf the carpenter were making a chair, other tools used would include a draw-knife, a brace, a trying plane, a hollow plane, a round plane, a bow-saw, a marking\ngauge, and chisels (Seymour, 1984). The materials that he works with are elm planks for the seats, ash for the arms, and oak for the legs. He is involved in\nsaddling, making spindles, and steaming.\nAre we as designers of new tools for chairmaking helped by this labeling of tools, materials, and activities? In a Wittgensteinian approach the answer would be;\nonly if we understand the practice in which these names make sense. To label our experiences is to act deliberately. To label deliberately, we have to be trained to\ndo so. Hence, the activity of labeling has to be learned. Language is not private but social. The labels we create are part of a practice that constitutes social\nmeaning. We cannot learn without learning something speciﬁc. To understand and to be able to use is one and the same (Wittgenstein, 1953). Understanding the\nprofessional language of chairmaking, and any other language-game (to use Wittgenstein's term), is to be able to master practical rules we did not create\nourselves. The rules are techniques and conventions for chairmaking that are an inseparable part of a given practice.\nTo master the professional language of chairmaking means to be able to act in an effective way together with other people who know chairmaking. To \"know\"\ndoes not mean explicitly knowing the rules you have learned, but rather recognizing when something is done in a correct or incorrect way. To have a concept is\nto have learned to follow rules as part of a given practice. Speech acts are, as a unity of language and action, part of practice. They are not descriptions but\n\nBelow I will elaborate on language-games, focusing on the design process descriptions in design, design artifacts, and knowledge in the design of computer\napplications.\nLanguage Games\nTo use language is to participate in language-games. In discussing how we in practice follow (and sometimes break) rules as a social activity, Wittgenstein asks\nus to think of games, how they are made up and played. We often think of games in terms of a playful, pleasurable engagement. I think this aspect should not be\ndenied, but a more important aspect for our purpose here is that games are activities, as are most of the common language-games we play in our ordinary\nlanguage.\nLanguage-games, like the games we play as children, are social activities. To be able to play these games, we have to learn to follow rules, rules that are socially\ncreated but far from always explicit. The rule-following behavior of being able to play together with others is more important to a game than the speciﬁc explicit\nrules. Playing is interaction and cooperation. To follow the rules in practice means to be able to act in a way that others in the game can understand. These rules\nare embedded in a given practice from which they cannot be distinguished. To know them is to be able to \"embody\" them, to be able to apply them to an open\nclass of cases.\nWe understand what counts as a game not because we have an explicit deﬁnition but because we are already familiar with other games. There is a kind of family\nresemblance between games. Similarly, professional language-games can be learned and understood because of their family resemblance to other languagegames that we know how to play.\nLanguage games are performed both as speech acts and as other activities, as meaningful practice within societal and cultural institutional frameworks. To be\nable to participate in the practice of a speciﬁc language-game, one has to share the form of life within which that practice is possible. This form of life includes\nour natural history as well as the social institutions and traditions into which we are born. This condition precedes agreed social conventions and rational\nreasoning. Language as a means of communication requires agreement not only in deﬁnitions, but also in judgments. Hence, intersubjective consensus is more\nfundamentally a question of shared background and language than of stated opinions (Wittgenstein., 1953).\nThis deﬁnition seems to make us prisoners of language and tradition, which is not really the case. Being socially created, the rules of language games, like those\nof other games, can also be socially altered. There are, according to Wittgenstein, even games in which we make up and alter the rules as we go along. Think of\nsystems design and use as language games. The very idea of the interventionistic design language-game is to change the rules of the language-game of use in a\nproper way.\nThe idea of language-games entails an emphasis on how we linguistically discover and construct our world. However, language is understood as our use of it, as\nour social, historic, and intersubjective application of linguistic artifacts. As I see it, the language-game perspective therefore does not preclude consideration of\nhow we also come to understand the world by use of other tools.\nTools and objects play a fundamental role in many language-games. A hammer is in itself a sign of what one can do with it in a certain language-games. And so\nis a computer application. These signs remind one of what can be done with them. In this light, an important aspect in the design of computer applications is that\nits signs remind the users of what they can do with the application in the language-games of use (Brock, 1986). The success of \"what-you-see-is-what-you-get\"\nand \"direct manipulation\" user interfaces does not have to do with how they mirror reality in a more natural way, but with how they provide better reminders of\nthe users' earlier experiences (B0dker, forthcoming). This is also, as will be discussed in the following, the case with the tools that we use in the design process.", "snippet": "TOWARDS A PHILOSOPHICAL FOUNDATION FOR SKILL-BASED PARTICIPATORY DESIGN This paper does not argue for a reinvention of the wheel. The instrumental power of systems thinking for pur"}, {"page": null, "stem": "ehn-7", "section": "Knowledge and Design Artifacts", "text": "Knowledge and Design Artifacts\nAs designers we are involved in reforming practice, in our case typically computer-based systems and the way people use them. Hence, the language-games of\ndesign change the rules for other language-games, in particular those of the application's use. What are the conditions for this interplay and change to operate\neffectively?\nA common assumption behind most design approaches seems to be that the users must be able to give complete and explicit descriptions of their demands.\nHence, the emphasis is on methods to support this elucidation by means of requirement speciﬁcations or system descriptions (Jackson, 1983; Yourdon, 1982).\nIn a Wittgensteinian approach, the focus is not on the \"correctness\" of systems descriptions in design, on how well they mirror the desires in the mind of the\nusers, or on how correctly they describe existing and future systems and their use. Systems descriptions are design artifacts. In a Wittgensteinian approach, the\ncrucial question is how we use them, that is, what role they play in the design process.\nThe rejection of an emphasis on the \"correctness\" of descriptions is especially important. In this, we are advised by the author of perhaps the strongest arguments\nfor a picture theory and the Cartesian approach to design--the young Wittgenstein in Tractatus Logico-Philosophicus (1923). The reason for this rejection is the\nfundamental role of practical knowledge and creative rule following in language-games.\nNevertheless, we know that systems descriptions are useful in the language-game of design. The new orientation suggested in a Wittgensteinian approach is that\nwe see such descriptions as a special kind of artifact that we use as \"typical examples\" or \"paradigm cases.\" They are not models in the sense of Cartesian mirror\nimages of reality (Nordenstam, 1984). In the language-game of design, we use these tools as reminders for our reﬂection on future computer applications and\ntheir use. By using such design artifacts, we bring earlier experiences to mind, and they bend our way of thinking of the past and the future. I think that this is\nwhy we should understand them as representations (Kaasb011, forthcoming). And this is how they inform our practice. If they are good design\nartifacts, they will support good moves within a speciﬁc design language- game.\nThe meaning of a design artifact is its use in a design language-game, not how it \"mirrors reality.\" Its ability to support such use depends on the kinds of\nexperience it evokes, its family resemblance to tools that the participants use in their everyday work activity. Therein lies a clue to why the breakthrough in the\nUTOPIA project was related to the use of prototypes and mockups. Since the design artifacts took the form of reminders or paradigm cases, they did not merely\nattempt to mirror a given or future practice linguistically. They could be experienced through the practical use of a prototype or mockup. This experience could\nbe further reﬂected upon in the language-game of design, either in ordinary language or in an artiﬁcial one.\nA good example from the UTOPIA project is an empty cardboard box with \"desktop laser printer\" written on the top. There is no functionality in this mockup.\nStill, it works very well in the design game of envisioning the future work of makeup staff. It reminded the participating typographers of the old \"proof machine\"\nthey used to work with in lead technology. At the same time, it suggested that with the help of new technology, the old proof machine could be reinvented and\nenhanced.\nThis design language-game was played in 1982. At that time, desktop laser printers only existed in advanced research laboratories, and certainly typographers\nhad never heard of them. To them, the idea of a cheap laser printer was \"unreal . \"\nIt was our responsibility as professional designers to be aware of such future possibilities and to suggest them to the users. It was also our role to suggest this\ntechnical and organizational solution in such a way that the users could experience and envision what it would mean in their practical work, before the\n\ninvestment of too much time, money, and development work. Hence, the design game with the mockup laser printer. The mockup made sense to all participants--\nusers and designers (Ehn & Kyng, 1991).\nThis focus on nonlinguistic design artifacts is not a rejection of the importance of linguistic ones. Understood as triggers for our imagination rather than as\nmirror images of reality, they may well be our most wonderful human inventions. Linguistic design artifacts are very effective when they challenge us to tell\nstories that make sense to all participants.\nPractical Understanding and Propositional Knowledge\nThere are many actions in a language-game, not least in the use of prototypes and mockups, that cannot be explicitly described in a formal language. What is it\nthat the users know, that is, what have they learned that they can express in action, but not state explicitly in language? Wittgenstein (1953) asks us to \"compare\nknowing and saying: how many feet high Mont Blanc is--how the word 'game' is used--how a clarinet sounds. If you are surprised that one can know something\nyou are perhaps thinking of a case like the ﬁrst Certainly not of one of the third.\"\nIn the UTOPIA project, we were designing new computer applications to be used in typographical page makeup. The typographers could tell us the names of the\ndifferent tools and materials that they use such as knife, page ground, body text, galley, logo, halftone, frame, and spread. They could also tell when, and perhaps\nin which order, they use speciﬁc tools and materials to place an article. For example, they could say, \"First you pick up the body text with the knife and place it\nat the bottom of the designated area on the page ground. Then you adjust it to the galley line. When the body text ﬁts you get the headline, if there is not a\npicture,\" and so forth. What 1, as designer, get to know from such an account is equivalent to knowing the height of Mont Blanc. What I get to know is very\ndifferent from the practical understanding of really making up pages, just as knowing the height of Mont Blanc gives me very little of understanding the practical\nexperience of climbing the mountain.\nKnowledge of the ﬁrst kind has been called propositional knowledge. It is what you have \"when you know that something is the case and when you also can\ndescribe what you know in so many words\" (Nordenstam, 1985). Propositional knowledge is not necessarily more reﬂective than practical understanding. It\nmight just be something that I have been told, but of which I have neither practical experience nor theoretical understanding.\nThe second case, corresponding to knowing how the word game is used, was more complicated for our typographers. How could they, for example, tell us the\nskill they possess in knowing how to handle the knife when making up the page in pasteup technology? This is their practical experience from the languagegames of typographic design. To show it, they have to do it.\nAnd how should they relate what counts as good layout, the complex interplay of presence and absence, light and dark, symmetry and asymmetry, uniformity\nand variety? Could they do it in any other way than by giving examples of good and bad layouts, examples that they have learned by participating in the games\nof typographical design? As in the case of knowing how a clarinet sounds, this is typically sensuous knowing by familiarity with earlier cases of how something\nis, sounds, smells, and so on.\nPractical understanding--in the sense of practical experience from doing something and having sensuous experiences from earlier cases--deﬁes formal\ndescription. If it were transformed into propositional knowledge, it would become something totally different.\nIt is hard to see how we as designers of computer systems for page makeup could manage to come up with useful designs without understanding how the knife is\nused or what counts as good layout. For this reason we had to have access to more than what can be stated as explicit propositional knowledge. We could only\n\nachieve this understanding by participating to some extent in the language-games of use of the typographical tools. Hence, participation applies not only to users\nparticipating in the language-game of design, but perhaps more importantly to designers participating in use. Some consequences of this position for organizing\ndesign language-games will be discussed in the following.\nRule Following and Tradition\nNow, I turn to the paradox of rule-following behavior. As mentioned, many rules that we follow in practice can scarcely to be distinguished from the behavior in\nwhich we perform them. We do not know that we have followed a rule until we have done it. The most important rules we follow in skillful performance defy\nformalization, but we still understand them. As Michael Polanyi (1973), the philosopher of tacit knowledge, has put it: \"It is pathetic to watch the endless efforts-\n-equipped with microscopy and chemistry, with mathematics and electronics--to reproduce a single violin of the kind the half-literate Stradevarius turned out as a\nmatter of routine more than 200 years ago.\" This is the traditional aspect of human rule-following behavior. Polanyi points out that what may be our most widely\nrecognized, explicit, rule-based system--the practice of Common Law--also uses earlier examples as paradigm cases. Says Polanyi, \"[Common Law] recognizes\nthe principle of all traditionalism that practical wisdom is more truly embodied in action than expressed in the rules of action.\" According to Polanyi this is also\ntrue for science, no matter how rationalistic and explicit it claims to be: \"While the articulate contents of science are successfully taught all over the world in\nhundreds of new universities, the unspeciﬁable art of scientiﬁc research has not yet penetrated to many of these.\" The art of scientiﬁc research deﬁes complete\nformalization; it must be learned partly by examples from a master whose behavior the student trusts.\nInvolving skilled users in the design of new computer application when their old tools and working habits are redesigned is an excellent illustration of Polanyi's\nthesis. If activities that have been under such pressure for formalization as Law and Science are so dependent on practical experience and paradigm cases, why\nshould we expect other social institutions that have been under less pressure of formalization to be less based on practical experience, paradigm cases, and tacit\nknowledge?", "snippet": "Knowledge and Design Artifacts As designers we are involved in reforming practice, in our case typically computer-based systems and the way people use them. Hence, the language-gam"}, {"page": null, "stem": "ehn-8", "section": "Rule Following and Transcendence", "text": "Rule Following and Transcendence\nIf design is rule-following behavior, is it also creative transcendence of traditional behavior. Again, this is what is typical of skillful human behavior, and is\nexactly what deﬁes precise formalization. Through mastery of the rules comes the freedom to extend them. This creativity is based on the open-textured\ncharacter of rule-following behavior. To begin with, we learn to follow a rule as a kind of dressage, but in the end we do it as creative activity (Dreyfus &\nDreyfus, 1986). Mastery of the rules puts us in a position to invent new ways of proceeding. As the Wittgenstein commentator Alan Janik has put it: \"There is\nalways and ineliminably the possibility that we can follow the rule in a wholly unforeseen way. This could not happen if we had to have an explicit rule to go on\nfrom the start . . . the possibility of radical innovation is, however, the logical limit of description. This is what tacit knowledge is all about\" (Janik, 1988). This is\nwhy we need a strong focus on skill both in design and in the use of computer systems. We focus on existing skills, not at to inhibit creative transcendence, but\nas a necessary condition for it.\nBut what is the role of \"new\" external ideas and experiences in design? How are tradition and transcendence united in a Wittgensteinian approach? It could, I\nbelieve, mean utilizing something like Berthold Brecht's theatrical \"alienation\" effect Verfremdungse~fek~ to highlight transcendental untried possibilities in the\neveryday practice by presenting a well-known practice in a new light: \"the aspects of things that are most important to us are hidden because of their simplicity\nand familiarity\" (Wittgenstein, 1953). However, as Peter Winch (1958, p. 119) put it, in a Wittgensteinian approach: \"the only legitimate use of such a\nVerfremdungseffekt is to draw attention to the familiar and obvious, not to show that it is dispensable from our understanding.\"\n\nDesign artifacts, linguistic or not, may in a Wittgensteinian approach certainly be used to break down traditional understanding, but they must make sense in the\nusers' ordinary language-games. If the design tools are effective, it is because they help users and designers to see new aspects of an already wellknown practice, not because they convey such new ideas. It is I think fair to say that this focus on traditional skill in interplay with design skill may be a\nhindrance to really revolutionary designs. The development of radically new designs might require leveraging other skills and involving other potential users.\nFew designs, however, are really revolutionary, and for normal everyday design situations, the participation of traditionally skilled users is critical to the quality\nof the resulting product.\nThe tension between tradition and transcendence is fundamental to design. There can be a focus on tradition or transcendence in the systems being created.\nShould a word processor be designed as an extension of the traditional typewriter or as something totally new? Another dimension is professional competence:\nShould one design for the \"old\" skills of typographers or should new knowledge replace those skills in future use? Or again, with the division of labor and\ncooperation: Should the new design support the traditional organization in a composing room or suggest new ways of cooperation between typographers and\njournalists? There is also the tension between tradition and transcendence in the goods or services to be produced using the new system: Should the design\nsupport the traditional graphical production or completely new services, such as desktop publishing?\nTradition and transcendence, that is the dialectical foundation of design.\nDesign by Doing: New \"Rules of the Game\"\nWhat do we as designers have to do to qualify as participants in the language-games of the users? What do users have to learn to qualify as participants in the\nlanguage-game of design? And what means can we develop in design to facilitate these learning processes?\nIf designers and users share the same form of life, it should be possible to overcome the gap between the different language-games. It should, at least in\nprinciple, be possible to develop the practice of design to the point where there is enough family resemblance between a speciﬁc language-game of the users and\nthe language-games in which the designers of the computer application are intervening. A mediation should be possible.\nBut what are the conditions required to establish this mediation? For Wittgenstein, it would make no sense to ask this question outside a given form of life: \"If a\nlion could talk, we could not understand him\" (1953). In the arguments below, I have assumed that the conditions for a common form of life are possible to\ncreate, that the lions and sheep of industrial life, as discussed in the ﬁrst part of this chapter, can live together. This is more a normative standpoint of how design\nought to be, a democratic hope rather than a reﬂection on current political conditions.\nTo develop the competence required to participate in a language-game requires a lot of learning within that practice. But, in the beginning, all one can\nunderstand is what one has already understood in another language-game. If we understand anything at all, it is because of the family resemblance between the\ntwo language-games.\nWhat kind of design tools could support this interplay between language-games? I think that what we in the UTOPIA project called design-by-doing methods--\nprototyping, mockups, and scenarios--are good candidates. Even joint visits to workplaces, especially ones similar to the ones being designed for, served as a\nkind of design tool through which designers and users bridged their language-games.\nThe language-games played in design-by-doing can be viewed both from the point of view of the users and of the designers. This kind of design becomes a\nlanguage-game in which the users learn about possibilities and constraints of new computer tools that may become part of their ordinary language-games. The\n\ndesigners become the teachers that teach the users how to participate in this particular language-game of design. However, to set up these kind of languagegames, the designers have to learn from the users.\nHowever, paradoxical as it sounds, users and designers do not have to understand each other fully in playing language-games of design-by-doing together.\nParticipation in a language-game of design and the use of design artifacts can make constructive but different sense to users and designers. Wittgenstein (1953)\nnotes that \"when children play at trains their game is connected with their knowledge of trains. It would nevertheless be possible for the children of a tribe\nunacquainted with trains to learn this game from others, and to play it without knowing that it was copied from anything. One might say that the game did not\nmake the same sense as to us.\" As long as the language-game of design is not a nonsense activity to any participant but a shared activity for better understanding\nand good design, mutual understanding may be desired but not really required.\nUser Participation and Skill\nThe users can participate in the language-game of design because the application of the design artifacts gives their design activities a family resemblance with\nthe language-games that they play in ordinary use situations. An example from the UTOPIA project is a typographer sitting at a mockup of a future workstation\nfor page makeup, doing page makeup on the simulated future computer tool.\nThe family resemblance is only one aspect of the methods. Another aspect involves what can be expressed. In design-by-doing, the user is able to express both\npropositional knowledge and practical understanding. Not only could, for example, the typographer working at the mockup tell that the screen should be bigger\nto show a full page spread--something important in page makeup--he could also show what he meant by \"cropping a picture\" by actually doing it as he said it. It\nwas thus possible for him to express his practical understanding, his sensuous knowledge by familiarity. He could, while working at the mockup, express the fact\nthat when the system is designed one way he can get a good balanced page, but not when it is designed another way.\nDesigner Participation and Skill\nFor us as designers, it was possible to express both propositional knowledge and practical understanding about design and computer systems. Not only could we\nexpress propositional knowledge such as \"design-by-doing design tools have many advantages as compared with traditional systems descriptions\" or \"bit-map\ndisplays bigger than 22 inches and with a resolution of more than 2000 x 2000 pixels are very expensive,\" but in the language-game of design-by-doing, we\ncould also express practical understanding of technical constraints and possibilities by \"implementing\" them in the mockup, prototype, simulation, or\nexperimental situation. Simulations of the user interface were also important in this language-game of design.\nAs designers, our practical understanding will mainly be expressed in the ability to construct speciﬁc language-games of design in such a way that the users can\ndevelop their understanding of future use by participating in design processes.\nAs mentioned above, there is a further important aspect of language-games: We make up the rules as we go along. A skilled designer should be able to assist in\nsuch transcendental rule-breaking activities. Perhaps, this is the artistic competence that a good designer needs.\nTo really learn the language-game of the use activity by fully participating in that language-game is, of course, an even more radical approached for the designer.\nLess radical but perhaps more practical would be for designers to concentrate design activity on just a few language-games of use, and for us to develop a\npractical understanding of useful speciﬁc language-games of design (Ehn & Kyng, 1987). Finally, there seems to be a new role for the designer as the one who\nsets the stage for a shared design language-game that makes sense to all participants.", "snippet": "Rule Following and Transcendence If design is rule-following behavior, is it also creative transcendence of traditional behavior. Again, this is what is typical of skillful human b"}, {"page": null, "stem": "ehn-9", "section": "Lessons on Design, Skill, and Participation", "text": "Some Lessons on Design, Skill, and Participation\nAs in the ﬁrst practice-oriented part of this paper on designing for democracy at work, I end this second philosophically oriented part on skill-based participatory\ndesign with some lessons for work-oriented design.\nGeneral lessons on work-oriented design include:\n1. Understanding design as a process of creating new language-games that have family resemblance with the language-games of both users and designers\ngives us an orientation for doing work-oriented design through skill-based participation--a way of doing design that may help us transcend some of the\nlimits of formalization. Setting up these design language-games is a new role for the designer.\n2. Traditional \"systems descriptions\" are not sufﬁcient in a skill-based participatory design approach. Design artifacts should not be seen primarily as\nmeans for creating true \"pictures of reality,\" but as means to help users and designers discuss and experience current situations and envision future ones.\n3. \"Design-by-doing\" design approaches such as the use of mockups and other prototyping design artifacts make it possible for ordinary users to use their\npractical skill when participating in the design process.\nLessons on skill in the design of computer-based systems include:\n1. Participatory design is a learning process in which designers and users learn from each other.\n2. Besides propositional knowledge, practical understanding is a type of skill that should be taken seriously in a design language-game since the most\nimportant rules we follow in skillful performance are embedded in practice and defy formalization.\n3. Creativity depends on the open-textured character of rule-following behavior, hence a focus on traditional skill is not a drawback to creative\ntranscendence but a necessary condition. Supporting the dialectics between tradition and transcendence is the heart of design.\nLessons on participation in design of computer-based systems include:\n1 . Really participatory design requires a shared form of life--a shared social and cultural background and a shared language. Hence, participatory design\nmeans not only users participating in design but also designers participating in use. The professional designer will try to share practice with the users.\n2. To make real user participation possible, a design language-game must be set up in such a way that it has a family resemblance to language-games the\nusers have participated in before. Hence, the creative designer should be concerned with the practice of the users in organizing the design process, and\nunderstand that every new design language-game is a unique situated design experience. There is, however paradoxical it may sound, no requirement that\nthe design language-game make the same sense to users and designers. There is only requirement that the designer set the stage for a design languagegame in which participation makes sense to all participants.\nBeyond the Boredom of Design\nGiven the Scandinavian societal, historical, and cultural setting, the ﬁrst part of this chapter focused on the democratic aspect of skill-based participatory design,\nespecially the the important role of local trade unions and their strategies for user participation. In the second part, some ideas inspired by Ludwig Wittgenstein s\nphilosophical investigations were applied to the everyday practice of skill-based participatory design. Practical understanding and family resemblance between\nlanguage-games were presented as fundamental concepts for work-oriented design.\n\nThe concept of language-games is associated with playful activity, but what practical conditions are needed for such pleasurable engagement in design? Is the\nright to democratic participation enough?\nIn fact, the experiences from the work-oriented design projects indicates that most users ﬁnd design work boring, sometimes to the point where they stop\nparticipating. This problem is not unique to the Scandinavian work-oriented design tradition. It has, for example, been addressed by Russell Ackoff (1974), who\nconcluded that participation in design can be only successful if it meets thre conditions: (1) it makes a difference for the participants, (2) implementation of the\nresults is likely, and (3) it is fun.\nThe ﬁrst two points concern the political side of participation in design. Users must have a guarantee that their design efforts are taken seriously. The last point\nconcerns the design process. No matter how much inﬂuence participation may give, it has to transcend the boredom of traditional design meetings to really make\ndesign meaningful and full of involved action. The design work should be playful. In our own later projects, we have tried to take this challenge seriously and\nhave integrated the use of future workshops, metaphorical design, role playing and organizational games into work-oriented design (Ehn & Sjogren, (1991).\nHence, the last lesson from Scandinavian designs is that formal democratic and participatory procedures for designing computer-based systems for democracy at\nwork are not sufﬁcient. Our design language-games must also be organized in a way that makes it possible for ordinary users not only to utilize their practical\nskill in the design work, but also to have fun while doing so.\nACKNOWLEDGMENTS\nThis chapter is reprinted from P. S. Adler and T. A. Winograd (Eds.), Usability: Turning technologies into tools (pp. 96-132). New York: Oxford University\nPress, 1 992.\ngo back to bibliography", "snippet": "Some Lessons on Design, Skill, and Participation As in the ﬁrst practice-oriented part of this paper on designing for democracy at work, I end this second philosophically oriented"}];

const SOURCES = [
  {
    id: 'avtalt-spill',
    title: 'Avtalt Spill',
    sub: 'Trond Bergh (red.) · Gyldendal, 2010',
    chips: ['Emery', 'Thorsrud', 'Bergh', 'LO', 'NHO', 'Nygaard', 'Balstad', 'Johansen'],
    hasImages: true,
    imgBase: 'images/secondary-sources/avtalt-spill-2010-previews/',
    locLabel: 'Avtalt Spill 2010',
    data: AVTALT_DATA
  },
  {
    id: 'afi-history',
    title: 'AFI / OsloMet History',
    sub: 'OSLM/AKT-47 · 1964–2013',
    chips: ['Thorsrud', 'Qvale', 'Gustavsen', 'AFI', 'LO', 'NHO', 'STAMI'],
    hasImages: false,
    data: AFI_DATA
  },
  {
    id: 'ehn-scandinavian-design',
    title: 'Scandinavian Design',
    sub: 'Pelle Ehn · Aarhus University',
    meta: 'In Adler & Winograd (Eds.), Usability. Oxford University Press, 1992',
    chips: ['NJMF', 'DEMOS', 'UTOPIA', 'Thorsrud', 'Nygaard', 'LO', 'SAF', 'MBL', 'Wittgenstein'],
    hasImages: false,
    data: EHN_DATA
  }
];

let currentSourceId = 'avtalt-spill';
let DATA = AVTALT_DATA;
let TOTAL = DATA.length;

// ── Utilities ─────────────────────────────────────────────────────────

function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function reflowText(raw) {
  // Split on blank lines (paragraph breaks), join single newlines within each paragraph into spaces
  return raw
    .split(/\n{2,}/)
    .map(para => para.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim())
    .filter(p => p.length > 0);
}

function highlightText(text, q) {
  const paras = reflowText(text);
  const escaped = paras.map(p => {
    const e = esc(p);
    if (!q) return e;
    const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
    return e.replace(re, m => '<mark>' + esc(m) + '</mark>');
  });
  return escaped.map(p => '<p>' + p + '</p>').join('');
}

// ── Page list ─────────────────────────────────────────────────────────

const listEl = document.getElementById('page-list');
let activeIdx = -1;
let visibleIndices = DATA.map((_, i) => i);

function buildList(q) {
  const ql = (q || '').toLowerCase().trim();
  let shown = 0;
  visibleIndices = [];

  listEl.querySelectorAll('.pl-entry').forEach((el, i) => {
    const entry = DATA[i];
    const searchable = ((entry.page ? 'p. ' + entry.page : '') + ' ' + entry.text).toLowerCase();
    const match = !ql || searchable.includes(ql);
    el.classList.toggle('gone', !match);
    if (match) { shown++; visibleIndices.push(i); }

    const snipEl = el.querySelector('.pl-snip');
    const pnEl   = el.querySelector('.pl-pnum');
    const snipRaw = entry.snippet;
    snipEl.innerHTML = match ? highlightText(snipRaw, q) : esc(snipRaw);
    const pLabel = entry.section || (entry.page ? 'p. ' + entry.page : entry.stem);
    pnEl.innerHTML = match ? highlightText(pLabel, q) : esc(pLabel);
  });

  document.getElementById('page-count').textContent =
    ql ? shown + ' / ' + TOTAL + (TOTAL === 1 ? ' entry' : ' entries') : TOTAL + (TOTAL === 1 ? ' entry' : ' entries');
}

function renderList() {
  listEl.innerHTML = DATA.map((entry, i) => {
    const pLabel = entry.section || (entry.page ? 'p. ' + entry.page : entry.stem);
    return `<div class="pl-entry" data-idx="${i}">
      <div class="pl-pnum">${esc(pLabel)}</div>
      <div class="pl-snip">${esc(entry.snippet)}</div>
    </div>`;
  }).join('');

  listEl.querySelectorAll('.pl-entry').forEach(el => {
    el.addEventListener('click', () => openPage(parseInt(el.dataset.idx, 10)));
  });
}

// ── Zoom / pan ────────────────────────────────────────────────────────

const imgWrap = document.getElementById('img-wrap');
const imgEl   = document.getElementById('page-img');
const zPct    = document.getElementById('zoom-pct');
let zScale = 1, zTx = 0, zTy = 0;
let dragging = false, dSX, dSY, dTx0, dTy0;

function zApply() {
  imgEl.style.transform = `translate(${zTx}px,${zTy}px) scale(${zScale})`;
  zPct.textContent = Math.round(zScale * 100) + '%';
  imgWrap.style.cursor = zScale > 1 ? (dragging ? 'grabbing' : 'grab') : 'default';
}

function zInit() {
  const w = imgWrap.clientWidth, h = imgWrap.clientHeight;
  const iw = imgEl.naturalWidth, ih = imgEl.naturalHeight;
  if (!iw || !ih) return;
  const fit = Math.min(w / iw, h / ih, 1);
  zScale = fit; zTx = (w - iw * fit) / 2; zTy = (h - ih * fit) / 2;
  zApply();
}

function zSet(ns, cx, cy) {
  const w = imgWrap.clientWidth, h = imgWrap.clientHeight;
  if (cx === undefined) { cx = w / 2; cy = h / 2; }
  const c = Math.max(0.15, Math.min(10, ns));
  const r = c / zScale;
  zTx = cx * (1 - r) + zTx * r; zTy = cy * (1 - r) + zTy * r; zScale = c;
  zApply();
}

imgWrap.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = imgWrap.getBoundingClientRect();
  zSet(zScale * (e.deltaY < 0 ? 1.15 : 0.87), e.clientX - rect.left, e.clientY - rect.top);
}, { passive: false });

imgWrap.addEventListener('mousedown', e => {
  if (zScale <= 1) return;
  dragging = true; dSX = e.clientX; dSY = e.clientY; dTx0 = zTx; dTy0 = zTy;
  zApply(); e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  zTx = dTx0 + (e.clientX - dSX); zTy = dTy0 + (e.clientY - dSY); zApply();
});
window.addEventListener('mouseup', () => { dragging = false; zApply(); });

document.getElementById('zoom-in').addEventListener('click',  () => zSet(zScale * 1.25));
document.getElementById('zoom-out').addEventListener('click', () => zSet(zScale * 0.8));
document.getElementById('zoom-reset').addEventListener('click', zInit);

// ── Open page ─────────────────────────────────────────────────────────

const navLabel = document.getElementById('nav-label');
const navPrev  = document.getElementById('nav-prev');
const navNext  = document.getElementById('nav-next');

function openPage(idx) {
  if (idx < 0 || idx >= DATA.length) return;
  activeIdx = idx;
  const entry = DATA[idx];
  const currentQ = document.getElementById('search').value;
  const src = SOURCES.find(s => s.id === currentSourceId);

  // Sidebar highlight
  listEl.querySelectorAll('.pl-entry').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  // Scroll entry into view
  const activeEl = listEl.querySelector('.pl-entry.active');
  if (activeEl) activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  // Text pane
  const pLabel = entry.section || (entry.page ? 'p. ' + entry.page : entry.stem);
  document.getElementById('text-title').textContent = pLabel;
  document.getElementById('text-loc').textContent = src.hasImages
    ? entry.stem + '.HEIC — ' + src.locLabel
    : src.title;
  const ocrEl = document.getElementById('ocr-text');
  ocrEl.className = '';
  ocrEl.innerHTML = highlightText(entry.text || '(no text)', currentQ);

  // Scroll OCR to first match
  if (currentQ) {
    const first = ocrEl.querySelector('mark');
    if (first) first.scrollIntoView({ block: 'center', behavior: 'smooth' });
  } else {
    ocrEl.parentElement.scrollTop = 0;
  }

  // Image
  const ph = document.getElementById('img-placeholder');
  if (src.hasImages) {
    imgEl.classList.add('loading');
    ph.style.display = 'flex';
    ph.innerHTML = '<div class="ph-spin"></div><div class="ph-txt">Loading</div>';
    imgEl.onload = () => { imgEl.classList.remove('loading'); ph.style.display = 'none'; zInit(); };
    imgEl.onerror = () => { ph.innerHTML = '<div class="ph-txt">Image not found</div>'; };
    imgEl.src = src.imgBase + entry.stem + '.jpg';
  } else {
    imgEl.src = '';
    imgEl.classList.remove('loading');
    ph.style.display = 'flex';
    ph.innerHTML = '<div class="ph-txt">Text Document</div>';
  }

  // Nav
  const vi = visibleIndices.indexOf(idx);
  navLabel.textContent = pLabel;
  navPrev.disabled = vi <= 0;
  navNext.disabled = vi < 0 || vi >= visibleIndices.length - 1;

  updateNavHandlers(vi);
}

function updateNavHandlers(vi) {
  navPrev.onclick = () => { if (vi > 0) openPage(visibleIndices[vi - 1]); };
  navNext.onclick = () => { if (vi < visibleIndices.length - 1) openPage(visibleIndices[vi + 1]); };
}

// ── Search ────────────────────────────────────────────────────────────

const inp = document.getElementById('search');
const clr = document.getElementById('search-clear');

inp.addEventListener('input', () => {
  clr.classList.toggle('show', inp.value.length > 0);
  buildList(inp.value);
  if (activeIdx >= 0) {
    const ocrEl = document.getElementById('ocr-text');
    ocrEl.innerHTML = highlightText(DATA[activeIdx].text || '', inp.value);
  }
});

clr.addEventListener('click', () => {
  inp.value = ''; clr.classList.remove('show');
  document.querySelectorAll('.chip.on').forEach(c => c.classList.remove('on'));
  buildList('');
  if (activeIdx >= 0) {
    document.getElementById('ocr-text').innerHTML = highlightText(DATA[activeIdx].text || '', '');
  }
});

document.getElementById('chips').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  const wasOn = chip.classList.contains('on');
  document.querySelectorAll('.chip.on').forEach(c => c.classList.remove('on'));
  inp.value = wasOn ? '' : chip.dataset.term;
  if (!wasOn) chip.classList.add('on');
  clr.classList.toggle('show', inp.value.length > 0);
  buildList(inp.value);
  if (activeIdx >= 0) openPage(activeIdx);
});

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    const vi = visibleIndices.indexOf(activeIdx);
    if (vi < visibleIndices.length - 1) openPage(visibleIndices[vi + 1]);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    const vi = visibleIndices.indexOf(activeIdx);
    if (vi > 0) openPage(visibleIndices[vi - 1]);
  }
});


// ── Source Switcher ───────────────────────────────────────────────────────

function renderSourceSwitcher() {
  const el = document.getElementById('source-switcher');
  el.innerHTML = SOURCES.map(src => {
    const count = src.data.length;
    const unit = src.hasImages ? (count === 1 ? 'page' : 'pages') : (count === 1 ? 'doc' : 'sections');
    return `<div class="src-item${src.id === currentSourceId ? ' active' : ''}" data-src-id="${esc(src.id)}">
      <div class="src-item-top">
        <span class="src-item-title">${esc(src.title)}</span>
        <span class="src-item-count">${count} ${unit}</span>
      </div>
      <div class="src-item-sub">${esc(src.sub)}</div>
    </div>`;
  }).join('');
  el.querySelectorAll('.src-item').forEach(item => {
    item.addEventListener('click', () => loadSource(item.dataset.srcId));
  });
}

function loadSource(id) {
  currentSourceId = id;
  const src = SOURCES.find(s => s.id === id);
  DATA = src.data;
  TOTAL = DATA.length;

  // Rebuild chips
  const chipsEl = document.getElementById('chips');
  chipsEl.innerHTML = src.chips.map(t => `<button class="chip" data-term="${esc(t)}">${esc(t)}</button>`).join('');

  // Reset UI state
  activeIdx = -1;
  activeNoteId = null;
  const inp = document.getElementById('search');
  inp.value = '';
  document.getElementById('search-clear').classList.remove('show');
  document.querySelectorAll('.note-entry.active').forEach(e => e.classList.remove('active'));

  // Rebuild page list
  visibleIndices = DATA.map((_, i) => i);
  renderList();
  buildList('');

  // Clear main pane
  const imgEl2 = document.getElementById('page-img');
  imgEl2.src = '';
  imgEl2.classList.remove('loading');
  const ph2 = document.getElementById('img-placeholder');
  ph2.style.display = 'flex';
  ph2.innerHTML = '<div class="ph-txt">Select an entry</div>';
  document.getElementById('ocr-text').innerHTML = '';
  document.getElementById('text-title').textContent = '';
  document.getElementById('text-loc').textContent = '';
  document.getElementById('nav-label').textContent = '';
  document.getElementById('nav-prev').disabled = true;
  document.getElementById('nav-next').disabled = true;

  // Update switcher active state
  renderSourceSwitcher();

  // Show/hide notes section (only for Avtalt Spill currently)
  const notesHd = document.querySelector('.notes-hd');
  const notesList = document.getElementById('notes-list');
  const showNotes = id === 'avtalt-spill';
  notesHd.style.display = showNotes ? '' : 'none';
  notesList.style.display = showNotes ? '' : 'none';
}

// ── Researcher Notes ──────────────────────────────────────────────────

const NOTES = [
  {
    id: 'note-oct71-political',
    date: 'Oct–Nov 1971',
    title: 'NR internal meetings — political agenda',
    ref: 'Box 2, Binder III',
    body: `Three internal NR meetings from autumn 1971 reveal that the agenda for the research project went well beyond introducing IT to the workplace — the goal was explicitly political: to reshape how knowledge and expertise are distributed in society, and to influence broader discourse by redefining key terms and concepts.

Meeting of 13.10.71 at NR. Present: Roar (unidentified), Kristen [Nygaard], Olav [Terje Bergo], Jan B. [probably Balstad — the union man].

In this meeting they discuss the importance of ensuring the research actually transfers power to workers. They write:

"The workers movement has up until now to a too large degree been too uncritical in regard to 'experts'. We have to contribute to the tearing down of barriers between researchers and the research objects."

A meeting with roughly the same participants on 07.10.71 contains the phrase:

"We should not pin our hopes on building a parallel apparatus for knowledge mediation, but we must try to see what we can use and then gain control over that."

This is not simply about building a tool for the workers movement. They are looking to make changes to society and influence the discourse in general by redefining how certain words and terms are used.

Finally, a meeting of 05.10.71 contains this direct quote from Marx — in quotation marks and explicitly attributed:

"The liberation of the working class has to be its own doing."

Even in their internal meetings, the agenda for NR's work was clearly political.`
  }
];

let activeNoteId = null;

function renderNotes() {
  const el = document.getElementById('notes-list');
  el.innerHTML = NOTES.map(n => `
    <div class="note-entry" data-note-id="${esc(n.id)}">
      <div class="note-date">${esc(n.ref)}</div>
      <div class="note-title">${esc(n.title)}</div>
    </div>`).join('');

  el.querySelectorAll('.note-entry').forEach(entry => {
    entry.addEventListener('click', () => openNote(entry.dataset.noteId));
  });
}

function openNote(id) {
  const note = NOTES.find(n => n.id === id);
  if (!note) return;
  activeNoteId = id;
  activeIdx = -1;

  // Deselect any page entry
  document.querySelectorAll('.pl-entry.active').forEach(e => e.classList.remove('active'));

  // Highlight note entry
  document.querySelectorAll('.note-entry').forEach(e => {
    e.classList.toggle('active', e.dataset.noteId === id);
  });

  // Hide image, show placeholder
  const ph = document.getElementById('img-placeholder');
  const imgEl = document.getElementById('page-img');
  imgEl.src = '';
  imgEl.classList.add('loading');
  ph.style.display = 'flex';
  ph.innerHTML = '<div class="ph-txt">Researcher Note</div>';

  // Nav
  document.getElementById('nav-label').textContent = note.ref;
  document.getElementById('nav-prev').disabled = true;
  document.getElementById('nav-next').disabled = true;

  // Text pane
  document.getElementById('text-title').textContent = note.title;
  document.getElementById('text-loc').textContent = note.ref;
  const ocrEl = document.getElementById('ocr-text');
  ocrEl.className = '';

  // Render note body as paragraphs
  const paras = note.body.split(/\n{2,}/).map(p => p.trim()).filter(Boolean);
  ocrEl.innerHTML = paras.map(p => {
    // Indent quoted passages (lines starting with ")
    if (p.startsWith('"')) return `<p style="padding-left:1.4em;border-left:2px solid var(--faint);margin-left:0.2em;font-style:italic;">${esc(p)}</p>`;
    return `<p>${esc(p)}</p>`;
  }).join('');

  ocrEl.parentElement.scrollTop = 0;
}

// ── Init ──────────────────────────────────────────────────────────────

renderNotes();
loadSource('avtalt-spill');
openPage(0);
</script>
