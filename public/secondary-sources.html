<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NJMF — Secondary Sources</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:   #0f0f0e;
      --mid:   #808080;
      --faint: #d0d0ce;
      --rule:  #ebebea;
      --hl:    #f2efe6;
      --bg:    #ffffff;
      --img-bg:#f4f3f0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Playfair Display', 'Times New Roman', Georgia, serif;
      -webkit-font-smoothing: antialiased;
    }

    .layout { display: flex; height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      flex-shrink: 0;
      width: 268px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--ink);
      overflow: hidden;
    }

    .sb-hd {
      padding: 36px 28px 22px;
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
    }

    .sb-eyebrow {
      font-size: 9px;
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 10px;
    }

    .sb-back {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--faint);
      text-decoration: none;
      display: block;
      margin-bottom: 18px;
      transition: color .1s;
    }
    .sb-back:hover { color: var(--mid); }

    .sb-title {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .sb-sub {
      font-size: 11px;
      font-style: italic;
      color: var(--mid);
      margin-bottom: 4px;
    }

    .sb-meta {
      font-size: 10px;
      color: var(--faint);
      letter-spacing: 0.12em;
    }

    /* Search */
    .sb-search {
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
    }

    .search-row {
      display: flex;
      align-items: center;
      border: 1px solid var(--faint);
      transition: border-color .15s;
    }
    .search-row:focus-within { border-color: var(--ink); }

    #search {
      flex: 1;
      border: none;
      outline: none;
      padding: 7px 10px;
      font-family: inherit;
      font-size: 12px;
      color: var(--ink);
      background: transparent;
    }
    #search::placeholder { color: var(--faint); }

    #search-clear {
      border: none;
      background: none;
      color: var(--faint);
      cursor: pointer;
      padding: 6px 8px;
      font-size: 14px;
      display: none;
      font-family: inherit;
    }
    #search-clear.show { display: block; }
    #search-clear:hover { color: var(--ink); }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 10px;
    }

    .chip {
      background: none;
      border: 1px solid var(--faint);
      color: var(--mid);
      font-family: inherit;
      font-size: 9.5px;
      letter-spacing: 0.06em;
      padding: 3px 8px;
      cursor: pointer;
      transition: border-color .1s, color .1s, background .1s;
    }
    .chip:hover { border-color: var(--mid); color: var(--ink); }
    .chip.on { border-color: var(--ink); color: var(--ink); background: var(--hl); }

    /* Page count */
    .sb-ft {
      padding: 10px 20px;
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
    }

    #page-count {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--faint);
    }

    /* Researcher notes */
    .notes-hd {
      padding: 12px 20px 6px;
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--faint);
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
    }

    .note-entry {
      padding: 10px 20px;
      cursor: pointer;
      border-left: 2px solid transparent;
      border-bottom: 1px solid var(--rule);
      transition: background .1s, border-color .1s;
    }
    .note-entry:hover { background: var(--hl); }
    .note-entry.active { background: var(--hl); border-left-color: #c8923a; }

    .note-date {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 3px;
    }
    .note-title {
      font-size: 11.5px;
      font-style: italic;
      color: var(--mid);
      line-height: 1.4;
    }
    .note-entry.active .note-title { color: var(--ink); }

    /* Page list */
    .page-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0 24px;
    }

    .page-list::-webkit-scrollbar { width: 3px; }
    .page-list::-webkit-scrollbar-thumb { background: var(--faint); }

    .pl-entry {
      padding: 10px 20px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background .1s, border-color .1s;
    }
    .pl-entry:hover { background: var(--hl); }
    .pl-entry.active {
      background: var(--hl);
      border-left-color: var(--ink);
    }
    .pl-entry.gone { display: none; }

    .pl-pnum {
      font-size: 9px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 3px;
    }
    .pl-pnum mark { background: #f0d080; color: var(--ink); padding: 0 1px; }

    .pl-snip {
      font-size: 11.5px;
      line-height: 1.5;
      color: var(--mid);
      font-style: italic;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .pl-snip mark { background: #f0d080; color: var(--ink); font-style: normal; }

    /* ── Main viewer ── */
    .main {
      flex: 1;
      display: flex;
      height: 100vh;
      min-width: 0;
    }

    /* Image pane */
    .img-pane {
      flex: 0 0 52%;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: var(--img-bg);
      border-right: 1px solid var(--rule);
    }

    .img-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
      cursor: default;
      user-select: none;
    }

    #page-img {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
      max-width: none;
      display: block;
    }
    #page-img.loading { opacity: 0; }

    #img-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--faint);
    }
    .ph-spin {
      width: 22px; height: 22px;
      border: 1.5px solid var(--faint);
      border-top-color: var(--mid);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ph-txt { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; }

    .zoom-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-top: 1px solid var(--rule);
      background: var(--bg);
    }
    .zb-btn {
      background: none; border: 1px solid var(--faint);
      cursor: pointer; font-family: inherit;
      font-size: 14px; color: var(--ink);
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .1s;
    }
    .zb-btn:hover { border-color: var(--ink); }
    #zoom-pct { font-size: 10px; letter-spacing: 0.16em; color: var(--mid); min-width: 36px; text-align: center; }
    #zoom-reset { margin-left: auto; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
      background: none; border: none; cursor: pointer; color: var(--faint); font-family: inherit; transition: color .1s; }
    #zoom-reset:hover { color: var(--ink); }

    /* Nav arrows */
    .nav-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 14px;
      border-top: 1px solid var(--rule);
      background: var(--bg);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--faint);
    }
    .nav-btn {
      background: none; border: 1px solid var(--faint); cursor: pointer;
      padding: 4px 10px; font-family: inherit; font-size: 10px;
      letter-spacing: 0.18em; color: var(--mid);
      text-transform: uppercase; transition: border-color .1s, color .1s;
    }
    .nav-btn:hover { border-color: var(--ink); color: var(--ink); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }

    /* Text pane */
    .text-pane {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .text-hd {
      flex-shrink: 0;
      padding: 22px 32px 16px;
      border-bottom: 1px solid var(--rule);
    }
    .text-eyebrow {
      font-size: 8.5px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 6px;
    }
    .text-title {
      font-size: 20px;
      font-weight: 700;
    }
    .text-loc {
      font-size: 11px;
      font-style: italic;
      color: var(--mid);
      margin-top: 4px;
    }

    .text-body {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px 40px;
    }
    .text-body::-webkit-scrollbar { width: 3px; }
    .text-body::-webkit-scrollbar-thumb { background: var(--faint); }

    #ocr-text {
      font-size: 13.5px;
      line-height: 1.95;
      color: var(--ink);
      font-family: 'Playfair Display', Georgia, serif;
    }
    #ocr-text p { margin-bottom: 1.2em; }
    #ocr-text mark { background: #f0d080; color: var(--ink); padding: 0 1px; }

    .empty-state {
      font-size: 13px;
      font-style: italic;
      color: var(--faint);
      padding: 60px 32px;
      text-align: center;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .img-pane { flex: 0 0 45%; }
    }

    /* ── Source switcher ── */
    .source-switcher { margin-top: 10px; }
    .src-item {
      padding: 7px 10px 7px 8px;
      cursor: pointer;
      border-left: 2px solid transparent;
      border-radius: 0 3px 3px 0;
      margin-left: -28px;
      padding-left: 28px;
      display: flex;
      flex-direction: column;
      gap: 1px;
      transition: background 0.12s;
    }
    .src-item:hover { background: var(--hl); }
    .src-item.active { border-left-color: var(--ink); }
    .src-item-top { display: flex; justify-content: space-between; align-items: baseline; gap: 6px; }
    .src-item-title { font-size: 0.82rem; font-weight: 600; letter-spacing: 0.01em; }
    .src-item-count { font-size: 0.68rem; color: var(--mid); flex-shrink: 0; }
    .src-item-sub { font-size: 0.68rem; color: var(--mid); }
  </style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sb-hd">
      <a class="sb-back" href="timeline.html">&#8592; Archive Timeline</a>
      <div class="sb-eyebrow">Secondary Sources</div>
      <div id="source-switcher"></div>
    </div>

    <div class="sb-search">
      <div class="search-row">
        <input id="search" type="search" autocomplete="off" spellcheck="false"
               placeholder="Search pages…">
        <button id="search-clear" title="Clear">&#215;</button>
      </div>
      <div class="chips" id="chips"></div>
    </div>

    <div class="notes-hd">Researcher Notes</div>
    <div id="notes-list"></div>

    <div class="sb-ft">
      <div id="page-count">45 pages</div>
    </div>

    <div class="page-list" id="page-list"></div>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Image pane -->
    <div class="img-pane">
      <div class="img-wrap" id="img-wrap">
        <img id="page-img" src="" alt="Book page" draggable="false">
        <div id="img-placeholder">
          <div class="ph-spin"></div>
          <div class="ph-txt">Select a page</div>
        </div>
      </div>
      <div class="zoom-bar">
        <button class="zb-btn" id="zoom-out" title="Zoom out">&#8722;</button>
        <span id="zoom-pct">100%</span>
        <button class="zb-btn" id="zoom-in" title="Zoom in">&#43;</button>
        <button id="zoom-reset">Reset zoom</button>
      </div>
      <div class="nav-bar">
        <button class="nav-btn" id="nav-prev">&#8592; Prev</button>
        <span id="nav-label"></span>
        <button class="nav-btn" id="nav-next">Next &#8594;</button>
      </div>
    </div>

    <!-- Text pane -->
    <div class="text-pane">
      <div class="text-hd">
        <div class="text-eyebrow">OCR Transcript</div>
        <div class="text-title" id="text-title">—</div>
        <div class="text-loc" id="text-loc"></div>
      </div>
      <div class="text-body">
        <div id="ocr-text" class="empty-state">Select a page from the list to read the transcript.</div>
      </div>
    </div>

  </main>
</div>

tningene om både styrerepresentasjon og lovfesting av medbestem-\nmelse i nær sagt alle retninger. Jern- og Metallarbeiderforbundet var for begge\ndeler, mens representanter for arbeidsgiverne, som Niels Aars-Nicolaysen fra\nLO/N.A.F. ble etablert som en møteplass for partenes standpunkt i spørsmålene\nom ansattes medbestemmelse og rolle i bedriftene, Der kunne de utvikle felles\nbeidsforsøkene som Einar Thorsrud ledet i 1960-årene.\nKings Bay-ulykken i november 1962 ble en katalysator i disse prosessene.\nGanske raskt etter ulykken ble det fremmet forslag om at ansattes deltakelse i\nselskapsstyrer skulle lovfestes. Styrerepresentasjon skulle bidra til sikrere arbeids-\nforhold og forebygge ulykker. Kings Bay-ulykken presset med andre ord fram\nen debatt om det representative demokratiet på arbeidsplassene. Det var ikke\nnok med deltakelse i produksjonsutvalg. De ansatte måtte med i andre styrings-\norgan for å sikre at økonomiske effektivitetsbetraktninger ikke gikk ut over liv\nog helse. Arbeiderpartiet hadde foreslått å lovfeste arbeidstakernes rett til styre-\nrepresentasjon allerede i 1953, men fikk den gangen ikke støtte for forslaget fra\nnoe hold. Regjeringen Gerhardsen måtte gå på grunn av sin behandling av Kings\nBay-ulykken i 1963, og vi fikk en borgerlig firepartiregjering med John Lyng\nved roret i noen få uker. De borgerlige partiene ønsket å styrke arbeidstakernes\nmedbestemmelse, men først og fremst ved avtaler. Da Arbeiderpartiet tok regje-\nringsmakten tilbake i september 1963, erklærte de en intensjon om at medbe-\nstemmelse skulle lovfestes for alle arbeidstakere.\nAspengren-komiteen gikk imot ansattes representasjon i styrene i 1963, men\nforeslo i stedet at det skulle opprettes bedriftsforsamlinger med en tredel av\nrepresentantene valgt blant ansatte. De lot spørsmålet om lov eller avtale fore-\nlopig stå åpent. Ifølge Bjørnhaug og Halvorsen var poenget å komme Thorsrud\nog Emerys innvendinger mot ansattes styrerepresentasjon i forkjopet?. In amling. Med lovfesting måtte ansatte\nrepresentere alle, ikke bare fagforeningsmedlemmer, mens en sterk fagforening\nlettere kunne dominere ansattes stemmegivning i en bedriftsforsamling. LO\nhold fortsatt på bedriftsforsamlingen som tilstrekkelig for medbestemmelse i\nstyringen av virksomhetene, og var fortsatt imot lovfesting. En utbredt oppfat-\nning var at ansatte raskt ville bli «gisler» i selskapenes styrer og styrke arbeids-\ngivernes makt i forhold til\nansatte. Dermed handlet debatten om\nstyrerepresentasjon også om hva som ville svekke arbeidsgivernes styringsrett\nminst: individuelt ansvarlige ansatte i styret eller fagforeninger med kollektive\ninteresser i bedriftsforsamlingen.\nArbeidsmiljøloven kom i 1977 og representerte et paradigmeskifte der arbei-\ndervern på medisinsk grunnlag ble utvidet med psykososiale, sosiale og orga-\nnisatoriske forhold. Dette var direkte resultat av en sosiologisk undersøkelse\nsom LO fikk gjennomført ved Universitetet i Bergen63. I loven fikk ansatte\nrepresentasjon i arbeidsmiljøutvalg i alle virksomheter med 50 ansatte eller mer,\nog verneombud i alle virksomheter med 10 ansatte eller mer. Det siste ble\nfremmet blant andre av arbeidslivsforskeren Bjørn Gustavsen, som deltok i\nlovutvalget. Det er gode grunner til å hevde at samfunnsforskningen hadde\nstørre innflytelse på arbeidsmiljøloven enn den i sin tid hadde på Hovedavtalens\nDel B i 1966.\nI 1985 avga Brubakken-utvalget sin innstilling64, og vi fikk et skifte i fokus\nfra formalisering av rettigheter, representasjon og regulering til et fokus på\nutvikling og deltakelse på den enkelte arbeidsplass. I våre dager er også norsk\narbeidsliv preget av nyliberalismens krav om individuell handlingsfrihet. Et\neksempel er arbeidslivslovutvalgets innstilling i 2004, som la vekt på Acksibi-\nlitet og individuell innAytelse, og som Bondevik II-regjeringen vedtok i 2005.\nStoltenberg II-regjeringen reverserte dette.\nBedriftsdemokratiet i dag\nMed liberalisering, globalisering og fokus på drift og urvikling i den enkelte\nbedrif, skulle vi tro at bedriftsdemokratiet har blitt svekket og ikke lenger betyr\nså mye i dagens arbeidsliv. Dette var utgangspunktet for en større og represen-\ntativ spørreundersøkelse blant norske arbeidsgivere og arbeidstakere i 2009,\nutfort for Arbeids- og inkluderingsdepartementer'.\n119", "snippet": "erer nærmest en sosiologisk 1 ettertid blir utsagnet også c. Lovfesting ville innebære le som var medlemmer i en ed ville lovfesting åpne for emokratiske organ. Lovfes- akt på arbeidsplassene. tviklin"}, {"page": 131, "stem": "IMG_1234", "text": "Tor Are Johansen\nKontinuerlig tilpasning til et\narbeidsliv i endring -\nHovedavtalens tilleggsavtaler\nHovedavtalen har så å si kontinuerlig vært gjenstand for endring. Selv om den\nofte omtales som arbeidslivets grunnlov, har den aldri utgjort noe entydig statisk\nelement i forholdet mellom partene i arbeidslivet, og den har heller ikke vært\nden eneste generelle tariffavtalen mellom de to viktigste hovedorganisasjonene\ni norsk arbeidsliv. I tillegg til Hovedavtalen har det eksistert en rekke andre\navtaler som gjerne har gått under betegnelsene retningslinjer, felleserklæringer\neller rammeavtaler. De fleste av disse har hatt som formål å regulere forhold på\navgrensede områder - forhold som har blitt aktuelle etter hvert som samfunns-\nog arbeidsliv har gjennomgått forandring og utvikling, eller når økonomiske,\npolitiske eller ideologiske konjunkturer har åpnet for endring. Retningslinjer for\nbruk av arbeidsstudier fra 1947 og Rammeavtalen vedrørende datamaskin-\nbaserte systemer fra 1975, er to typiske eksempler.\nEnkelte slike avtaler har allerede i utgangspunktet hatt en mer eller mindre\ndirekte tilknytning til Hovedavtalen, mens andre i større grad har levd sitt eget\nLiv på siden av den. Under forhandlingene om revisjon av Hovedavtalen høsten\n1981 ble det imidlertid foretatt en viktig omlegging med betydning for disse\navtalenes status og plassering. F ammer på Forskningsrådets anstrengte budsjett. På\nde europeiske arbeidsorganisasjonsundersøkelsene er Sverige fortsatt det land\nsom skårer høyest på autonomi og lærende organisasjon. Også Danmark ligger\nover Norge. Siden ilanmark, i nittårene, hadde to store offentlig støttede\nprogrammer for utvikling i arbeidslivet (Hvid 2000), synes det å være slik at\nskiftende, men til dels omfattende, offentlige satsinger så langt har gitt noe bedre\nresultater enn den mil stabile, men spareblusspregede, norske linjen. På tross av\nbredere offentlige satsinger skårer Finland noe lavere enn Norge, men kom i\ngang med en systematisk utvikling av arbeidsorganisasjon på et vesentlig senere\ntidspunkt enn de øvrige nordiske landene (Gustavsen 2006).\nI diskusjonen ovenfor av den fasen som ble kalt «deltakelsesbasert design» ble\ndet påpekt at bred medvirkning syntes å stå sterkere og være mer robust der den\nkunne knyttes til parts- og andre institusjonelle forhold i arbeidslivet enn der\nden var mer eksklusivt forankret i forhold «inne i» den enkelte bedrift. Selv om\nHABUT ikke uten videre ga opphav til noen dyptpløyende utviklingsbølge i\nnorsk arbeidsliv, og definitivt ingen full løsning på det spredningsproblem som\nvar diskutert allerede fra omkring 1970, kunne den positive mottagelse allikevel\ntyde på at den pekte på noe viktig. HABUT representerte derfor et viktig skritt\nvidere i å knytte konkret bedriftsutvikling til institusjonelle forhold i arbeidsliv\nog samfunn.\nTanken om at kjernen i utviklingen av bedre bedrifter ikke primært er å\nrealisere spesifikke organisatoriske mønstre, men å skape fokus på temaer som\norganisasjon, samarbeid og ledelse lokalt, og, i denne sammenheng, fremme\nåpne læringssituasjoner, var ikke spesiell for Norge eller Norden. Snarere handlet\ndet om en generell trend med røtter lenge før nittiårene, men som ble «main-\nstream» innen ledelse og organisasjon i dette tiåret. Mens Womack et al (1990)\ni stor grad hadde sett «lean production» const AFI_DATA = [{"page": null, "stem": "afi-history", "section": "AFI / OsloMet History", "text": "Virksomhet: AKT-47 - Arbeidsforskningsinstituttet (AFI)\nLokalisering: OsloMet – storbyuniversitetet\nSti: OSLM/AKT-47\n1964 – 2013\n\nArbeidsforskningsinstituttene (AFI) ble opprettet i 1964 fra Staten v/Kommunal og Arbeidsdepartementet for å drive forskning og være faglig støtte til arbeidslivet og dets institusjoner, når det gjelder den menneskelige side av arbeidslivet, - \"dekke hele mennesket\". AFI fikk tre deler i form av selvstendige samlokaliserte institutter under samme styre (med representanter fra departementet, LO, N.A.F. og Universitetet i Oslo): De tre var Yrkeshygienisk Institutt, Arbeidsfysiologisk Institutt og Arbeidspsykologisk Institutt. Etter noen år delte Arbeidsfysiologisk Institutt seg i to. (Flere år deretter ble det hele omorganisert til STAMI; Statens Arbeidsmiljøinstitutt. AFI var da flyttet ut og blitt selvstendig.)\n\nEinar Thorsrud, som i 1964 var dosent og leder av Institutt for industriell miljøforskning, IFIM (tilknyttet først NTH, senere SINTEF) og hadde startet Samarbeidsprosjektet LO/NAF (demokratisering av arbeidslivet) i 1962, ble invitert til å ta stillingen som instituttleder på Arbeidspsykologisk Institutt. Han tiltrådte rundt 1965/66 og fikk aksept for å ta med seg Samarbeidsprosjektet til instituttet. Dette ble den dominerende forskningsaktiviteten ved det nye instituttet. Men det foregikk i tillegg noe forskning knyttet til testing av arbeidstakere, der cand psychol Kari Marie Helle ble den sentrale forskeren. Thorsrud tok også med seg noen av forskerne fra Trondheim; Knut Lange, Per Engelstad, Jon Gulowsen og Thoralf Qvale (sisnevnte var student ved NTH da prosjektet ble flyttet til Oslo, og ble stipendiat først tilknyttet IFIM og litt senere AFI (1967)). Einar Thorsrud var instituttsjef frem til ca 1973, da overtok dr.philos Bjørn Gustavsen som instituttsjef, mens Thorsrud fortsatte som seniorforsker.\n\nI 1986 ble Arbeidspsykologisk Institutt omdannet til et separat institutt med eget styre (repr. fra KAD, LO, NHO og UiO) direkte underlagt Kommunal og Arbeidsdepartementet. Omdanningen skjedde i forbindelse med at Arbeidspsykologisk Institutt (API) flyttet ut av den felles bygningen i Gydas vei 8. Det ble for trangt for alle i Gydas vei, og de andre (medisinsk, fysiologisk orienterte) instituttene trengte nye, større laboratorier mv. Etter utflyttingen tok API formelt navnet Arbeidsforskningsinstituttet (AFI).\n\nUtover 1990 tallet var det en lang debatt om \"instituttsektoren\" og organiseringen av denne. Et NOU fra den tiden anbefalte stiftelsesformen, men statsråden bestemte at AFI skulle omdannes til et Aksjeselskap fra og med 01.07.2002. Kunnskapsdepartementet eide aksjene, som ble forvaltet av Høgskolen i Oslo og Akershus (HiOA), Høgskolen i Vestfold (HiVe) og Universitetet i Agder (UiA).\n\nFra 1. januar 2014 ble Arbeidsforskningsinstituttet (AFI) sammen med Norsk institutt for forskning om oppvekst, velferd og aldring (NOVA) en del av Senter for velferds- og arbeidslivsforskning ved Høgskolen i Oslo og Akershus.\n\nArkivene etter Arbeidsforskningsinstituttet er etter vedtak i AFIs ledelse i dag delt mellom flere institusjoner. Det eldste materialet, fra de første fasene av Thorsruds virksomhet, også kalt Samarbeidsprosjektet LO/NAF fase 1 og 2, er avlevert Riksarkivet. Materiale fra fase 3 Spredningsfasen i SBA-programmet er sendt Arbeiderbevegelsens arkiv. Skipsprogrammet, og spredning av erfaringer fra fase 2 ligger hos Norsk Maritimt Museum (daværende Sjøfartsmuseet), mens Oljemuseet har materiale fra Oljeprogrammet, et tredje spredningsprogram.", "snippet": "Virksomhet: AKT-47 - Arbeidsforskningsinstituttet (AFI) Lokalisering: OsloMet – storbyuniversitetet Sti: OSLM/AKT-47 1964 – 2013  Arbeidsforskningsinstituttene (AFI) ble opprettet"}];
const EHN_DATA = [{"page": null, "stem": "ehn-1", "section": "Introduction", "text": "Chapter 4. Scandinavian Design: On Participation and Skill\nPelle Ehn Aarhus University\nIn Scandinavia we have for two decades been concerned with participation and skill in the design and use of computer-based systems. Collaboration between\nresearchers and trade unions on this theme, starting with the pioneering work of Kristen Nygaard and the Norwegian Metal Workers' Union, and including\nleading projects like DEMOS and UTOPIA, has been based on a strong commitment to the idea of industrial democracy. This kind of politically signiﬁcant,\ninterdisciplinary, and action-oriented research on resources and control in the processes of design and use has contributed to what is often viewed abroad as a\ndistinctively Scandinavian approach to systems design.\nThis Scandinavian approach might be called a work-oriented design approach. Democratic participation and skill enhancement--not only productivity and\nproduct quality--themselves considered ends for the design. This chapter is based on two research projects, DEMOS and UTOPIA. I have elaborated this\napproach in detail in Work-Oriented Design of Computer Artifacts (1989). Two important features of participatory design shape its trajectory as a design\nstrategy. The political one is obvious. Participatory design raises questions of democracy, power, and control at the workplace. In this sense it is a deeply\ncontroversial issue, especially from a management point of view. The other major feature is technical--its promise that the participation of skilled users in the\ndesign process can contribute importantly to successful design and high-quality products. Some experiences, perhaps most developed in Scandinavia, support\nthis prediction and contribute to the growing interest in participatory design in the United States and other countries; by contrast, \"expert\" design strategies have\ntoo often turned out to be failures in terms the usability of the resulting system. These two features together suggest that there is a ﬁrm link between the skill and\nproduct quality aspect of user participation and the democracy and control aspect, or else participatory design would be a deeply controversial issue from the\npoint of view of the employees and trade unions.\nThe trade-union-oriented democracy aspect of skill and participation in design is discussed in the ﬁrst part of this chapter. I start with an introduction to the\nconcept of industrial democracy and an overview of the Scandinavian setting. After this background, research projects forming the Scandinavian work-oriented\ndesign approach are presented and discussed.\nIn the second part, I focus on the role of skill and participation in design as a practical activity. This focus has grown out of a dissatisfaction with traditional\ntheories and methods for systems design. Not only has traditional design been oriented towards deskilling workers, but this traditional approach has been\nencouraged by a theoretical assumption, namely, that skill can be exhaustively characterized by a purely formal description. The political critique of the design\nprocess discussed in the ﬁrst part leads to a theoretical critique of the scientiﬁc rationality of methods for systems description and systems development. In the\nsecond part, a philosophical foundation for a skill-based participatory design approach is outlined based on the language-game philosophy of Ludwig\nWittgenstein. Taken together, these critiques shape the Scandinavian work-oriented design approach, an approach based on an emancipatory perspective and\nencompassing both the inner everyday life of skill-based participatory design and the societal and cultural conditions regulating this activity.", "snippet": "Chapter 4. Scandinavian Design: On Participation and Skill Pelle Ehn Aarhus University In Scandinavia we have for two decades been concerned with participation and skill in the des"}, {"page": null, "stem": "ehn-2", "section": "Designing for Democracy at Work", "text": "DESIGNING FOR DEMOCRACY AT WORK\nThe democratic ideal is a beautiful human invention: Every human should have the right to participate equally in decisions concerning his or her life. In practice\nthis freedom has always been limited. The ﬁrst democrats, the ancient Greeks, constrained participation to free men, excluding women and a class of slaves. The\nmodem democratic state in capitalistic societies has, in theory and in many practical aspects, removed these constraints. Representative democracy is a formal\narrangement for securing decisions in the interest of the majority, and often manages to assure freedom for minority groups.\n\nIn many sectors of life, however, democratic rights remain merely formal, without real content for those concerned. In this paper, I am concerned with\ndemocracy behind the factory gates and ofﬁce doors--democracy at work. Fundamentally, democracy at work or industrial democracy concerns freedom, another\nvalue-laden concept. It concerns freedom from the constraints imposed by the market economy and the power of capital. And it also concerns freedom to\npractically formulate and carry out particular projects that further democratize work. Attempts to democratize at work address:\n1. The power of capital owners to control how resources are used. Possible uses include economic goals, structural changes in the company, investments in\nnew technology, choice of business idea, and product range:\n2. Owner's organizational and technological power to decide how the production process in general is organized and how technology is designed and used:\n. 3. Their power over the workers to decide how work is to be organized, planned, and controlled:\n. 4. Their power to limit an individual's autonomy at work, including the individual's choice of tools and pace of work (Dahlstrom, 1983).\nThe research projects on work-oriented design that I discuss in this paper address industrial democracy in all these aspects. They aimed both at a better\nunderstanding of freedom from managerial control and at freedom to develop and implement strategies for democratization at work. In particular, the\nstudies looked at the design of computer-based systems in the context of democratization of work in Scandinavia.\nThe Scandinavian Setting\nScandinavian countries have for quite some time been well known for their distinctive industrial relations. The following features are particularly noteworthy:\n1. A highly educated and relatively homogeneous workforce:\n2. A high level of unionization:\n3. Strong national trade union federations: .\n4. Centralized negotiation systems:\n5. Large social democratic parties with strong links to the the national trade union federations of blue (and some white) collar workers, parties which for\nlong periods of time have led the governments:\n6. Relations between trade unions and employers that are, to a large extent, regulated by laws and central agreements:\n7. A positive attitude to new technology from the trade union federations, at least since World War 11 and despite some opposition at the local level, based\non the assumption that job loss due to the introduction of new technology would be compensated by active labor market government policies .\nThese features have contributed to the relative stability of Scandinavian labor relations and the relatively high degree of workplace democratization: Democracy\n[in the United States] stops at the ofﬁce door and the factory gate. Western Europe is extending democracy into working life. Democratization of work has gone\nfurther in Scandinavia than elsewhere in Europe. Job redesign projects, codetermination arrangements, health and safety legislation, employee representatives on\ncorporate boards. (Einhorn & Logue, 1982)\nThese historical factors help explain the emergence of the participatory trade-union-based work-oriented approach to design of computer artifacts. But just as\nimportant is the other side of the coin: The Scandinavian countries are still market economies, and an integral part of international capitalism. Workers and their\nunions therefore confront basically the same forces or rationalization of work and technology as those in other market economies.\n\nLaws on Democratization of Work\nThe 1970s was the decade when democracy at work truly appeared on the agenda for industrial policy. In that decade, an intensive debate took place in trade\nunions, and a number of new labor laws were enacted (Fry, 1986).\nIn Norway, employees obtained the right to elect one-third of the members of the so-called \"company assembly.\" In 1975, the ﬁrst collective agreement on the\ndevelopment and introduction of computer-based systems was concluded, giving the trade unions the right to appoint so-called data shop stewards. In 1977, the\nNorwegian Work Environment Act gave workers extensive rights to stop production that was dangerous to their health. New codetermination procedures for\nwork environment issues were established, and a system of sanctions was deﬁned for employers who did not fulﬁl the new work environment requirements.\nThe Swedish \"work democracy package\" in the 1970s revised existing legislation and introduced several new acts. The work democracy package included the\nact concerning Labor Representatives on Company Boards, the Companies Act concerning disclosure of ﬁnancial information, the act concerning the Status of\nShop Stewards, and the Work Environment Act.\nFinally, and most important, the Joint Regulation Act (MBL) concerning workers and trade unions' right to codetermination in production issues such as design\nand the use of new technology and work organization was enacted in January 1977. It was this law that the late Prime Minister Olof Palme described as the\ngreatest reform in Swedish society since the introduction of the universal right to vote. In practice this act's impact has turned out to be far less dramatic, and as a\nresult there was considerable disappointment among many union members who had received the impression that the Act was the decisive step towards\ndemocracy at work.\nNevertheless, MBL did create new conditions for the design and use of computer-based systems and other production equipment. Article 11 stipulates that the\nemployer has to negotiate with the local union before making \"major changes\" in production. Article 12 give the union the right to initiate negotiations on any\nproduction issue. Articles 18 and 19 stipulate the right of unions to have access to documents to which management refers in negotiation, and to receive\ninformation continually on production issues, their employer's ﬁnancial situation, and personnel policy.\nThese were important changes encouraging democratic control over the introduction and use of new technology, but they were limited. The Act gave the\nemployer the exclusive right to make decisions when trade unions and management could not reach an agreement in negotiations. Furthermore, the \"major\nchanges\" in production to which the Act referred are open to interpretation, as is the obligation to inform, which may or may not include early plans, say, to\nintroduce a computer-based system.\nFinally, Article 32 should be mentioned. This article concerns the right for trade unions to negotiate agreements on \"the management and assignment of working\nduties, and the conduct of the operation at large.\" The number of this article was chosen to parallel Article 32 in the Swedish Employer's Confederation (SAFs)\nStatutes, which requires its members to retain the right of decision when entering collective agreements. The Act stipulates that if a collective codetermination\nagreement (MBA) is reached, the union has \"priority of interpretation\" over disputed issues covered by the agreement until the dispute is settled in negotiations.\nThis gives the trade unions the opportunity to postpone decisions. However, the main idea behind Article 32 was that central agreements should be negotiated,\nand that local agreements should be developed on the basis of these agreements.\nIn 1978, the ﬁrst central collective agreement on codetermination was reached in the public sector the (MBA-S). Not until 1982 was an agreement reached in\nprivate industry. By that time the forms of codetermination had become more concrete, but the trade unions' democratization offensive had to a signiﬁcant extent\nfaded out. What started as a trade union response to local demands for democratization in the late 1960s, often expressed as wild-cat strikes concerning the work\n\nenvironment and the introduction of new technology, had assumed a form sanctioned by parliament, national trade union federations, and national employers'\nfederations.\nThe wild-cat strike by the workers' collective of iron miners at the Ikab mines in the north of Sweden was the starting point for these democratization reforms\nthat concerned not only the democratization of the work place, but also internal trade union democracy. The work-oriented design approach emerged in the midst\nof the practical implementation of these reforms.\nThe Trade Unions as Vehicles for Industrial Democracy\nIn Scandinavia, trade unions have served as the vehicles for industrial democracy by advancing the interest of the workers' collective. The workers' collective is\na concept developed by the Norwegian sociologist Sverre Lysgaard (1961) to\ndesignate the informal defense organization of workers in the workplace. The workers' collective is manifested as shared norms concerning how workers should\nbehave in relation to management and the rationality of technical-economic organization. The norms shape workers' responses to management's efforts to\nintensify work, to tighten control of the labor process, and to rationalize the use of new technology. As hired labor, the workers are also part of the\ntechnical-economic organization of the workplace, but the workers' collective reﬂects workers' response to their subordinated position in this technical-economic\norganization.\nAccording the Lysgaard, the degree of strength in the workers' collective comes from the \"we-feeling\" created by shared experiences. The basis for this wefeeling is physical proximity at the workplace, which makes interaction\npossible; similarity in working conditions, which makes the workers identify with each other; and a similar problem situation that they interpret in a similar way.\nThe norms of the workers' collective deﬁne what it means to be a \"good work mate\" as well as what it means to be a \"traitor.\" The workers' collective is a\n\"buffer\" between the individual worker and management's interests in shaping the technical-economic organization of the workplace.\nHowever, the workers' collective has two major weaknesses when compared with institutionalized forms of industrial democracy. First, the workers' collective\ncan only informally defend the individual worker. It is not an acknowledged formal organization, meaning that it has no formal organizational power for\nachieving structural changes in the workplace. Second, as a defensive organization responding to management initiative, it lacks the organizational ability to\nformulate and carry through an offensive strategy for changes in the direction of industrial democracy.\nThe trade union movement is a formal organization through which workers' interests can be developed and implemented. This by no means implies that trade\nunions always represent the interests of the workers' collective. Trade unions have a hierarchical structure, and the gap between shop-ﬂoor experiences and\ncentral decisions can be huge. Furthermore, the trade union movement is far from homogeneous. Different groups of workers have different interests. There are\ndifferences in interests and power between skilled and unskilled workers, between men and women, between workers organized in different trade unions, etc. In\nthe design and introduction of new technology, these differences can manifest themselves as jurisdictional disputes and conﬂicts concerning skill development,\nwork organization, and the right to operate the new technology. The problem of solidarity is a central one in the trade union movement's struggle for industrial\ndemocracy.\nNevertheless, trade unions have served the interest of the workers' collective in two ways that are important for the present argument: They have been an\nessential instrument for workers in wage negotiations, and they have been a key instrument for furthering democracy in society as a whole.\n\n4. SCANDINAVIAN DESIGN 47\nUnions and Design\nThe design and use of new technology requires new trade union activities. Traditionally, trade unions have focused on what Ake Sandberg (forthcoming) calls\ndistribution issues such as wages, working hours, and general terms of employment. Such issues are characterized by:\n1. Relatively well-developed union objectives;\n2. Clearly formulated demands, often quantiﬁed;\n3. Demands based on the workers' own practical experience; and\n4. Clearly delimited, short negotiation cycles.\nIn contrast, the design and use of computer-based systems are, in Sandberg's terminology, production issues. They are characterized by:\n1. Only vaguely formulated union objectives;\n2. Demands that are difﬁcult to quantify;\n3. Practical on-the-job experiences that must be supplemented by more theoretical, technical/scientiﬁc knowledge;\n4. Design processes that stretch over long periods of time; and\n5. Negotiation situations that are difﬁcult to deﬁne clearly.\nAs Sandberg points out, the design of new models for work seem to require the consideration of more deep-seated and qualitative aspects than can easily be\nﬁtted into the traditional trade union strategy or the traditional management-labor negotiation process.\nWhat are the key elements of a union technology strategy? Obviously, one element is decentralization of decision making coupled with participation in the\ndesign process, which can give workers more inﬂuence and better access to important information. However, the position we took in DEMOS, UTOPIA, and the\nother projects that constituted the work-oriented design approach was that decentralization of decision making and a participative approach to the design process\nare not sufﬁcient.\nOur position is based on a recognition of the different interests of management and workers concerning industrial democracy. We rejected the harmony view of\norganizations, according to which conﬂicts in an organization are seen as stemming from misunderstandings and can resolved by good analysis. We also rejected\nan understanding of design as a rational decision making process based on common goals. Instead, our research was based on a conﬂict view of industrial\norganizations in our society. In the interest of emancipation, we deliberately made the choice of siding with workers and their organizations, supporting the\ndevelopment of their resources for a change towards democracy at work (Sandberg, 1979; Ehn & Sandberg, 1979). We found it necessary to identify with the\nwe-feeling of the workers' collective rather than with the overall we-feeling and \"modern management\" attempts to create in order to elicit greater effort from the\nwork force. Although trade unions had a structure that was problematic for functioning as vehicles for designing for democracy at work, they were also the only\nsocial force that in practice could be a carrier of that ideal.\nFrom Sociotechnical Solutions to Work-Oriented Design\nIt is difﬁcult to overstate the inﬂuence of the sociotechnical approach on user participation and industrial democracy initiatives (Kubicek, 1983) in Scandinavia\nin the early 1970s. Hence, it may appear paradoxical that some Scandinavian researchers and trade unions developed the work-oriented approach to\n\ndemocratization of design and use of computer-based systems in opposition to the sociotechnical tradition rather than within that tradition. I will try to explain\nwhy, and outline the main points of this alternative, \"collective resource\" approach.\nAlthough initially implemented in Norway, the widespread use of the sociotechnical approach in Scandinavian industry took place in Sweden. Thoralf Qvale, in\none of the evaluations of the sociotechnical approach to democratization in Norway, gives the following explanation:\nApart from the researchers, there are very few persons trying to convey experience from one company to another. In Sweden, \"job satisfaction\" and\n\"productivity\" have been the slogans, and a network of employers/production engineers have taken care of the diffusion. In Norway, the slogans\nwere \"industrial democracy\" and \"participation,\" and the union networks were expected to play a central part. As explained, ideological support has\ncome from the top of LO (the Norwegian national trade union federation), but the practical involvement from the individual unions' ofﬁcials has\nsystematically been lacking. (Qvale, 1976)\nIn the late 1960s in Sweden, rapid technological and structural change was considered a problem by both the trade unions and employers. The unions were\nconcerned about deskilling, lack of inﬂuence, health, and safety. Employers experienced personnel problems in recruitment, turnover, and absenteeism, and\nproduction problems in efﬁciency, planning, and quality. Both parties came to see the Tayloristic organization of production--its narrowly specialized jobs and\nseparation of conception and execution--as the source of these problems. The sociotechnical experiments in Norway seemed a promising way forward.\nSimilar experiments were initiated by the central unions and employer organizations jointly in both private and public sectors in Sweden. Increased job\nsatisfaction and higher productivity were considered equally important goals in these tests. Several of the experiments that started in the late 1960s came up with\ninteresting ideas on work organization and democratic participation, but practical implementation was a different story, as explained by Ake Sandberg:\nHowever, the second phase of deciding upon an actual program of change made manifest differences of interest: management was primarily seeking\nsolutions to personnel problems and possibilities for better control of the wages, whereas unions viewed the experiments as part of a strategy for\ndemocratization and union inﬂuence at various levels. (Sandberg, 1982)\nMost of the Swedish sociotechnical experiments were controlled by local management and coordinated by the Technical Department of the Swedish Employers'\nConfederation (SAF). The employers were obviously satisﬁed with the sociotechnical approach but not with the joint experiments. The LO (the Swedish national\ntrade union federation) was also skeptical of joint work, as expressed in a program document:\nThis method of working proved difﬁcult to implement. Later, when the conﬂict of views between the two sides with regard to industrial democracy\ndevelopment became more manifest, the problems grew greater. Within the private sector, SAF drew its own conclusions from this fact and set up its\nown development projects with the aid of its Technical Department. In its development projects, SAF stressed the individual in a form which\ncomplicated collective solutions and the possibilities available to the trade union movement. (Swedish Federation of Trade Unions, 1977)\nIn 1975, SAF launched a new sociotechnical strategy. The Technical Department of SAF coordinated the \"new factory\" project, which aimed at creating more\nstable production systems based on the principle of coordinated independence of small subsystems (Arguren & Edgren, 1979). This principle was not new--it\ncame from basic sociotechnical theory--but this project used a different strategy. On the one hand, it went further than earlier projects--it did not accept\nproduction technology as given, but as something that should be designed to allow the control of semiautonomous groups rather than individuals. On the other\nchanges were restricted to the shopﬂoor production level, and the vertical division of labor was not altered at all. Management's overall control was therefore\n\nstrengthened. Democratic participation was not one of the aims of these experiments (Kronlund, 1978). The internationally known production technology at the\nVolvo Kalmar plant is as good an example as any of these new experiments. Participation for democracy was not an aim of the design (Ehn & Sandberg, 1979).\nAs we understand it, democratization of design and the use of computer-based systems in the Scandinavian setting had to be based on strong local union\ninvolvement. In practice, the sociotechnical approach had failed to support such democratization. The ﬁrst action program on industrial democracy and\ncomputers from LO, issued in 1975, outlined the situation and union strategy:\nThe workers and the trade unions are not satisﬁed with managers and their experts who say they develop systems for planning and control which\ntake human beings into consideration by paying attention to needs for self-realization and the social impact of technical systems, etc. On the\ncontrary, the unions must work for a situation that makes it possible for workers to develop their own organizational and knowledge resources. This\ncreates the capability to scrutinize and inﬂuence, via negotiations, the various aspects of corporate planning and control, and, by extension, to\ndevelop worker-controlled systems. Thus, the present situation in organizations makes increasing demands upon the commitment and knowledge of\nthe workers. The crucial point is whether these demands become absorbed in an employers' strategy for decentralization and so-called autonomous\ngroups, or whether they will be developed within a workers' strategy for democratization, transcending the level of the work organization. (Swedish\nFederation of Trade Unions, 1975)\nThis critique of the sociotechnical approach should not be seen as a complete rejection of all aspects of the sociotechnical approach. Many of the sociotechnical\ntools are extremely useful in analyzing work organization and production technology, and the job requirements and group autonomy criteria are, when taken\nseriously, important criteria for democracy at work. The problem is that these requirements have often disappeared in the practical application of the approach.\nThis ﬂaw reﬂects questionable assumptions of harmony between social forces and a lack of sensitivity to the pervasive inﬂuence of the asymmetrical distribution\nof power. The critique is therefore not directed at sociotechnical design methods but at its theory and practice in the context of the democratization of work. We\nshould also note that over the past decade the sociotechnical approach has evolved in a much more participatory and less manipulative direction (Gustavsen,\n1985; Hedberg, 1980), making it more of an instrument for democratic design.\nIn the early 1970s, however, the sociotechnical approach seemed inadequate for democratizing the design and use of computer-based systems in the workplace.\nWe had to look for an alternative based on a historical, social, and political understanding of the Scandinavian situation--an alternative that allowed the trade\nunions to play a major role. These were basic criteria in the emerging work-oriented approach to the design of computer-based systems.", "snippet": "DESIGNING FOR DEMOCRACY AT WORK The democratic ideal is a beautiful human invention: Every human should have the right to participate equally in decisions concerning his or her lif"}, {"page": null, "stem": "ehn-3", "section": "The NJMF Project", "text": "The NJMF Project\nIn 1970, the Norwegian Iron and Metal Workers Union (NJMF) decided to initiate research of its own. When the NJMF project was ﬁrst set up, the design was\nquite traditional. It involved a steering committee, a project group, and associated local unions at four different work places. The associated local unions were to\nact as reference groups. The project group consisted of two researchers and two staff members from the national union, and, according to the research plan, the\nresearchers were to carry out a number of investigations in close cooperation with the two other members of the project group. Those investigations included:\n1. A study of two or three computer-based planning and control systems\n2. A survey of the goals of the union in areas such as working conditions and control of organizations;\n3. Formulation of demands on computer-based systems based on the survey;\n4. An evaluation of the need for knowledge within NJMF in the areas of planning, control, and data processing, and possibly development of teaching\nmaterial.\n\nHowever, as the project progressed, it turned out to be impossible for the union people involved to apply the project's ﬁndings to the daily work at the factories,\nthe local unions, and the national unions. The original project design had to a large extent been copied from a traditional research project approach used by\nmanagers and management consultants in a context where the goals were clear and the means for applying the project results had been discussed for decades.\nFor the unions, there had been no extensive discussions on planning, control, and computer-based systems, and there were no established or clear goals for their\ninvolvement.\nA completely new research strategy had to be developed. In the new strategy, the most important change was the new role to be played by the local unions.\nInstead of supporting the researchers, the researchers would support them. The local unions would choose the topics for study from important problems at the\nworkplace, and they would receive assistance from external consultants as well as consultants and other resources provided by the company. At each of the four\nworkplaces, a number of investigative groups consisting of union members was formed to\n1. Accumulate knowledge about planning, control, and data processing;\n2. Investigate selected problems in these areas, that were considered of special importance by the local unions; and\n3. Take actions directed at management to change the use of new technology.\nThe groups always began with discussions of practical workplace problems, problems with which every worker was familiar. Attempts to analyze and to solve\nthese problems led to the search for new knowledge and the start of an educational process. The groups met regularly, for two to three hours at least twice a\nweek, and between the meetings, the members did a lot of \"homework,\" such as preparing proposals, discussing ideas with fellow workers, and participating in\ndifferent kinds of educational activities.\nOne investigation group made evaluations of some of the computer-based planning and control systems in the company, including an on-line production\ninformation system under development. The other investigation groups evaluated experiences of participation in the planning of a new plant, made proposals for\nreorganizing one of the main assembly lines, and drafted a company policy action program for the local union. One of the most tangible, and certainly the most\nwidely studied and publicized outcome, of the NJMF project was the earlier-mentioned data agreements. These agreements primarily regulate the design and\nintroduction of computer-based systems, especially the availability of information. The ﬁrst agreement, a local one, was signed at the beginning of 1974. It was\nfollowed in April 1975 by a central agreement between the Norwegian Trade Union Federation and the Norwegian Confederation of Employers. A large number\nof local agreements soon followed, as did the election of numerous so-called data shop stewards, a new kind of shop steward introduced in the central\nagreement.\nAmong other things, the central agreement stated:\nThrough the shop stewards, the management must keep the employees orientated about matters that lie within the area of the agreement in such a\nway that the shop stewards can put forward their points of view as early as possible and before the management puts its decisions into effect. The\norientation must be given in a well-arranged form and in a language that can be understood by nonspecialists. It is a condition that the\nrepresentatives of the employees have the opportunity to make themselves acquainted with general questions concerning the inﬂuence of computterbased systems on matters that are of importance to the employees. The representatives must have access to all documentation about software and\nhardware within the area of the agreement. (Norwegian Employers Federation and Norwegian Federation of Trade Unions, 1975)\nThe NJMF project inspired several new research projects throughout Scandinavia and the development of a research tradition of cooperation between\nresearchers and workers and their trade unions. This tradition is known as the collective resource approach, or the Scandinavian approach to work-oriented\n\ndesign .", "snippet": "The NJMF Project In 1970, the Norwegian Iron and Metal Workers Union (NJMF) decided to initiate research of its own. When the NJMF project was ﬁrst set up, the design was quite tra"}, {"page": null, "stem": "ehn-4", "section": "The DEMOS Project", "text": "The DEMOS Project\nIn Sweden, the DEMOS project on \"trade unions, industrial democracy, and 1975, and lasted four years. The Swedish Trade Union Confederation (LO)\nsupported the project, with its \"data council\" acting as an advisory group. The project was carried out by an interdisciplinary research team computer science,\nsociology, economics, and engineering) in cooperation with workers and their trade unions at four different enterprises-- a daily newspaper, a locomotive repair\nshop, a metal factory, and a department store.\nThis cooperative effort tried to identify possibilities for the unions to inﬂuence the design and use of computer-based systems at the local level in the companies.\nIt emphasized what the unions could do to safeguard and promote their members' interest in meaningful work when the technology, the work organization, and\nthe supervision of work are altered. As a complement to these local activities, the project also sought to examine obstacles and limits confronting this\ndemocratization process.\nThe design work at a locomotive engine repair shop in Orebro serves as an example of the local approach to the DEMOS project. In 1974, the State Employees'\nUnion was informed by the State Railway's central administration that a computer-based planning system, ISA-KLAR, would be introduced in its work shops in,\namong other places, Orebro. The main responsibility of the repair shop in Orebro was engine maintenance.\nManagement wanted to use ISA-KLAR to adapt the general maintenance system to local circumstances, and, in the process, to test ISA-KLAR. The union had\nwon an elimination of piecework at the repair shop, and management hoped ISA-KLAR would help it redesign the workplace and develop automatic work\norders and instructions to direct employees.\nTo implement ISA-KLAR, management formed project groups that included at least one trade union representative each. These groups interviewed workers in\nthe workplace on how they carried out their jobs. The workers' tasks were then analyzed into smaller steps and the information coupled with an MTM database\ncompiled from several big companies. ISA-KLAR used the combined information to specify detailed work steps, including their timing and sequence, and the\ntools to be used. The level of detail was very ﬁne. The computer generated work sequences such as: (I) get tools A and B, (2) go to carriage, (3) crawl into\nposition, (4) remove cotter pin, (5) remove washer and bolt, (6) repeat steps 3 through 5 for other bolts, (7) remove bolts, etc.\nAfter two years' work with ISA-KLAR, the union turned to DEMOS to resolve dissatisfaction with its lack of inﬂuence and information on the project. In March\n1976, the union established an investigative group of its own with 14 participants. At ﬁrst, the local union asked for researchers from DEMOS to serve only as\n\"data experts\" to check the timings of the various tasks that were to be incorporated into the computer-based system for measuring performance. In subsequent\ndiscussions, the union researchers agreed that the key implication of ISA-KLAR--that work on the shopﬂoor could be deskilled--was a far more signiﬁcant issue\nfor investigation than the timing of steps in the performance of various tasks.\nThey shifted the investigation's focus to the whole question of production planning. There was further agreement that the union should conduct its own\ninvestigation, using the DEMOS researchers, separate from that of the management project groups. The DEMOS researchers would provide technical expertise\nin an analysis of the computer-based system and a structure for the union study.The union's basic investigation was completed in June 1977. Followup by the\nlocal union committee and researchers consumed another year.\n\nThe group's ﬁndings were summarized and transformed by the union into demands for local agreements of codetermination and rationalization. As a ﬁrst step,\nthe group issued a report describing the current work situation, pointing out what was good and what was bad. This description was then used as a basis for\nfurther studies regarding planning, control, and computer use, as well as for collective agreements within the Joint Regulation Act (MBL). It should be\nemphasized that the investigation was initiated before the introduction of MBL.\nThe report stressed that the changeover from piecework to a system of ﬁxed monthly wages was extremely important, not only in terms of group solidarity\namong the workers and job satisfaction, but also in terms of the quality of production. Lack of planning and an uneven rate of work on the engines had created\nmajor problems, and the fact that neither the tools nor the spare parts were always available had been a great source of irritation at all workshops. Too much time\nwas taken up searching for tools and spare parts. The poorly maintained work facilities had caused a number of problems in the work environment, such as\ndraughts and working positions that were damaging workers' health. Uncertainty over the consequences of ISA-KLAR did not make the working conditions any\nbetter, and there was great dissatisfaction about the lack of information workers were receiving.\nThe investigation was completed by studies of various topical issues important to the trade union. These studies gave rise to a special group on planning, control,\nand computer use. This group compared the principles of Taylorism to the current work situation at the workshops and reviewed basic facts on computers,\ndesign, and planning methods in order to broaden worker discussions and to elicit views from as many members as possible.\nOne demand of the union--presented in various management project groups--was that problems with the planning, material administration, and work\norganization be solved before any discussion of computer-based time measurement. However, it became obvious that the union's chances of inﬂuencing the\ndesign of production planning by participating in the project groups were more or less illusory. Under the cover of technical discussions, management and its\nconsultants continued to develop ISA-KLAR. The basic question of how planning in the shops would be conducted in the future never appeared on the agenda.\nIn response to management's investigation, and based on its own analysis of ISA-KLAR, the union's investigation group concluded that the system had to be\nstopped until an agreement on codetermination could be reached that would regulate its design and use. The local union demanded, and got, central union\nsupport for this position.\nManagement ofﬁcially accepted the position of the union and appointed planning groups to \"construct and test a planning model\" for two different items in the\nproduction process (railway truck components and work on certain types of engines). Each of the planning groups consisted of two repair workers, a supervisor,\nand a production technician.\nThe investigation group of the union collaborated with the two planning groups. It appointed workers from its own investigation on ISA-KLAR as union\nparticipants and supported them. In practice the repair workers themselves did the design work. A technical specialist was asked to look over the proposals, and\nonly minor adjustments were made.\nAlthough the planning groups had very little time at their disposal, they managed to present concrete propositions on changes in work organization as well as\nother conditions. Their basic proposition was that repair workers should be granted ﬂexibility in their work--predemolition, demolition, test of cracks, welding,\ninstallation, mounting of wheel axles, and ﬁnal installation. Flexibility meant that all workers would participate in the entire work cycle, from demolition to ﬁnal\ninstallation, and that all workers should all be able to handle all the tasks. The main emphasis were on skill, training, and job rotation. Special emphasis was\nplaced on the work teams' right to plan their own work. This was considered necessary not only as a move towards democratic work organization but also as a\nmeasure facilitating production.\n\nThe repair workers claimed that their proposition had demonstrated that they could have a well-functioning workplace without ISA-KLAR. The local union that\ntheir approach could serve as a model for other workplaces as well. Its experiences were reﬂected in May 1978 in a number of demands that served as a basis for\nlocal agreements on rationalization and codetermination on\nthe design and use of computer artifacts. The demands were adjusted to MBL and to a central collective agreement on codetermination. Among the demands\n1. That long-term planning be conducted by management for (among other things) technical development, training, and staff policy;\n2. That repair and maintenance work be carried out within the company;\n3. That rationalization not reduce the requirements for skilled repair personnel; and\n4. That rationalization not result in work measurement of individuals or groups or in incentive payments of any kind.\nWith special regard to the design process, the union demanded\n1. That directives for a project be negotiable before the project starts;\n2. That design methods be approved by the union;\n3. That investigations in the design work not only include technical andeconomic considerations, but also changes in employment, work environment,\nwork organization, and possibilities for cooperation, codetermination, and development in the daily work;\n4. That the union be provided the necessary resources for conducting a parallel independent investigation;\n5. That the cost for these resources be calculated as part of the investment in the rationalization;\n6. That participation by trade union representatives and users be a natural aspect of the design work, and that it be planned to allow this; and\n7. That participants receive what the union regards as the necessary training to participate in the design work.\nWhat has been the long-term impact of the DEMOS investigation work at the repair shop in Orebro? We ourselves did not conduct such evaluations, but a report\n(Brulin, 1988) from an ongoing democratization project at the State Railroad sums up developments during the decade since DEMOS in the following way:\nThe trade union work in Orebro from DEMOS onward has given a trade union perspective that perhaps is best formulated in the title of the DEMOS\nreport: \"We are opposed to Detailed Control.\" The collective agreement on design and use of computer-based systems created conditions for a\ndialogue with management. The repair shop in Orebro got a new managing director with a view on efﬁcient organization that, to a great extent,\noverlaps the trade union perspective. In summary, as we understand it, what happened and is happening in Orebro can be explained by the abovementioned three motivating forces: a trade union perspective, use of the collective agreement on design and use of computer-based systems, and a\nrea dialogue with management.", "snippet": "The DEMOS Project In Sweden, the DEMOS project on \"trade unions, industrial democracy, and 1975, and lasted four years. The Swedish Trade Union Confederation (LO) supported the pro"}, {"page": null, "stem": "ehn-5", "section": "The UTOPIA Project", "text": "The UTOPIA Project\nAlthough growing, the extent and impact of research on designing for democratization in NJMF, DEMOS and similar projects did not meet initial expectations.\nIt seemed that one could only inﬂuence the introduction of technology, training, and the organization of work to a certain degree. From a union perspective,\nimportant aspects for workers such as the opportunities to develop skills and to increase inﬂuence on work organization were limited. Societal constraints,\nespecially those of power and resources, had been underestimated. In addition, the existing technology presented signiﬁcant limits to ﬁnding desirable alternative\nlocal solutions.\n\nTo broaden the scope of available technology, we decided to try to supplement the existing elements of the work-oriented approach with union-based efforts to\ndesign new technology. The main idea of the ﬁrst projects, to support democratization of the design process, was complemented by the idea of designing tools\nand environments for skilled work and good-quality products and services. To try out these ideas, the UTOPIA project was started in in 1981 as a cooperation\nbetween the Nordic Graphic Workers' Union and researchers in Sweden and Denmark with experience from the ﬁrst generation of work-oriented design projects.\nIt was a research project on the trade-union-based design of, and training in, computer technology and work organization. The research focused on page makeup\nand image processing in the newspaper industries. In the Scandinavian languages, UTOPIA is an acronym for Training, Technology, and Products from a Quality\nof Work Perspective.\nBesides working directly in the project group, the Scandinavian graphic workers' unions followed and supported the project through a reference group consisting\nof representatives from Sweden, Denmark, Finland, and Norway, appointed by the Nordic Graphic Workers' Union (NGU). At various stages, the project\ninvolved the computer supplier Liber/Tips and the newspaper Aftonbladet in Stockholm.\nIn the UTOPIA project, we developed a design approach that we called the tool perspective (Ehn & Kyng, 1984; see also B0dker, forthcoming, and\nKammersgaard, 1985). The tool perspective was deeply inﬂuenced by the way the design of tools takes place within traditional crafts. The idea is that new\ncomputer-based tools should be designed as an extension of the traditional practical understanding of tools and materials used within a given craft or profession.\nDesign must therefore be carried out by the common efforts of skilled, experienced users and design professionals. Users possess the needed practical\nunderstanding but lack insight into new technical possibilities. The designer must understand the speciﬁc labor process that uses a tool. Computer-based tools\npresent special challenges because they are technically complex but, if designed well, can be simple and powerful for the skilled worker.\nIn the UTOPIA project, we tried such a process of mutual learning. Graphics workers learned about the technical possibilities and constraints of computer\ntechnology, while we as designers learned about their craft or profession. Initially, the group worked to build a mutual understanding of the speciﬁc labor\nprocesses of the profession, of the design situation, and of the technical possibilities and limitations. Apart from discussions, visits to workplaces employing\ndifferent generations of technology and visits to research laboratories and vendors proved to be important early activities.\nHowever, as designers we ran into severe difﬁculties when we tried to communicate with the graphic workers using traditional approaches such as data or\ninformation ﬂows. The situation drastically improved when we shifted towards a design-by-doing approach. With the use of mockups and other prototyping\ndesign artifacts, the skilled workers could actively participate in the design process and express their craft skills by actually doing page makeup. (The theoretical\nfoundation of the tool perspective and these design methods will be discussed in the second part of this chapter.)\nThe UTOPIA project was in many ways a success story. An appreciative article in Technology Review concluded:\nSo the impact of Utopia is continuing to expand, and the idea that workers and their unions have an important role in the design of new technology\nis reaching a wider and wider audience. Today Scandinavia, tomorrow, perhaps, the rest of the world. (Howard, 1985)\nHowever, as in all success stories, UTOPIA had its share of failures as well. The failures were due to the limited resources in Scandinavian countries rather than\nto limitations of the model itself. The system, TIPS, was tried at several newspaper test sites, but before ﬁnal development as a market product, the vendor ran\nshort of capital and was forced to sell the rights to the system to another company interested mainly in image processing. These experiences indicate that a\nshortage of both technological competence and ﬁnancial resources within small Scandinavian countries may keep them from successfully competing in the\ninternational technological race.\n\nThe UTOPIA project clearly showed that the latest technology may be designed and put into use to improve, not decrease, the skills of graphics workers.\nWhether the Scandinavian newspaper owners will exploit the possibilities for a constructive discussion on technology, organization, and training depends to a\ngreat extent upon whether the graphics workers and journalists succeed in overcoming their professional clash of interests and develop a common strategy.\nThe historical study conducted by the project provides some insight into this. New technology creates \"demarcation disputes\" between professional groups as\nwell as between trade unions. The UTOPIA project demonstrated that solutions can, however, be found. For newspapers, there are technical and organizational\nalternatives that do not harm any professional group and that ensure product quality and reasonable efﬁciency. Nevertheless, the lack of trade union cooperation-\n-rather than the technology, the newspaper owners, or the equipment vendors--may become the decisive factor frustrating the dream of UTOPIA.\nThe design process in the UTOPIA project was really utopian. The preconditions for such a design process are not present in corporate business as we know it\ntoday. Resources for skilled workers, trade union staff, and computer and social scientists to work together over a long period of time designing tools in the\ninterest of the end users do not generally exist as yet, not even in Scandinavia, UTOPIA was not only a challenge to design, but also to a more democratic\nworking life.\nOther Projects\nThe NJMF, DEMOS, and UTOPIA projects are by no means the only projects of the participatory work-oriented design approach, nor is the approach restricted\nto the design and use of computer-based systems. Some other projects within or related to this Scandinavian tradition are:\n1. The DUE project on \"democracy, education, and computer-based systems\" was a sister project to DEMOS carried out in Denmark (Kyng &Matthiassen,\n1982).\n2. The Dairy Project, which was conducted by architects but used methods and perspectives similar to the DEMOS and DUE projects (Steen & Ullmark,\n1982).\n3. The PAAS project, which in addition to contributing to a theoretical understanding of changes of skills when computer artifacts are used also\ncontributed to methods for trade union design work (Goranzon, 1984).\n4. The Bank Project, which was conducted by researchers originally from the sociotechnical tradition, although they worked closely with trade unions and\nwith methods and perspectives very similar to the work-oriented design projects (Hedberg & Mehlmann, 1983).\n5. The TIK-TAK project, in which local trade unions in the public sector developed union resources in relation to \"ofﬁce automation\" (Foged et al., 1987).\n6. The Carpentry Shop project, which worked with methods and a design perspective similar to the UTOPIA project but within a \"low-tech\" area (Sjogren,\n1979-83).\n7. The Florence project, focusing on the work situation of nurses, which was another second-generation work-oriented project designing computer-based\nenvironments for skill and quality production (Bjerknes & Bratteteig, 1987).\nThese are by no means the only work-oriented design projects. Today the approach is no longer limited to Scandinavia. Despite a very different trade union\nstructure, there are several projects using similar perspectives and methods in Britain (Williams, 1987).\nSome Lessons on Design and Democratization\nSome of the general lessons learned from DEMOS, UTOPIA, and other work-oriented design projects include:\n\n1. A participatory approach to the design process is not sufﬁcient in the context of democratization at work.\n2. In democratization of design and use of computer-based systems in Scandinavia, trade unions--especially on a local level--must play an active role.\nSome speciﬁc lessons about the participation of local trade unions in
