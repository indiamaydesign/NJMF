t nr. 1 fra NJMF's forskningsprosjekt,\nmars 1972):\n\nVI\nSvein Aarset ved Grafisk kontor, Norges Teknisk-Naturviten™\nskapelige Forskningsråd, har tegnet illustrasjonene\netter egne og felles ideer. En del er bare uttegnet som\nskisser, dels på grunn av tidsnød, dels fordi vi regner\nmed at en først senere vil kunne vurdere illustrasjonenes\nendelige utforming.\nNoen av skissene i kapittel 4 bygger i sin foreløpige\nutforming på en del tegninger av standard datamaskin-\nenheter i boka \"Datamaskiner\" av John O.E. Clark.\nPersonalet på Norsk Regnesentral har gjort en stor innsats\nunder sterkt tidspress for å få maskinskrevet og trykt boka.\nDe som har vært med på dette slitet skal ha en stor og vel\nfortjent takk!\n3.\nLitt om arbeidet med boka.\nMange av dem som kommer til å lese denne boka, vil ikke\nkjenne til NJMFs forskningsprosjekt. Vi siterer derfor\nfra \"Innledning\" til \"Oppbygging av kunnskaper om data-\nbehandling, planlegging og styring innen Norsk Jern- og\nMetallarbeiderforbund\", av Kristen Nygaard og Olav Terje\nBergo i samarbeid med Jan Balstad og Roar Løver\n(Arbeidsrapport nr. 1 fra NJMF's forskningsprosjekt,\nmars 1972):", "stems": ["IMG_2397", "IMG_0688"]}, {"year": 1972, "date": "Mai 1972", "box": "Box 670492", "desc": "A Norwegian research report cover page titled 'Databehandling, planlegging og styring' (Data handling, planning and control) authored by Kristen Nygaard and Olav Terje Bergø, Part I on data handling systems and language, published by Norsk Regnesentral in Oslo in May 1972.", "stem": "IMG_2389", "ocr": "Arbeidsrapport nr. 2 fra\nNorsk Jern- og Metallarbeider-\nforbunds forskningsprosjekt om\nDatabehandling, planlegging og\nstyring.\nPublikasjonsnr. 3253\nDATABEHANDLING, PLANLEGGING OG STYRING\nGrunnbok for fagbevegelsen\nav\nKristen Nygaard\ni samarbeid med\nOlav Terje Bergo\nDel I\nDatabehandling, systemer og språk\nNorsk Regnesentral\nForskningsvn. IB, Blindern, Os1o 3\nMai 1972"}, {"year": 1972, "date": "mai 1972", "box": "Box 670492", "desc": "A foreword (forord) written by Leif Skau for the Norwegian Association of Iron and Metal Workers (Norsk Jern- og Metallarbeiderforbund) dated May 1972, discussing technological and administrative developments in electronic data processing within the industry.", "stem": "IMG_2390", "ocr": "I\nFORORD\nInnenfor den teknologiske og administrative utvikling i\nindustrien inntar elektronisk databehandling en stadig\nbredere plass.\nInnføringen av elektronisk databehandling\ni bedriftene påvirker såvel bedriftens organisasjon som\nden enkeltes arbeidsforhold. Derfor er det av den største\nviktighet at arbeidstakerne - og da i første rekke gjennom\ntillitsmennene - skaffer seg forutsetninger til å kunne\nvære med på å styre utviklingen i en retning som er i\nsamsvar med arbeidstakernes interesser.\nDette er bakgrunnen for det forskningsoppdrag om bruk av\nmoderne planleggingsmetoder som tok til for Norsk Jern-\nog Metallarbeiderforbund i 1970.\nSom et viktig ledd i prosjektet inngår undervisningsmateriell\nsom tar opp problemene sett fra fagbevegelsens synspunkt,\nog som gir det kunnskapsunderlag som er en forutsetning\nfor at arbeidstakerne kan få innflytelse over planleggingen\nog styringen i bedriftene.\nDenne delen av de samlede forskningsrapportene er ment å\nvære et læremateriell innenfor tillitsmannsopplæringa på\ndette området. Det er vårt håp at den vil bli til nytte\nbåde innenfor Norsk Jern- og Metallarbeiderforbund og\nellers i fagbevegelsen.\nNorsk Jern- og Metallarbeiderforbund\nmai 1972\nLeif Skau"}, {"year": 1972, "date": "17.5.1972", "box": "Box 670492 · Bedriftsdemokrati – Arbeidernes Ungdomsfylking", "desc": "A typed Norwegian document dated May 17, 1972, signed by Kristen Nygaard, discussing Norwegian labor research funding and references to Marx and Engels in connection with liberation work.", "stem": "IMG_2404", "ocr": "4.\nXII\nbegynnelsen av blir diskutert blant medlemmene.\nDet er vårt håp at denne arbeidsrapporten skal danne et\ngrunnlag for en slik diskusjon\".\nKapitlene 11 og 12 er stort sett hentet fra Arbeidsrapport\nnr. 1.\nHvordan boka skal brukes.\nNorsk fagbevegelse står overfor veldige oppgaver i tida\nsom kommer•\nDen nasjonale og internasjonale kapital-\nmakten blir stadig sterkere, blant annet fordi den ved\nforsknings- og utredningsarbeider skaffer seg og tar i\nbruk nye og mer effektive planleggings- og styringsmetoder.\nSamfunnsutviklingen er inne i et spor som fagbevegelsen må\nvære med på å frigjøre oss fra. Til det trenger den nye\nkunnskaper. \"Arbeiderklassens frigjøring må være dens\neget verk\", sier Marx og Engels. Denne boka er ment å\nvære et redskap blant mange andre i dette frigiørings-\narbeidet.\nOs1o, 17.5.1972\nKristen Nygaard\n\nXII\nbegynnelsen av blir diskutert blant medlemmene.\nDet er vårt håp at denne arbeidsrapporten skal danne et\ngrunnlag for en slik diskusjon\".\nKapitlene 11 og 12 er stort sett hentet fra Arbeidsrapport\nnr. 1.\n4. Hvordan boka skal brukes•\nNorsk fagbevegelse står overfor veldige oppgaver i tida\nsom kommer. Den nasjonale og internasjonale kapital-\nmakten blir stadig sterkere, blant annet fordi den ved\nforsknings- og utredningsarbeider skaffer seg og tar i\nbruk nye og mer effektive planleggings- og styringsmetoder.\nSamfunnsutviklingen er inne i et spor som fagbevegelsen må\nvære med på å frigiøre oss fra. Til det trenger den nye\nkunnskaper. \"Arbeiderklassens frigjøring må være dens\neget verk\", sier Marx og Engels. Denne boka er ment å\nvære et redskap blant mange andre i dette frigiørings-\narbeidet.\n0s10, 17.5.1972\nKristen Nygaard", "stems": ["IMG_2404", "IMG_0689"]}, {"year": 1972, "date": "1972-06-12", "box": "Box 2", "desc": "A typed document in Norwegian discussing photographic/technical procedures, referencing multiple individuals and organizations including mentions of 'Densitometer' and various technical specifications related to image processing or archival work.", "stem": "IMG_1128", "ocr": "NORSK REGNESENTRAL\nForskningsveien 1b\nOslo 3.\nRapport fra møte i Polyteknisk forening:\nTirsdag 14.3.72\nOlav Bergo\nPierre Agrain: Research Policy in an Extended Europe\nMøtet markerte NTNF's 25-års jubileum.\nPierre Agrain er professor og \"Délégue Général á la Recherehe\nScientifique et Technique\" i Paris.\nHan er formann i\nEF's komite for teknisk forskning og har ledet arbeidet\nmed Agrain-rapporten (finnes i Hovedkomiteen for norsk\nforskning).\nAgrain's foredrag var en forholdsvis generell oversikt over\nholdninger og organisasjon i EF's og Frankrikes tekniske forskning.\nReferat finnen i Aftenposten for 15. d.m.\nDet var ikke EFssom ble\nhovedtema i debatten.\nBratz (Industriforbundet), Gøthe (Industri-\ndepartementet), Major (NTNF) holdt bestilte debatt-innlegg og\ndiskusjonen gikk først og fremst på forsknigens organisasjon.\nAgrain argumenterte først og fremst for en sentralisert styring\nav forskningen for dermed å kunne prioritere sektorene ut fra et\nhelhetssyn.\nDette mente han var nødvendig, fordi det nå gjaldt å\nprioritere ned prestisje-preget mammut-prosjekter og sette større\nressurser inn på det som står fram som samfunnets behov.\nHer\ntrengs ikke store og institusjonaliserte prosjekter. Små-prosjekter\nuten noen byråkratisk overbygning vil være langt bedre egnet.\nDette synet gikk spesielt Major meget sterkt imot.\nLa gå med\nsentralisert prioritering og styring på nye forskningsfelter,\nsa han, men på etablerte forskningsfelter (industriforskningen)\n4-klubb's = møter\nFRAMDRIFISNOTER"}, {"year": 1972, "date": "19. juni 1972", "box": "G – L0001", "desc": "Meeting minutes from Norsk Regnesentral regarding a data processing, planning and management project (nr. 135002), with attendance by Leif Skau, Harry Hansen, Roar Løver, Olav Bergo, Knut Elgsaas, Kristen Nygaard, Gunnar Broatigon, Svein Dalen, and Knut Lange.", "stem": "IMG_0444", "ocr": "NORSK REGNESENTRAL\nForskningsveien 1B\nOslo 3.\nStyringskomitéen\nMøtereferat\nProsjekt nr. 135002: Databehandling, planlegging og styring.\nNJMF, Mandag, 19. juni kl. 1430 - 1700\nTilstede: Leif Skau, Harry Hansen, Roar Løver, Olav Bergo,\nKnut Elgsaas, Kristen Nygaard, Gunnar Brostigen,\nSvein Dalen, Knut Lange.\nDagsorden:\n1. Referat fra AU-møte 9. juni 1972\n2. Regnskap\n3. NJMF' s prosjekt-seminar\n4. Hydraulik A.S. - bedriftsklubbens kurs\n5. Forbundsstyrets behandling av prosjektet\n6. Fortsettelse av diskusjonen på forrige SK-møte om AR2\n7. Eventuelt.\n1. AU-møtet\nReferat forelå ved Olav Bergo.\net eget notat fra Kristen Nygaard.\nDette var kommentert i\n2. Regnskap pr. 3l. mai 1972 ble lagt fram og godkjent.\n3. NJMF's prosjekt-seminar er lagt til Kongsberg i tiden\n30. august til 2. september. SK's medlemmer vil bii\ninvitert. Det er redegjort for seminaret i notat av\n9. juni fra Jan Balstad.\n4. Kurs ved Hydraulik A.S.\nVerkstedklubben ved Hydraulik A.S. ønsker å knytte sammen\nforberedelsene til gjennomføringen av bedriftsforsanlingen"}, {"year": 1972, "date": "22. juni 1972", "box": "G – L0001", "desc": "A Norwegian memo or letter page 2, dated 22 June 1972, signed by Olav Terje Bergo, discussing research projects, AR2 copyright issues, and related administrative matters.", "stem": "IMG_0445", "ocr": "~2~\nog arbeidet med forskningsprosjektet. I den forbindelse\nønsker de at forskerne og en av de øvrige medlemmene i AU\nkommer oppover på prosjektets regning og at kursutgiftene\nforøvrig støttes etter vanlige satser. SK godkjente\ndette.\n5. Forbundsstyrets behandling av forskningsprosjektet.\nForskningsprosjektet kom opp til behandling fra kl. 1100\ntil 1300 tirsdag 20. juni. SK's medlemmer møter. Leif\nSkau orienterte om opplegget for møtet.\n6. AR2\na) Videre bruk av AR2\nAOF er meget interessert i utgivelsen av AR2 som billig-\nbok. Det svenske forlaget Studentlitteratur - det\nledende forlaget i Norden på området databehandling -\ner interessert i å samarbeide med et norsk forlag om\nutgivelsen. Dette vil trolig være den rimeligste løsningen.\nCopyright på AR2 ligger hos oppdragsgiver dvs. NJMF. Siden\nprosjektet får en betydelig statlig støtte påhviler det en\nforpliktelse til å offentliggjøre materialet fra prosjektet.\nNJMF må - i samråd med NR - føre forhandlinger med et forlag\nom utgivelsen.\nb) AR2's innhold.\nDet kom til en grundig diskusjon der det ble gitt flere\nkritiske bidrag til rapporten. Hovedkonklusjonen\nvar imidlertid at dette var brukelig og nyttig for NJMF.\n7. Neste møte i SK blir onsdag 13. september kl. 1000 i NJMF.\nOslo, 22. juni 1972\nOlav Terje Bergo"}, {"year": 1972, "date": "8. juli 1972, 9. juli", "box": "G – L0001", "desc": "A Norwegian meeting minutes or report document from July 1972 describing a discussion meeting (diskusjon) with structured sessions on workplace democracy, featuring discussions led by Håkon Røy, Roald Dale, and Olav Dahl regarding work organization and union matters.", "stem": "IMG_0452", "ocr": "- 2 -\nLørdag 8. juli 1972 kl. 0830 - 2130\nGårsdagen diskusjon ble forsøkt strukturert.\nHallvard\nRønning og Olav Terje Bergo\nla fra et utkast til disposisjon\nfor demokrati-programmet med utgangspunkt i plenums-\ndiskusjonen:\n(se vedlegg 1).\nEtter en diskusjon ble det besluttet å stokke avsnittene i\nmotsatt rekkefølge - i samsvar med det pedagogiske prinsipp\nat det kjente og engasjerende skal komme først.\nEtter dette fortsatte diskusjonen om programmets innhold\nmed emnet skiftarbeid og lønnssystem.\nSøndag 9. juli kl. 0930 - 1600\nDiskusjon om:\nVernearbeidet\nKlubbens arbeid\nKonferansen ble avsluttet med en diskusjon om organiseringen\nav det videre arbeid med programmet. Bedriftsklubbens arbeid\nble organisert med tre utrednings-utvalg:\n1. Krav til arbeidsplassen.\nLeder: Håkon Røv\n2. Klubbens arbeid.\nLeder: Roald Dale\n3. Bedriften\nLeder: Olav Dahl\nDet vil først og fremst være Håkon Røv's gruppe som fungerer\nsom rekrutteringsgruppe.\nNye krefter bør etter hvert spres\ndit det er mest behov for innsats."}, {"year": 1972, "date": "7., 8. og 9. juli 1972", "box": "G – L0001", "desc": "Meeting minutes from a Norwegian Business Federation (Norsk Regnsentral) project meeting held July 7-9, 1972 at Nysterstova, Øskogfjøllet, with attendees including Olav Terje Børge, Kristen Nygaard, and others discussing business federation issues and democratic workplace organization.", "stem": "IMG_0451", "ocr": "Norsk Regnesentral\nForskningsveien 1B\nOslo 3.\nMØTEREFERAT NJMF-PROSJEKT\n7., 8. og 9. juli 1972\nNyseterstova, Ørskogfjellet.\nTilstede:\nNorsk Regnesentral: Olav Terje Bergo, Kristen Nygaard.\nHydraulik A.S.\n: Steinar Berle, Olav Dahl, Dagfinn Kvalvåg,\nKåre Osvold, Hallvard Rønning, Håkon RøV,\nGunnar Sandvik, Inge Sårheim, Erling\nWinsjansen\nFredag 7. juli kl. 1900 - 0030.\nKristen Nygaard orienterte om bakgrunnen for konferansen og\nfagbevegelsens problemer i forbindelse med gjennomføringen\nav demokratiske bedriftsforsamlinger.\nErling Winsjansen orienterte om hva for forventinger bed-\nriftsklubben hadde og foreslo at en i utgangspunkt burde gå\nløs på klubbens konkrete problemer.\nOlav Dahl ble valgt til dirigent.\nHallvard Rønning og Olav Terje Bergo refererte.\n(Momenter og synspunkter er forsøkt redigert inn i vedlegg 2.)\nDiskusjonen startet med bedriftens situasjon i forhold til\npotensielt kontrollerende interesser: kunder og kundegrupper,\nfinans-grupperinger, konkurrenter, underleverandører, samarbeids-\npartnere (salg/produksjon).\nDen fortsatte med emnet verne-arbeid og arbeidsmiljø og\nstartet så vidt på emnet skiftarbeid."}, {"year": 1972, "date": "11. juli 1972", "box": "G – L0001", "desc": "Norwegian memo or report from July 1972 signed by Olav Terje Børgo regarding work conducted by a steering committee, naming members Kåre Osvold, Erling Winsjansen, Håkon Røy, Roald Dale, and Olav Dahl, discussing research dissemination and planned activities.", "stem": "IMG_0453", "ocr": "- 3 -\nArbeidet ledes av en styringskomité:\nKåre Osvold\nErling Winsjansen\nHåkon Røv\nRoald Dale\nOlav Dahl\n(formann)\nDenne styrings-komitéen møtes ukentlig for å utveksle.\ninformasjon om arbeidet i utredningsutvalgene og planlegge\ndet videre arbeidet. Det er likeledes denne styrings-\nkomitéen som har ansvaret for at tidsfrister holdes og at\narbeidet i utredningsutvalgene forøvrig går som det skal.\nFør fellesferien orienteres klubbens medlemmer om hvordan\nklubbstyret ønsker å forberede deltakelsen i bedriftsforsamlingen\n. og hvordan forskerne kommer inn i den forbindelse.\nStraks fellesferien er over starter utredningsarbeidet for\nalvor med\net møte i styringskomitéen.\nArbeidet med\nprogrammet så vel som selve programmet tas opp\ntil diskusjon på NJMF's seminar om forskningsprosjektet.\nProgrammet må foreligge som manus ca. 25. november.\nForskerne trekkes inn av klubben som klubbens rådgivere og\nkonsulenter på områdene databehandling, planlegging og styring.\nDet vil være aktuelt med en løpende telefon-kontakt og\nforskerne kan også komme til Brattvåg noen ganger under arbeidet.\nForøvrig kan de formidle kontakter til andre fagfolk og gi\nforelesninger eller bidra med underlagsstoff for programmet\npå områder hvor de har kompetanse.\nKonferansen avsluttet søndag 9. juli kl. 1630.\n11. juli 1972\nOlav Terje Bergo"}, {"year": 1972, "date": "20.8 til 2.9.1972", "box": "Box 2", "desc": "Program for NJ&MF's seminar on research project governance and planning systems at Grand Hotell, Kongsberg, August 20 - September 2, 1972, detailing scheduled sessions and discussion topics.", "stem": "IMG_1126", "ocr": "/\nPROGRAM\nFOR\nNJ&MF'S SEMINAR FOR GJENNOMGÅING AV FORSKNINGSPROSJEKTET\n\"STYRINGS- OG PLANLEGGINGSSYSTEMER\"\nGRAND HOTELL, KONGSBERG\n20.8. TIL 2.9.1972\nONSDAG 30.8.\nK1. 18.00\n19.30\nH-kelubb's = møter\nMiddag\nÅpning av\nseminaret ved forbundsformann\nLeif Skau.\nPresentasjon av deltakerne.\nTORSDAG 31.8.\nK1. 07.00 - 09.00\n09.00\n13.00\n15.00\n16.00\n\"1\n19.00\nFrokost.\nGjennomgang av det foreliggende materialet.\nMaterialets bruksmuligheter og intensjoner.\nVed forskerne/Norsk Regnesentral.\nLunsj.\nFormiddagens program fortsetter.\nDe 4 klubbene redegjør for sine arbeidsfelter:\nHydraulik: Lokalt demokratiprogram.\nNebb:\nBedriftsorganisasjonens forhold\ntil styrings- og planleggings-\nsystemene•\nKV:\nøgland:\nKlubben og KVpol.\nStyre- og planleggingsproblemer\nved flytting av bedrifter eller\ndeler av bedrifter fra klubbens\nsynsvinkel.\nGenerel1 diskusjon over alle redegjørelsene.\nMiddag.\nFRAMDRiFISMOTER\nA 11-"}, {"year": 1972, "date": "23. august 1972", "box": "G – L0001", "desc": "Letter from Olav Terje Bergo at NJMF (Norwegian Computing Center) to Harry O. Hansen at Norsk Jern- og Metallarbeiderforbund, regarding meeting minutes from the Steering Committee meeting on June 19 and announcing the next meeting on September 13 at NJMF.", "stem": "IMG_0443", "ocr": "R\nNORSK RENESENTRAL / NORWEGIAN COMPUTING CENTER\nForskningsen. 1 E, Blindern, Oslo 3, Norway, telejon 46 69 30 Telex 16518\nOslo, 23. august 1972\nHerr Harry O. Hansen\nNorsk Jern- og Metallarbeiderforbund\nFolkets Hus VII\nOslo 1\nVedlagt følger referat fra møte i Styringskomiteen\nfor NJMF's forskningsprosjekt, mandag 19. juni.\nSom avtalt vil neste møte i Styringskomiteen bli\nOnsdag 13. september kl. 10.00 i NJMF.\nVi minner også om NJMF's prosjektseminar på Kongsberg\ni månedskiftet august-september.\nVennlig hilsen\nOlau Terje Bergo\nOlav Terje Bergo\nVedlegg:\nmøtereferat\nOTB/1b\nPost bes adressert til instituttet, ikke til enkeltpersoner."}, {"year": 1972, "date": "4 september 1972", "box": "Box 3", "desc": "A typed letter from Knut Lange at Hedmark/Oppland Distriktshøgskole to Olav Terje Børgo at Norsk Regnesentral regarding a meeting scheduled for October 17 in Oslo and discussion of SK-matte materials.", "stem": "IMG_0513", "ocr": "Knut Lange\nHedmark/Oppland Distriktshøgskole\n2600 Lillehammer\n4 september 1972\nOlav Terje Bergo\nNorsk Regnesentral\nForskningsveien 1 B,\nBlindern - Oslo 3\nKjære Olav Terje Bergo\nTakk for brev.\nDet var vel mulig å få til en samtale. Ivis den, som jeg\ntror, skulle dreie seg om en diskusjon og eventuell presi-\nsering av mine merknader til AR2, Ville det vel ta mer tid\nog kreve en mer umiddelbar nærhet enn en telfonsamtale gjør\nmulig. Jeg har ennå ingen andre møter i Oslo før den 17\noktober, slik at jeg kunne slå to fluer i en smekk, men\ndet kan jo ennå dukke opp. Skal vi si at dersom noe\ndukker opp, prøver jeg a få til en kombinasjon. Hvis ikke\nforsøker jeg å komme til Oslo med morgentoget den 16, slik\nat jeg kan snakke med dere dagen før SK-møtet. Dette forut-\nsetter imidlertid at en bebudet utsettelse av et styremøte\nher ved Distriktshøgskolen faktisk blir foretatt. Ellers blir\njeg opptatt med det den 16. Utsettelsen er imidlertid nokså\nsikker.\nVennlig hilsen\nKunthany?"}, {"year": 1972, "date": "7. september 1972", "box": "Box 3", "desc": "Norwegian administrative document from Norsk Regnesentral regarding a research project (nr. 135002) on data processing, planning and steering, with notes on work progress and a plan to divide the work report into three parts.", "stem": "IMG_0611", "ocr": "NORSK REGNESENTRAL\nForskningsveien 1B\nOslo 3\nNJMF 's forskningsprosjekt i Databehandling, planlegging\nog styring. NR prosjekt nr. 135002\nNotat 7. september 1972\nOmredigering av Arbeidsrapport nr. 2\nVi begynner nå å få en del erfaringer med bruk av Arbeids-\nrapport nr. 2.\nNår det gjelder innholdet, har vi stort sett fått positive\nreaksjoner. En del har vært meget positive, blant annet\nfra AOF-kurset på Sørmarka i mai. Vi har fått en del kom-\nmentarer til det rent faglige fra styringskomiteens medlemmer\nDalen og Lange. Disse vil bli innarbeidet i rapportens neste\noppgave. Vi venter kommentarer fra en del forskere.\nDet'er helt klart at vi må omdisponere stoffet når det skal\nut som Forskningsrapport. Vi kan ikke forutsette at folk vil\nlese forord og innledninger og følge de \"leseplanene\" som blir\nforeslått. Vi må i stedet ordne stoffet slik at folk \"trekkes\"\nvidere av interesse og behov for kunnskapene fra kapittel til\nkapittel.\nVi vil dermed bryte med en mer tradisjonell utvikling av\nstoffet, men kan til gjengjeld oppnå større motivasjon under\nlesningen.\nVi foreslår derfor at Arbeidsrapport nr. 2 blir omdisponert\ni tre deler, slik som foreslått nedenfor:\nDel I Alminnelig innføring\nForord\nInnledning (omarbeidet),\nKapittel l1,\nKapittel 12,"}, {"year": 1972, "date": "11 september 1972", "box": "G – L0001", "desc": "A letter from Knut Lange at Hedmark/Oppland Distriktshøgskole in Lillehammer to Harry O. Hansen at Norsk Jørn- og Metallarbeiderforund in Oslo, dated 11 September 1972, regarding a project and diplomatic relations.", "stem": "IMG_0442", "ocr": "Knut Lange\nHedmark/Oppland Distriktshøgskole\n2600 Lillehammer\n11 september 1972\nHarry O. Hansen\nNorsk Jern- og Metallarbeiderforbund\nYoungsgt. 11\nOslo 1\nKjære Harry\nSom du vil se har jeg fundert videre etter våre samtaler,\nog jeg har snakket med andre, og kommet til en konklusjon\nsom du muligens vil finne litt drastisk, og som kanskje,\nhvis noen skulle ta meg tilstrekkelig alvorlig, kan komme\ntil a sette administrasjonen en del i klemme. Jeg har\nimidlertid kommet til at utbyttet at 1ż års prosjektatbeid\ner så meget annerledes enn det burde være, og mine muligheter\nfor å påvirke utviklingen så liten, at jeg trekker meg•\nJeg regner imidlertid med at de diplomatiske relastioner til\nforbundet opprettholdes, og at du har tid til en prat når\njeg av og til stikker innom.\nVennlig hilsen\nVunt 2\nVedlegg: Kopi av brev til Styringskomiteens formann"}, {"year": 1972, "date": "12. september 1972", "box": "Box 3", "desc": "Norwegian research project report on database handling, planning and management by NJMF, noting contributions from Kristen Nygaard and Olav Terje Bergo, with discussion of club organization problems and passive membership participation.", "stem": "IMG_0616", "ocr": "NORSK REGNESENTRAL\nForskningsveien 1B\nOslo 3\nNJME 's forskningsprosjekt 1 Databehandling, planlegging\nog styring. NR prosjekt nr. 135002\nnr.\nNotat 12. september 1972 ved Kristen Nygaard og Olav Terje\nBergo.\nOversikt_over_ innholdet_i_ Arbeidsrapportene nr:_3=6.\nI løpet av høsten skal de fire bedriftsklubbene som deltar\n1 prosjektet utarbeide hver sin Arbeidsrapport, med\nassistanse fra forskerne ved NR.\nInnholdet i disse rapportene er diskutert med klubbene og\npå Kongsberg-seminaret.\nNEBB :\nMed bakgrunn i samtaler med Johnsen, Sjømoen, Bråten, og\nJohnsen's notat av 9. mai:\nKlubben har problemer med sin organisasjon. Det er vanskelig\nå nå alle medlemmene med informasjon, og andelen av passive\nmedlemmer er for stor. Med klubbmøter når en bare 30% av\nmedlemmene, veă gruppemøter noen flere; 50-60%. Klubben\nhar ikke noe skriftlig informasjonsorgan.\nNå er bedriftsledelsen i ferd med å legge om bedriftens\norganisasjon. Utpå nyåret vil bedriftsforsamling innføres.\nI forbindelse med disse organisatoriske endringene ved\nbedriften, er det nødvendig at klubben tenker gjennom sin\negen organisasjon og arbeidsform med sikte på å endre den."}, {"year": 1972, "date": "13 september 1972", "box": "G – L0001", "desc": "A typed letter in Norwegian from Knut Lange at Hedemarka/Oppland Distriktskole to Forretningsfører Leif Skau of Norsk Jern- og Metallarbeiderforbund regarding organizational and political matters related to labor unions and workplace representation.", "stem": "IMG_0338", "ocr": "Knut lange\nHedmark/Oppland Distriktshøgskole\n2600 Lillehammer\n13 september 1972\nForretningsfører Leif Skau\nNorsk Jern- og Metallarbeiderforbund\nYoungsgt 11\nKjøre Leif Skau\nDette får jo da bli et privat brev.\nJeg har fundert frem og tilbake, og som nevnt i telefonen\nkommet til at jeg kanksje ikke har tenkt nok på konsekvensene\nfor Forbundet og for Harry og Jan og deg hvis jeg trekker\nmeg .\nJeg skulle gjerne ha snakket med Thorsrud om dette, men han\ner bortreist, så jeg får forsøke 3 tenke selv.\nÅrsaken til at jeg trakk mes, var jo, som jeg har skrevet,\nat jeg synes visse sider ved rapporten er uopprettelig\nsvake, og at Nygaards svar på kritiske merknader tildels :\navslører en innsikt som er mangelfull. I tillegg kommer så\ndet at ieg føler meg nokså maktesløs overfor hans polemiske\nform. Egentlig er den jo forferdelig primitiv, som når han\ntil min påstand on manglende organisasjonsteoretiske kunn-\nskap i rapporten svarer at han har lest rapporten fra\nArbeidsforskningsinstituttene hvor man avslører en like stor\nmangel på kunnskap om datasystemer.-For det første har det\nintet med saken å gjøre, for det andre underslår han at det\ner snakk om et studentarbeid. Jeg reagerte også på hans\nforsøk på politisk & spille meg ut over sidelinjen ved å\nforsøke 3 løse opp motsigelsene mellom Brostigen og neg\nved å vise til at rapporten var skrevet i tråd med Forbundets\nvedtekter, og følgelig mitte møte politisk uenighet og motstand.\nJer synes som sagt at dette er primitiv debatt, men samtidig"}, {"year": 1972, "date": "20. september 1972", "box": "Box 3", "desc": "Letter from Olav Terje Bergo dated 20 September 1972 addressed to Birger Magnus Vikøren regarding a preliminary internal work report on database handling, planning and control in connection with a Norwegian Iron and Metal Workers' Association research project.", "stem": "IMG_0512", "ocr": "Går til: Bergo\narkiv\nOslo, 20. september 1972\nBirger Magnus Vikøren\nHovdenveien 13d\n5043 Hop\n\"'DATABEHANDLING, PLANLEGGING OG STYRING\"\nDette er foreløpig en intern arbeidsrapport i\nforbindelse med Norsk Jern- og Metallarbeiderfor-\nbunds forskningsprosjekt.\nDen vil trolig konne\nut i større opplag i løpet av den nærmeste fram-\ntid - men da noe revidert.\nVennlig hilsen\nOlav Terje Bergo\n0TB/1b"}, {"year": 1972, "date": "5. oktober 1972", "box": "Box 3", "desc": "A typed letter from Olav Terje Bergo dated October 5, 1972, addressed to Knut Lange at Hedmark/Oppland distriktshogskole in Lillehammer, thanking him for his efforts and mentioning a meeting on the 16th regarding an institution.", "stem": "IMG_0514", "ocr": "Векдо\nOslo, 5. oktober 1972\nKnut Lange\nHedmark/Oppland distriktshøgskole\n2600 Lillehammer\nKjære Knut Lange\nTakk for brev. Vi holder av den 16. d.m. for et møte med\ndeg. Vi har et møte her på instituttet kl. 1400, men det\nvil neppe ta mer enn 1 time. Så det meste av dagen skulle\nvære ledig fra vår side.\nHåper du kan komme.\ncomme\nVennlig hilsen\n3 Olav Terje Bergo\nbe bid e\ngskolen\nOTB/es\nBen"}, {"year": 1972, "date": "11 oktober 1972", "box": "Box 3", "desc": "A Swedish-language letter dated 11 October 1972 from Helsinki addressed to Civ.ekon. Olof Bargo, written by Christian Sundgren regarding ADB (Arbetarnas Utvecklingsfond) and ADBins tillskapningar, discussing radio broadcasts and organizational matters at Handelshögskolan.", "stem": "IMG_0518", "ocr": "Helsingfors den\n11 oktober 1972\nChristian Sundgren, ekon. red.\nFinlands Rundradio\nSommargatan 2 fors 26\nCiv. ekon. Olof Bargo,\njag\nskriver till Dig på Jan Annerstedis anrådan och saken gäller\nnärmast ADB och ADB:ns tillämpningar (företg och organisationer.\nag är själv ekon. mag. från Hfors 'andelshögskola med nationaleko-\nnomi som huvudämne och är för tillfället verksam vid Finlands radio\nsom ekonomisk redaktör.\nHuvudorsaken till att jag skriver till Dig är att jag intresserar\nkonsekvenser/\nmig för ADB:ns tillämpningar inom företagen och vilka de har\n• för\ninformations-, styr- och beslutssystemen.\nDetta är saker jag i någon mån redan sysslat med, dels 1 radioverk-\nsamhet, där jag och Carata Backström gjort en programserie om ADB i\nSamhället och dess politiska konsekvenser, dels vid Handelshögskolan\ndär jag gjort en kort studie beträffande ADB:n och beslutsfattandet\ninom företaget.\nNu har jag tänkt mig föra vidare detta arbete kring denna problema-.\ntik med tanke på\nen eventuell licenciatavhandling.Arbetshypotesen\nskulle ung. vara att organisationsstrukturen blir mera auktoritär\nmed de ADB-tillämpningar för informationssystem som idag är regel\ninom de privata\nstorföretagen.\nArbetet borde framför allt uppläggas som en empirisk studie gällande\nbåde arbetsintensiva men också tjänstemannaintensiva företag f. att\nkunnna jämföra ADBins konsekvenser inom dessa två företagstr"}, {"year": 1972, "date": "20-10 1972", "box": "Box 3", "desc": "Letter from Øglands Sykkelfabriks Klubb to Norsk Renossentral regarding workplace planning and industrial relations issues within the company.", "stem": "IMG_0520", "ocr": "12/6 -72\nAukw\nØglænds Sykkelfabrikks Klubb Au1. Bugr =\nN. J. og M. F. avd. 44\n20-10\nSandnes, den...........\n1972\nNorsk Regnesentral\nForskningsvn. 1 B,Blinderen\nOslo 3.\nDglæends sykkelfab. klubb har utarbeidet følgende arbeids-\nplan innen arbeidsfeltet: Styring-og planleggingsproblemer\nved flytting av bedrifter eller deler av bedrifter, fra\nklubbens synsvinke1.\nVår målsetting er at klubben skal delta i styring og plan-\nlegging av den industri vi tilbringer c.a. 1/3 av vårt liv\ni. Skal bedrifter eller deler av denne flyttes, vil klubben\nha reell innflytelse på utforming og planlegging.\nAnsvaret vil liggek hos klubbstyret, og vi mener at arberds-\nutralget er best egnet til å delta i denne utformingsvirksom-\nhet.\nArbeidsutvalget er pålagt å gjennomgå Arbeidsrappott nr.2,\nsamt å ta kontakt med bedriftens forskjellige instanser.\nArbeidsrapporten er utlevert til alle medlemmer av klubb-\nstyret.\nKlubben vil forsøke å ta opp en analyse av byggingen av\nfabrikken på Kvål, og klubbens medvirkning iø déskusjonen\nog gjennomføring av planene.\nIn vil forsøke å trekke fram en del av de vanskelige\navgjørelser som måtte treffes og en del av de tilfeller\nder klubbens forsing ikkekble tatt. hensyn til."}, {"year": 1972, "date": "26., 27. og 28. oktober 1972", "box": "Olav-Terg Brøgd", "desc": "Minutes or report from a three-day meeting (October 26-28, 1972) of the NUMP-Prosjektet (Delprosjekt A.S. Hydraulik) with attendees including Erling Winsjansen, Roald Dale, and others, documenting discussions on workplace planning systems and organizational matters.", "stem": "IMG_1162", "ocr": "MØTEREFERAT\nNJMF-PROSJEKTET\nDelprosjekt A.S. Hydraulik\nARBEIDSMØTE OVER TRE DAGER\n26., 27. 0g\n28. oktober 1972\nBrattvåg\nTil stede: Erling Winsjansen, Roald Dale, Ingolf\nMaridal, Håkon Røv, Olav Dahl, Gunnar Sandvik, Hallvard\nRønning, Kåre Osvold,\nOlav Bergo4 Kristen Nygård\nFredag 26.oktober\n19.00 til 22.30\nNygaard og Winsjansen innledet om status i arbeidet\nnå og hva som hadde foregått siden sist ved NR og i\nBrattvåg. En drøftet deretter hva det nå var viktig å\narbeide med for å komme vidre med klubbens arbeid.\nBergo kommenterte det materialet som til nå var\nprodusert i studiegruppene og slo fast at dette var\nvel egnet som grunnlag når rapporten nå skal skrives.\nEn gikk deretter på en ustrukturert diskusjon om\nbedriftens planleggings-system og bedriftens forhold\ntil lokalsamfunnet.\nLørdag 27. oktober 1972 kl. 9.00 til 17.00\nI samsvar med det programmet som var lagt fredag innledet\nNygaard med en forelesning om planlegging med utgangs-\npunkt i avsnittet om CLASS i AR2. Dette dannet grunnlag\nter\ng"}, {"year": 1972, "date": "15. november 1972", "box": "Box 3", "desc": "Letter from Olav Perje Børge regarding a club chairman Bjarne Gjerdavik and matters related to a Kongsberg seminar, with handwritten annotations and signatures.", "stem": "IMG_0522", "ocr": "Går til: Arkiv\nBergo\nOslo, 15. november 1972\nЕніму\nKlubbfornann Bjarne Gjerdevik\nøglends Sykkelfabrikks Klubb\nØglend Sykkelfabrikku\n4300 Sandnes\niU-a\nVi har mottatt brev av 20 f.m. fra dere der mandatet\nfra Kongsberg-seminaret slâs fast. Nå er vi interessert\ni å høre narmere fra dere om hvordan arbeidet med selve\nrapporten går. Om dere ønsker vil jeg komme over for\nà forelese for de gruppene som nå er i ferd med å lese\ngrunnboka, Så kan jeg samtidig hjelpe dere i gang med den\nrapporten dere skal sette opp. De andre klubbene har nå\nferdig diskuterte disposisjoner for sine. I tillegg\nkommer trolig Tune Eureka Vest ned en forskningsrapport\nom sitt arbeid etter Kongsberg-konferansen.\nfes skal forsele a venniig hilsen ned\nmer utridet innhol\nOlav Terje Bergo\negnelse\nsonn sist wor jeg\nter\nOTB/1b\nperletere\nnoterbu\nLel.\nHils de aude\nGlau Bergo"}, {"year": 1972, "date": "16. november 1972", "box": "Box 3", "desc": "Letter from Olav Terje Børgo regarding a meeting of the steering committee for a research project on iron and metals (Jernog Metall forskaningsprosjekt) to be held on December 5th, with a follow-up meeting on December 11th at the union's local office.", "stem": "IMG_0523", "ocr": "Gär til: Arkis\nNygaard\nBergo\nOslo, 16. november 1972\nSk's medlemmer\nMøtet i styringskomiteen for Jern og Metalls\nforskningsprosjekt må på grunn av forbundsstyre-\nmøtet i Jern og Metall utsettes.\nI stedet for tirsdag 5. desember, vil det bli\npå\nmandag 11. desember, kl. 11.00\nMøtet blir holdt 1 forbundets lokaler.\nVennlig hilsen\nOlav Terje Bergo\n0TB/1b"}, {"year": 1972, "date": "27. og 28. november 1972", "box": "Olav-Terg Brøgd", "desc": "Norwegian meeting minutes from Norsk Regnesentral (Norwegian Computing Center) documenting a two-day work meeting with agenda items related to hydraulic projects, materials management, and work group coordination, with multiple timed sessions and participants listed.", "stem": "IMG_1144", "ocr": "Bero\nNygaarel\nNORSK REGNESENTRAL\nForskningsveien 1 B\nOS 10 3\nNJME-prosjektet\n•Delprosjekt Hydraulik\nkapittel\nMøtereferat.\nBrattvåg 27. og 28. november 1972.\nMote 1: K1. 10.00\nForberedende møte med klubbformann Erling Winsjansen:\nOppsummering av status i arbeidet ved Hydraulik og i de uppe\nandre prosjekt-bedriftene.\nMøte 2: kl. 10.45\nSamtale med gruppelederne Roald Dale, Olav Dahl og Håkon Røv\nenkeltvis ute i verkstedet.\nOpplegg for møte med gruppene om kvelden.\nMøte 3: kl. 11.30\nMøte med gruppeledere og noen av deltakerne for å samordne\narbeidet på kveldens møte.\nMøte 4: kl. 12.30\nGjennomgang av materialet fra gruppen til Olav Dahl\nsammen med Erling Winsjansen.\nMøte. 5: k1. 16.00\nGjennomgang av stoffet til Håkon Røvs gruppe sammen med H.R.\nMøte 6: k1. 17.30\nMøte med Håkon Røvs arbeidsgruppe. Stoffet til kapittel 2\ner i grove trekk skrevet. Punkt 2.2 mangler og b), c) og d)\ner også åpne. Arbeidet bør kunne sluttføres i løpet av to-\ntre uker.\nter\ng"}, {"year": 1972, "date": "6. desember 1972", "box": "Box 3", "desc": "Letter from Olav Terje Bergo at Norsk Produktivitetsinstitustt regarding the Styringskomiteen and NJMF-prosjektet research project, discussing datahandling plans, club participation, and project timelines.", "stem": "IMG_0524", "ocr": "PRODUK\nTITUT N\nKopi:\nBergo\nNygaard\nArkiv\nElgsaas\nOslo, 6. desember 1972\nStyringskomitéen,\nNJMF-prosjektet\nDu innkalles hermed til møte i Styringskomiteen for, NJME\"5\nforskningsprosjekt om databehandling, planleg\nging og\nstyring.\nSom tidligere nevnt blir møtet i NJF s lokaten /\nMandag 11, desember kl. 11.00.\nSo goet Y' te framay det Vedalde m heraktd vareen ventet.\nnå godt i tre av klubbene.\nDette har imidlertid medført en mer omfattende arbeidsinnsats\ni kontakt med klubbene fra vår side enn vi hadde regnet med.\nLikeledes kreven klubbenes medarbeiderskap at deres prosjekt-\ndeltakere får tid til å bygge opp den innsikt de trenger.\nDette har medført forsinkelser 1 prosjektet.\nBearbeidingen av hovedrapportene, FR1 og FR2, vil være av-\nsluttet fra forskernes side ca. 1. februar (se arbeidsplanen).\nKlubb-rapportene vil kreve lengre tid, og vil kunne foreligge\nca. 15. mars.\nVi diskuterer nă med Jan Balstad 1 NJMF hvordan\nen skal ordne økonomien for avslutningsfasen.\nVedlagt følger en redegjørelse for situasjonen i de fire\nprosjekt-bedriftene, en timeplan for avslutningen av pro-\nsjektet og regnskap.\nMed vennlig hilsen\nOlav Terje Bergo\nOB/sh"}, {"year": 1972, "date": "8. desember 1972", "box": "Box 3", "desc": "A letter from Olav Terje Bergo dated 8 December 1972 to Svein Ulleberg at Klubbkontorset, Kongsberg Våpenfabrikk, discussing the Styrings-komiteen's work on club matters and requesting a redacted disposition on club activities.", "stem": "IMG_0525", "ocr": "Kopi: Bergo\nArkiv\nOslo, 8. desember 1972\nSvein Ulleberg\nKlubbkontoret\nKongsberg Våpenfabrikk\n3600\nKongsberg•\nVedlagt følger et eksemplar av det som nå er sendt Styrings-\nkomiteen t1l orientering om arbeidet 1 klubbene til nå og\nframover. Jeg skulle tro tempoplanen er noenlunde realistisk.\nSom du ser håper vi å få de delene som nå er skrevet for-\nholdsvis kvikt, slik at vi kan ta et redaksjonsmøte på det\nenten her eller på KV. Det framgår av det utkastet til\ndisposisjon som er vedlagt at vi foreslår at kapittel 4 inn-\narbeides 1 kapitlene om KVPOL (kap. 8 i ny disposisjon).\nVi håper at den endelige rapporten kan være ferdig til maskin-\nskriving føx 25. februar.\nMed vennlig hilsen\nOlav Terje Bergo\nOB/sh"}, {"year": 1972, "date": "8. desember 1972", "box": "Box 3", "desc": "Letter from Olav Terje Bergo to Bedriftsklubbene v/ klubbformann Erling Winsjansen regarding club business, machinery maintenance, and a meeting notice for the String Committee.", "stem": "IMG_0526", "ocr": "Kopi:\nBergo\nArkiv\nOslo, 8. desember 1972\nBedriftsklubben\nv/ klubbformann Erling Winsjansen\nA.S Hydraulik\n6270 Brattvåg•\nTakk for sist.\nDet har enda ikke vært tid til hverken referat eller se\nannet av det jeg lovet sist jeg var oppe hos dere. Det\nskal komme så snart jeg får tid til det.\nJeg sender imidlertid maskinkkrevet de delene av kapittel 2\njeg fikk fra Håkons Jeg har ikke gjort noen endringer å\nsnakke om tror jeg, men dere kan jo sjekke det mot manu-\nskriptet.\nImidlertid skal jeg gjøre et forsøk på å få satt opp mine\nkommentarer sammen med et redigert forslag. Jeg sender\ndet så fort jeg kan. Så håper jeg å få det dere nå har\nferdig siden sist.\nEllers sender jeg et eksemplar av det som nå er utsendt til\nStyringskomiteens møte: tempoplan og oversikt over klubbens\narbeid.\nKristen kommer oppover denne måneden. Ring og si fra når\ndet passer best for dere å\nfå ham.\nMed vennlig hilsen\nOlav Terje Bergo\nOB/sh"}, {"year": 1972, "date": "11 desember 1972", "box": "G – L0001", "desc": "Norwegian letter from Knud Lange at Hedmark/Oppland Distriktsskole dated 11 December 1972 regarding a research project committee meeting for NJMF's research project, addressing the Steering Committee with remarks on project progress and recommendations.", "stem": "IMG_0438", "ocr": "Knut Lange\nHedmark/Oppland Distriktshøgskole\n2600 Lillehammer\n11 desember 1972\nStyringskomiteen for NJF's forskningsprosjekt,\nv/formannen, forretningsfører Leif Skau,\nNorsk Jern og Metallarbeiderforbund,\nYoungsgt 11,\nOslo 1.\nAnmodning om å løses fra vervet som styringskomitemedlen.\nPå grunn av sterkt arbeidspress med andre oppgaver har jeg\nførst i de siste dagene fått skikkelig tia til å tenke\nigjennom status for forskningsprosjektet på bakgrunn av\ndiskusjonen i styringskomiteen 19. og 20 juni d.åo, og\nreferatet derfra.\nI de to møtene 19. og 20. juni reiste jeg kritikk mot\nprosjektrapport AR2 på disse hovedpunktene:\n1. Det pedagogiske opplegg av rapporten må sees som et eks-\nperiment som ennå trenger omfattende videre bearbeiding\nfør jeg kan ha noen tro på at det vil nå frem til den\ntilsiktete brukergruppen,\ntillitsmenn og medlemmer i\nNJMF og andre fagforbund.\n20\nRapporten ville stått vesentlig sterkere om den hadde\nvært basert på empirisk materiale som kunne og vurde vert\nhentet fra de fire kontaktbedriftene og bedriftsklubbene\nder. Jeg må derfor stille meg avventende til rapportens\nnytteverdi og kontakt med aktuelle tillitsmannsproblemer\ntil etter at forskerne har gjennomført kontaktkonferanser\nmed tillitsmenn fra de fire bedriftene, , med sikte\nfa prøvet ut og illustrertt\nforhold til slike aktuelle tillitsmannsproblemer.\n(ved ettertanke er jeg kommet til at det neppe er\nrealistiske muligheter for å få gjort et tilstrekkelig\ngrundig arbeid på den tiden som er igjen.)\n3. Rapporten inneholder en rekke ideer og innfall som i og\nfor seg er interessante, men som også klart viser behovet\nfor en mer tverrfaglig behandling av de viktige spørsmål\nprosjektet tar sikte på å besvare."}, {"year": 1972, "date": "19. desember 1972", "box": "Box 3", "desc": "Letter from Olav Terje Børge to the Steering Committee of the NJMF research project, dated 19 December 1972, regarding the final meeting for NJMF's research project scheduled for 11 January 1973 at NJMF's offices in Oslo.", "stem": "IMG_0528", "ocr": "Kopi: Bergo\nElgsaas\nNygaard\nArkiv\nOslo, 19. desember 1972\nStyringskomitéen\nNJMF-prosjektet\nKOORD 240 0013)\nNeste møte i Styringskomitéen for NJMF's forsknings-\nprosjekt er lagt til\nk1. 11.00 torsdag 4. januar 1973 i NJMF's 1okaler.\nTema for møtet blir saksdokumentene til siste SK-møte.\nGod jul og takk for god \"styring\" i året som gikk.\nMed vennlig hilsen\nOlav Terje Bergo\nOB/sh"}, {"year": 1972, "date": "23 desember 1972", "box": "Box 3", "desc": "A Norwegian letter or document dated 23 December 1972 discussing educational matters, with references to classes, students, and what appears to be school or institutional correspondence.", "stem": "IMG_0530", "ocr": "Kopi:\nBergo\nNygaard\nArkiv\nOslo, 29. desember 1972\nBedriftsklubben\nKongsberg\nVåpenfabrikk\n3600\nKongsberg •\nVi arbeider oss nå igjennom det stoffet vi har fått fra\ndere og háper å ha våre kommentarer klare innen en ukes\nI mellomtiden håper vi dere får skrevet noe stoff\nkapittel 7: Vurdering av CLASS ut fra klubbens og medlemmenes\nkapittel 8:\nVurdering av KVPOL ut fra klubbens og medlemmenes\nmẫl.\nGodt nytt år.\nVennlig hilsen\nOlav Terje Bergo\nOB/sh"}, {"year": 1972, "date": "29. desember 1972", "box": "Box 3", "desc": "A typed letter dated 29 December 1972 from Olav Terje Bergo to Klubbformann Driing Winsjansen at A/S Hydraulik in Oslo, regarding manuscript revisions for chapters 3, 4, and 5.", "stem": "IMG_0529", "ocr": "Kopi:\nBergo\nNygaard\nArkiv\nOs10, 29. desember 1972\nKlubbformann Erling Winsjansen\nA/S Hydraulik\n6040\nBrattvåg.\nVi venter på manuskriptet til kapitlene 3, 4 og 5.\nDet ser ikke ut til at vi får tid til å sende våre\nkommentarer oppover nå, men Kristen arbeider med\navsnittet on planlegging i kapittel 2 og håper å få\ndet ferdig fort.\nDere må imidlertid ikke la dere\nstoppe av at vi\nikke holder våre tidsfrister, men\ngjøre ferdig det som nå står igjen av rapporten.\nGodt nytt år.\nVennlig hilsen\nOlav Terje Bergo\n0B/sh"}, {"year": 1973, "date": "1973", "box": "Forskningsrapport Nr. 8", "desc": "Page 37 of a Norwegian document discussing LO's research policy and a 1973 congress resolution outlining LO's (Landsorganisasjonen i Norge) research objectives and priorities for workers' organizations.", "stem": "IMG_3156 2", "ocr": "- 37 .-\n4.4 LO's forskningsutvalg. LO's forskningspolitikk.\nLO har nå opprettet et eget lorskningsutvalg med en rekke\nframtredende tillitsmenn som medlemmer. Formann er sekretær\nTor Halvorsen, LO's sekretariat.\nPå fagkongressen 1973 vedtok LO dette tillegget til sitt\nhandlingsprogram:\n\"FORSKNING I LØNNSTAKERNES TJENESTE\nLandsorganisasjonen i Norge vil ...\n- sikre de politiske organers innflytelse oven forsk-\nningspolicikken,\n- engasjere seg i utformingen av forskningspolitikken,\n- innrette forskningen slik at den er til nytte for\nlønnstakerne,\n- bruke forskningsresultatene til beste for dem som\narbeider i bedriftene,\n- gjøre forskningsresultatene tilgjengelige for dem\ndet gjelder,\n- sikre arbeidstakerne effektiv innflytelse på forsk-\nningsprosjekter i de enkelte bedrifter.\nForskning er på en systematisk måte å finne fram til ny\nkunnskap gjennom studier, forsøk og eksperimentering.\nGjennom slike kunnskaper får vi et bedre grunnlag for å\ntreffe de disposisjoner som er nødvendige for å omforme\nsamfunnet i den retning vi ønsker.\nVed valg av jeg derfor kan se fram til\nmotta de nevnt publikasjonene\ni ner framtid,\ntegner jeg:\nVennlig hilsen\nsinwniuz\nBirger M. Vikøren\nBIRGER MAGNUS VIKØREN\nKONSULENT DIFM\nMARKEDSKOMMUNIKASJON\nKREDITKASSEN 6501.20.03336\nHOVDENVEIEN 13 D\n5043 HOP\nTELEFON (05) 273397\nDATO, $3/9"}, {"year": 1973, "date": "1973", "box": "Box 3", "desc": "Norwegian typewritten document from 1973 discussing HYDRAULIK A.S. company operations, club membership systems, and a five-point work program involving contact with Norsk Regnesentral and various organizational initiatives.", "stem": "IMG_0617", "ocr": "Det meste av dette arbeidet må klubben selv gjøre, men den\nønsker å ha kontakt med Norsk Regnesentral under arbeidet.\nDet vil være av interesse å vurdere hvilke databehandlings-,\nplanleggings- og styringssystemer som bedriften har tatt,\neller vil ta i bruk - sett på bakgrunn av dens nye organisas-\njons form.\nEt av målene må være at klubben kan utforme en foreløpig\nholdning til disse systemene, sammen med en plan for kunn-\nskapsoppbygging innen klubben. En slik kunnskapsoppbygging\ni klubben vil være nødvendig for å komme fram til en mere\ngjennomtenkt holdning til systemene.\nHYDRAULIK A.S.\nI. løpet av første halvår 1973 skal det velges representanter\ntil bedriftsforsamling og styre. Klubben ønsker å være best\nmulig forberedt på den situasjonen som da vil oppstå.\nForberedelsen vil bestå i:\n1. utarbeidelse av et program for klubbens virksomhet med\nspesifisering av hvilke saker som skal tas opp i styre\nog bedriftsforsamling.\n2. utarbeidelse av underlags-materiale til bruk når ulike\nsaker skal fremmes.\n3. etablering av utredningsgrupper som kan være til støtte\nfor de som representerer klubben i styre/bedriftsforsamling.\n4. engasjere og skolere flere av medlemmene til klubb-arbeid.\n5. styrke klubbens arbeid generelt.\nI dette arbeidet ønsker klubben å holde kontakt med Norsk\nRegnesentral. Spesielt vil slik kontakt være nyttig når\ndet gjelder punktene 2, 3 og 4."}, {"year": 1973, "date": "1973", "box": "Box 2", "desc": "Page 7 of a Norwegian document discussing work with Østland reports, a research project (FR-5), group work activities, and mentions of Cand.mag. Heigtie Simonsen and Dag Tresselt from Rogaland Distriktshøyskole.", "stem": "IMG_1140", "ocr": "- 7 -\nArbeidet med Øgland-rapporten skal fortsette utover høsten\n1973. Siden forskningsprosjektet nå avsluttes, vil FR-5 (som\ninngår i prosjektet) måtte være en foreløbig rapport. Det er\nliten tvil om at allerede denne foreløbige rapporten vil inne-\nholde meget av interesse. Gruppen som behandler ensidig arbeid\nhar f.eks. i dag lagt fram for ledelsen et forslag om stativ-\nproduksjon som supplement til linjeproduksjon. Dette forslaget\nfikk en meget interessert mottakelse.\nKlubben har på egen hånd funnet ut at den ene av arbeids-\ngruppene (som hadde avsluttet sitt arbeid) skal begynne på en\nny oppgave: å se på verne-arbeidet ved bedriften.\nKlubben har altså nok å giøre for arbeidsgruppene til langt\nut på høsten. En må regne med at dette arbeidet vil lede til\nnytt arbeid for gruppene. Klubben er meget fornøyd med det\nstore tilskuddet til klubbens innsatsmuligheter som arbeids-\ngruppene betyr. Her, som i de andre klubbene, består alle\ngruppene av en kombinasjon av eldre, erfarne medlemmer, aktive\nog sentrale klubbtillitsmenn og helt uerfarne medlemmer som en\nnå har klart å aktivisere.\nCand. mag. Helge Simonsen redegjorde for gruppene om sitt arbeid\nom styrt arbeid ved KV. Dette var meget vellykket. Klubben\nhar nå fått høyskolelektor Dag Tresselt ved Rogaland Distrikts-\nhøyskole til å bli med som faglig støttespiller i gruppe-\narbeidet. Klubben er meget fornøyd med hans hjelp."}, {"year": 1973, "date": "1973", "box": "Olaw Terje Bergø J&M-prosjektet Røyrøta 14", "desc": "A typed Norwegian manuscript page with handwritten edits discussing the history and use of early data processing machines, including references to UNIVAC and PL-1 programming language, with annotations about computer programs and administrative matters.", "stem": "IMG_1230", "ocr": "Em kontrakt som omfatter relt til bruk av det nouke\nAUTOKON - systemet\ni skipskonstuksjon, ble undertegnet i\nПри на 3.ктелнео оми і Змети анит\n3 millimer dollar, og\nAdministation).\nEtter hvert bygges det nå opp kolossale biblioteker av\ndatamaskinprogrammer for en raskt økende mengde anvendelser.\nEn del av disse programmene har en meget lang levetid. De\nutfører omfattende, viktigeog stadig tilbakevendende opp-\ngaver, og det kan koste store\n¡tore Summer å lage dem. Den svenske\nstaten har f.eks. nettopp inngått en kontrakt om å få laget\net program som kan oversette programmer skrevet i programmerings-\nspråket SIMULA. Kontraktsummen er på 2.5 millioner svenske\nkroner. Oversetterprogrammer for PL-1-språket sies å ha\nkostet ehnă meget mer,\nA Mousse AUTOKON- septemet en methapo\nTil å begynne med var det selve maskinutstyret som var den\nstørste utgiftsposten ved EDB. I dag er programutgiftene\nstørre. Dette medfører at bedriftene vil søke å bruke\nallerede ferdig utviklede programmer for en gitt anvendelse,\nselv om de må betale avgift for å bruke programmene. Det kan\nkoster meget mer å lage nye programmer selv.\n- Det kan\nvære vanskelig å bli kvitt programmer, selv om de viser seg\nå ha uheldige egenskaper i bruk i bedriften.\nDa de første datamaskinene ble tatt i bruk, var de\nbetraktet som vidunder-maskiner. En trodde at et land\nsom Norge f.eks. hadde så få oppgaver at vi bare ville\nha bruk for et meget lite antall datamaskiner. Årsaken\nvar ikke at en overvurderte maskinenes kapasitet, men\nat en ikke så deres muligheter for anvendelse og derfor\nundervurderte behovet for automatisk databehandling.\nTil å begynne med ble datamaskinene brukt til å utføre\ndeler av mer sammensatte oppdrag, nemlig slike deler\nsom enten besto av\n- gjentagelse av et stort antall ganger av trivielle,\nenkle oppdrag (opptelling av folketellingsresultater,\nutskrivning av fakturaer o.s.v.), eller\n- svært lange kjeder av kompliserte beregninger\nskyte-tabeller for artilleri, løsning av oppgaver\ni atom-fysikk o.s.v.)."}, {"year": 1973, "date": "Januar 1973", "box": "Del I", "desc": "A Norwegian course curriculum document for a week-long training program on \"Planning, management and data handling\" (Planlegging, styring og databehandling) for ukes-kurs, dated January 1973, detailing the schedule for Monday with opening, work sessions, coffee break, lunch, group presentations and discussions.", "stem": "IMG_2453", "ocr": "-145 -\nEn annen side av utdanningsproblemene er de rent pedagogiske.\nHvordan skal lærebøker, studiebrev, kurser, foredrag osv\nbygges opp på en riktig måte? Og hva en \"riktig\" i denne\nforbindelse?\nVår oppfatning er at et lære-materiale er \"riktig\" lagt OPp\nnår det leder til at leserne (deltakerne) går til handling\nfor å bedre sin situasjon, og når det viser seg nyttig under\nslik handling.\nDensom lære-materialet også\ner interessant,\nmorsomt eller lettlest, eller har andre positive egenskaper,\nså er det bra.\nMen det hjelper fagbevegelsen lite at 25\nmennesker har en hyggelig og lærerik uke på kurs, dersom\ndet ikke skjer noen handling i klubber og fagforeninger\nsom følge av kurset.\nNedenfor følger kursplanen for A0F-kurset om \"Planlegging,\nstyring og databehandling\", slik den var lagt opp på et\nukeskurs på Sørmarka i januar 1973. (Kursplanen bygger på\ndenne boka). Deretter følger den elevoppgaven som ble delt\nut på kursets første dag.\nBesvarelsen ble levert inn siste\ndag•\n\"Kursprogram for ukes-kurs i \"Planlegging, styring og data-\nbehandling\"\nMandag\n0900 - 0930\n0930 - 1000\nog\n1015 - 1100\n1100 - 1130\n1130 - 1210\nog\n1220 - 1300\n1300 - 1500\n1500 - 1515\n1515 - 1730\nÅpning av kurset.\nHva skjer på arbeidsplassene?\n(Avsnitt 1.1)\nKaffepause.\nHandlingseksempler.\n(Avsnitt 1.2)\nMiddag•\nPresentasjon av gruppeoppgave.\n( \"Handlingseksempel nr. 6\", se avsnitt 1.2).\nGruppearbeid og diskusjon."}, {"year": 1973, "date": "15. januar 1973", "box": "Box 3", "desc": "A typed letter from Olav Terje Bergø (Gdr til: Arkvi Bergø) dated January 15, 1973, addressed to Herr Arne Føstvedt at NHHK in Bergen, thanking him for his support regarding book donations and expressing motivation for continued work with NJMF's information work.", "stem": "IMG_0533", "ocr": "Går til: Arkvi\nBergo\nOslo, 15. januar 1973\nHerr Arne Fostvedt\nNHHK\nHelleveien 30\n5000 Bergen\nTakk for brev.\nMin motivasjon for bokanmeldelser må vare ekstremt\nhøy før den klemmer ut noen av mine øvrige aktivi-\nteter nå. Vi en midt inne i innspurten for NJME's\nforskningsprosjekt og har et hav av trådender å\nsamle sammen. Jeg tør ned andre ord ikke & love\nnoe, men skal gjøre mitt beste.\nVennlig hilsen\nOlav Terje Bergo\nOTB/1b"}, {"year": 1973, "date": "16 januar 1973", "box": "Box 3", "desc": "A typed letter or document from Ola Ariola regarding sugar refinery matters, dated 16 January 1973, containing text in Norwegian about manufacturing processes and includes mentions of Vanilla, Orvis Berg, and various technical specifications.", "stem": "IMG_0534", "ocr": "Går til: Arkiv\nNygaard\nBergo\nElgsaas\nOslo, 16. Januar 1973\nTil Styringskomiteens\nmedlemmer.\nVedlagt følger referat fra møte 4 dm. i Styrings-\nkomiteen for NJMF's forskningsprosjekt.\nSom avtalt blin neste møte kl. 11.00, torsdag\n22. februar i NJMF.\nVennlig hilsen\nOlav Terje Bergo\nVedlegg:\nMøtereferat.\nОTB/1b"}, {"year": 1973, "date": "17th January 1973", "box": "Box 3", "desc": "A letter dated 17 January 1973 addressed to T.J. Schoyen regarding a discussion about technical papers and working drawings, mentioning assessing and planning for future years with references to Yourselves and Olav Beyer.", "stem": "IMG_0535", "ocr": "Kopi:\nBergo\nArkiv\nOslo, 17th January 1973\nMr. T. J. Grayson\nCentre for East European\nUniversity of Birmingham\nBirmingham\nB15 2TT\nEngland.\nStudies\nDear Sir,\nWe would like to refer i lagt vekt på å få frem de\nerfaringer en har gjort i arbeidet med prosjektet.\n21.2 - COMPUTER SCIENCE AND MATHEMATICS\nved DONALD E. KNUTH\nWhat kind of mathematics is most useful in the study of computer\nprogramming? Typical elementary mathematical approaches wil!\nbe Illustrated by analyzing some so-called \"hashing\" algori thms.\n14.3 - DATABASEERFARINGER FRA TYSK STORINDUSTRI\nved LARS PETTER SKOU\nForedraget vil omtale et dokumentasjonssystem for utvikling, kon-\nstruks jon og produksjon av en større 3. generasjons datamaskin•\n28.3 - GENERALFORSAMLING\n11.4 - OM BRUK AV INVARIANTER VED PROGRAMMERING\nved OLE-JOHAN DAHL\nEn invariant er et utsagn som gjelder om verdiene til programvariable\nunder utførelse av programmet.\nInvarianter er av stor betydning for\nforståelse, dokumentas jon og konstruks jon av program.\n9.5 - BEDRIFTENS DATABEHANDLING, ET REDSKAP FOR ARBEIDSTAGERNE?\nved JAN ANNERSTEDT, OLAV T. BERGO OG KRISTEN NYGAARD.\nForedragsholderne vil diskutere hvordan arbeidstagerne kan skaffe\nseg innflytelse over databehandlingen i bedriftene.\nDette blir\nsatt 1 relasjon til de nye lover og bestemmelser om \"bedri.fts-\ndemokrati.\"\n23.5 - MINICOMPUTER | BRYGGERI-VIRKSOMHET\nOmvisning på Ringnes Bryggeri.\nOslo, 22. januar 1973\nStyret", "stems": ["IMG_0546", "IMG_0549"]}, {"year": 1973, "date": "23.januar 1973", "box": "Box 3", "desc": "A letter dated 23 January 1973 from Oslo, written in Norwegian, discussing the establishment of NSEI (Norsk Selskap for Elektronisk Informasjonsbehandling) and concerns about data handling, privacy, and the need for discussion about data technology development in enterprises.", "stem": "IMG_0547", "ocr": "pen tumenstelt\nsverige\nOslo, 23. januar 1973\nJeg minner om vår korte samtale da du var på Norsk\nRegnesentral i høst. Du sa deg da ikke uvillig til å delta\ni et møte i Norsk Selskap for Elektronisk Informasjonsbehandling\n(NSEI) sammen med Nygaard og Bergo.\nNSEI vil gjerne at møtet avholdes om kvelden onsdag 9. mai\ni Oslo, men du kan enda påvirke møtedatoen (det pleier være\nen onsdag).\nMin opprinnelige tanke var at møtet skulle ta for seg problemer\nomkring EDB og enkeltmennesket. Ikke etter det vanlige mønster,\nsom går på databanker og personlighetsvern (privacy), men\nmer i retning av en diskusjon om hvilke grupper som har kunn-\nskapsressurser og økonomiske og politiske muligheter for å\nbenytte datateknologien, hvilke mål disse grupper styrer mot,\nhvordan EDB påvirker eller befester disse gruppers maktposi-\nsjoner og endelig hva som kan gjøres for at de grupper som nå\nstår utenfor denne utvikling selv kan ta i bruk EDB for dermed\nå bedre sin situasjon.\nDette blir jo temmelig omfattende. Etter en diskusjon med\nNygaard er vi blitt enige om å begrense emnet noe, slik at\nman mer konkret forsøker å besvare spørsmålet\nHvordan kan arbeidstakerne skaffe seg innflytelse\nover databehandlingen 1 bedriftene?"}, {"year": 1973, "date": "27. februar 1973", "box": "Box 3", "desc": "Letter dated 27 February 1973 from Arbeidsgiversamfunn A/S in Oslo to Arne Grip at Linköpings högskola regarding research reports on planning, management and data processing from NJMI's research project.", "stem": "IMG_0540", "ocr": "Går til: Arkiv\nBergo\nNygaard\nOslo, 27. februar 1973\nHerr Arne Grip\nLinköpings högskole - Ekonomiska institusjonen\n581 83 Linköping\nSverige\nRapportene fra NJMF's forskningsprosjekt: \"Planlegging,\nstyring og databehandling\" er nå i ferd nad à revideres.\nI ait vil det bii:\n1. Forskningsrapport nr. 1: Planleggins, styring og\ndatabehandling - forslag til strategi for fag-\nbevegelsen.\n2. Forskningsrapport nr. 2: (Larebøker)\nDel 1: Planlegging, styring og databehandling -\nGrunnbok for fagbevegelsen.\nDel 2:\nDel\n3:\nPlanlegging og styring\nDatamaskiner, systener og spräk.\n3. Klubb-rapportene:\nForskningsrapport nr. 3:\nBedriftspolitisk handlingsprogran for bedriftsklubben\nved M/S Hydraulik, Brattvåg v/bedriftsklubben.\n\nGâr til:\nBerge\nArkiv\nNygaard\nOslo, 27. februar 1973\nHerr Urban Norlän\nStatarvägen\n. 24\nUppsala\nSverige\nKapportene fra NJMP*s forskningsprosjekt: \"Planlegging,\nstyring og databehandling\" er nå i ferd ned å revideres.\nI alt vil det bli:\n1. Forskningsrapport nr. 1: Planlegging, styring og\ndatabehandling - forslag til strategi for fag-\nbevegelsen.\n2. Forskningsrapport nr. 2: (Larebøker)\nDei 1: Planlegging, styring og databehandling -\nGrunnbok for fagbevegelsen./\nO Del 2:\nPlanlegging og styring\nDel 3: Datamaskiner, systemer og språk.\n3. Klubb-rapportene:\nForskningsrapport nr. 3:\nBedriftspolitisk handlingsprogran for bedriftsklubben\nved A/S Hydraulik, Brattvåg v/bedriftsklubben.", "stems": ["IMG_0540", "IMG_0542"]}, {"year": 1973, "date": "28. februar 1973", "box": "Box 3", "desc": "Letter from Norsk Jern- og Metall Arbeiderforbund (Norwegian Iron and Metal Workers' Union) to Terje Børgo at Norsk Regnsessentral regarding a basic course (Fagliq Grunnkurs Trinn III) scheduled for May 6-11, 1973 at Solborg Hotell, Mandal.", "stem": "IMG_0545", "ocr": "NORSK\nJERN- OG METALL\nARBEIDERFORBUND\nYoungsgaten 11, VII\nOslo 1\nTelefon * 02/20 48 90\nPostgiro 12 562\nTelegramadresse: Forbundet, Oslo\nVÅR SAK NR.\n41-02. ESB/OG.\nVED BESVARELSE BES VÅRT SAKSNUMMER ANFØRT\nOslo, den 28. februar 1973.\nTerje Bergo,\nNorsk Regnesentral,\nForskningsvn. 1 B,\nOSLO 3.\nFAGLIG GRUNNKURS TRINN III - SOLBORG HOTELL, MANDAL, 6-11. MAI\n1973.\nVi viser til vår samtale med deg den 22. ds. på forbundets kontor hvor du\nstilte deg villig til å ta følgende forelesning på ovennevnte kurs:\n\"Samfunnsøkonomi: Priser og lønninger, samt statistikk\".\nForelesningen er ført opp på:\nMandag 7. mai fra kl. 0900-1300, 1500-1800 og 1900-2100\nmed innlagt øvingsoppgave som en ønsker utarbeidet til kurset.\nVi er kjent med at Øistein Gulbrandsen i LO har slike oppgaver i for-\nbindelse med tilsvarende forelesning.\nHvis du, på grunn av andre forhold skulle bli forhindret fra å delta,\ntakker vi for at du vil søke å få Svein Ragnar Kristiansen, sekretær\ni APs Stortingsgruppe, til å overta forelesningen.\nVi takker for ditt positive svar og ønsker velkommen til kurset.\nMed hilsen\nNorsk Jern- og Metallarbeiderfgrbund\nForbundsstyret\nClan inti\nenar di. Sile\nFinał Sig. Birkeland."}, {"year": 1973, "date": "10. april 1973", "box": "Box 3", "desc": "Letter from Norsk Regnesentrals (Norwegian Computing Center) regarding booking system issues and data management, addressed to Tillitsmannsutvalget at Braathens SAFE in Fornebu.", "stem": "IMG_0551", "ocr": "MORSE REGNESENTRAL I NORWEGIAN COMPUTING CENTER\nNarsissingses. 1 E, Bindero, Oslo 3, Nornag, tolefon 46 69 30\nTelex 16518\nOslo, 10. april 1973\nTillitsmannsutvalget\nv/ Margit Glomm\nBraathens SAFE\nFornebu.\nRef. telefonsamtale 28/3-1973\nDet er for meg vanskelig å trekke noen konklusjoner om det\nbooking-systemet dere får. Likeledes er det vanskelig\nå foreta noen vurdering av dataskjerm-terminalene ut fra\nbrosjyrematerialet jeg har tilgang til.\nEtter å ha lest\nbrosjyrematerialet og referatet fra informasjonsmøtet\n7/2-73, vil jeg likevel komme med følgende bemerkninger:\n1. 40 timers opplæring for de som skal foreta booking er\nomtrent det man bør ha for å operere systemet. Det\nbør undersøkes om operatørene (og øvrig personell?)\nogså kan få undervisning 1 hvordan systemet virker.\nDette vil for betjeningen være mer tilfredsstillende\nenn bare å vite at når de og de data skrives på\nskjermen vil det bli reservert plasser.\nEt slikt\nkurs bør ikke på noen måte tilsvare den opplæring en\nvedlikeholdsingeniør må ha. Det bør undersøkes om\nslik opplæring er planlagt (evt. som frivillig etter-\nutdanning).\n2.\nNår det gjelder varmeutviklingen ved operatørplassene,\ner det vel så viktig å vurdere om varmen fra skjermene\nblir ledet slik at den vil forstyrre noen, som hvor\nmye varme som utvikles. Når det gjelder tydeligheten\nav det som står på skjermen, gir brosjyrene inntrykk\nav god kvalitet.\nHvordan det imidlertid vil virke på\nkontorplassene med det lyset som er der, kan bare be-\nstemmes ved å prøve. Det går fram av brosjyrene at\nTWA, Air France, KIM, Finnair, Swissair m.fl. har noe\nutstyr fra samme leverandøx.\nFinnair har vel samme\nskjermtype 1 Helsingfors (?). Det anbefales at dexe\ntar kontakt med noen av disse for å høste erfaringer\n3.\nAndre databehandlingsoppgaver som Braathen vil gjøre\nbruk av (nå eller seinere) bør dere sørge for å være\nIøpende orientert om. Dette vil antakelig best lykkes\nPost bes adressert til instituttet, ikke til enkeltpersoner.\nMail should be addressed to the Institute, not to individual persons."}, {"year": 1973, "date": "26.4.1973", "box": "Box 2", "desc": "A Norwegian memo from Norsk Regnsentrall regarding participation in a research project by four workplace clubs (bedriftsklubbene) affiliated with NJM's research project (NJMF's forskningsprosjekt), dated 26 April 1973 and addressed to Kristen Nygaard.", "stem": "IMG_1134", "ocr": "*prsk Regnesentral, Blindern\nOslo\nNorsk Regnesentral\nForskningsveien 1B\nOs1o 3.\nNotat 26.4.1973 fra Kristen Nygaard\nTilstanden i arbeidet i de fire bedriftsklubbene tilknyttet\nNJME's forskningsprosjekt.\nArbeid har vært i gang i hele vår i alle de fire bedrifts-\nklubbene.\nDet har ikke vært noen tegn på avtagende interesse\ni noen av klubbene, og arbeidsgruppene har selv tatt opp nye\nproblemstillinger uten vår medvirkning.\n1. A/S Hydraulik, Brattvåg\nKlubben har, etter at rapporten var ferdig\nfra arbeidsgruppene\nog forskerne, gjennomført en omfattende og demokratisk\nintern\nsaksbehandling av forslaget til bedriftspolitisk handlings-\nprogram.\nDette har foregått gjennom forberedende diskusjoner\npå arbeidsplassen, giennom smågruppe-møter i hjemmene og be-\nhandling med bindende vedtak på klubb-møte.\nSelve programforslaget (kapittel 7) ble mangfoldiggjort og\nutdelt til bruk i det forberedende arbeidet. 50 eksemplarer\n(i tillegg til rapportene) ble trykt opp, men dette viste seg\n70 eksemplarer til ble laget og brukt.\nmå regne med at et stort antall av klubbens ca. 210 medlemmer\ner godt orientert om arbeidet og rapportens innhold."}, {"year": 1973, "date": "22.6.1973", "box": "Box 3", "desc": "Letter from Norsk Hydro a.s (Porsgrunn Fabrikker) to Norsk Regnesentral dated 22.6.1973, listing three publications by Nygaard and Bergo regarding data handling and processing for industrial applications, with handwritten notes indicating oversøkt (checked) status.", "stem": "IMG_0575", "ocr": "000\nNorsk Hydro a.s\nPorsgrunn Fabrikker\nNorsk Regnesentral\nForskningsvn. 1 b\nOSLO 3\n3901 Porsgrunn,\nNorway\nTelefon (035) 51 120\nTelegram: Hydrosped\nTelex: 16368 hydro n\nBankgiro: 7147.05.01841\nOverserdt\nJau, NjuT 2\n' 7,\nDeres ref.\nYour ref.\nDeres brev av\nYour letter of\nVår ref.\nOur ref.\nBiblioteketı\nGDa/Sy\nDato\nDate\n22.6.1973\nBestilling av publikasjoner\nVi tillater oss å bestille flg publikasjoner:\n1) Nygaard, Kristen i samarb. med Olav I. Bergo:\n\"Databehandling, planlegging og styring•\nGrunnbok for fagbevegelsen. Del I. Databehandling,\nsystemer og språk\".\nNR-arbeidsrapport, mai 1972, 182s.\n2) Nygaard, Kristen i samarb. med Olav T. Bergo:\n\"Databehandling, planlegging og styring•\nGrunnbok for fagbevegelsen. Del II. Planlegging\nog styring\".\nNR-arbeidsrapport, mai 1972, 178s.\n3) Nygaard, Kristen og Bergo, Olav I. i samarb.\nmed Roar Løver og Jan Balstad:\n\"Oppbygging av kunnskaper om databehandling og\nstyring innen Norsk Jern- og\nMetallarbeiderforbund\".\nNR-rapport, mars 1972, 118s.\nDersom publikasjonene ikke er for salg, er vi\neventuelt interessert i lắn.\nMed vennlig hilsen\nfor Norsk Hydro a.s.\nPorsgrunn Fabrikker\n9. Вам.\nG. Dahl"}, {"year": 1973, "date": "Juli 1973", "box": "Del I", "desc": "Research report no. 1 from the Norwegian Iron and Metal Workers' Union on planning, governance and data handling for a basic handbook for union members, authored by Kristen Nygaard and Olav Terje Bergo.", "stem": "IMG_2438", "ocr": "FORSKNINGSRAPPORT NR. 1\nFRA NORSK JERN- OG METALL-\nARBEIDERFORBUNDS\nFORSKNINGSPROSJEKT\nPUBLIKASJONSNR, 414\nPLANLEGGING, STYRING OG DATABEHANDLING\nGRUNNBOK FOR FAGBEVEGELSEN\nOVEOTOS\nDEL I\nINNFØRING\nAV\nKRISTEN NYGAARD OG OLAV TERJE BERGO\nNORSK REGNESENTRAL\nFORSKNINGSVEIEN 1B\nOSLO 3\nJULI 1973\nGE SENI"}, {"year": 1973, "date": "Juli 1973", "box": "G – L06", "desc": "A Norwegian research report (Forskningsrapport nr. 6) from the Norwegian Iron and Metal Workers Union's research project, documenting new tasks of the Workers' Club at the Verkstedklubben ved A/S Nebb in Skøyen, co-authored by Olav Terje Bergo and Kristen Nygaard.", "stem": "IMG_3199", "ocr": "LISTE UTKAST. FORTROLIG!\nFORSKNINGSRAPPORT NR. 6\nFRA NORSK JERN- OG METALL-\nARBEIDERFORBUNDS\nFORSKNINGSPROSJEKT.\nPUBLIKASJONSNR.\nKLUBBENS NYE ARBEIDSOPPGAVER\nAV\nVERKSTEDKLUBBEN VED A/S NEBB, DIV. SKØYEN\nI SAMARBEID MED\nOLAV TERJE BERGO OG KRISTEN NYGAARD\nNORSK REGNESENTRAL\nFORSKNINGSVEIEN 1B\nOSLO 3\nJULI 19/3"}, {"year": 1973, "date": "22. august 1973", "box": "Forskningsrapport Nr. 8", "desc": "A Norwegian foreword (forord) to a research report about the Norwegian Association for Research Institutions' research project, dated August 22, 1973, signed by Olav Terje Bergo and Kristen Nygaard.", "stem": "IMG_3130", "ocr": "FORORD\nDenne rapporten er utarbeidet som en del av Norsk Jern- og\nMetallarbeiderforbunds forskningsprosjekt. Prosjektet er\nbeskrevet i avsnitt 1.2 i rapporten.\nDe andre rapportene fra prosjektet er dels lærebøker (Forsk-\nningsrapport nr. l, 2 og 3), dels utredninger fra de fire\ndeltakerklubbene i samarbeid med forskerne i prosjektet\n(Forskningsrapport nr. 4, 5, 6 og 7). Lærebøkene inneholder\nogså forslag til arbeidsformer og strategi for NJMF og fag-\nbevegelsen i det hele når det gjelder planlegging, styring\nog databehandling i bedriftene. Klubbrapportene kan også\nsees som praktiske eksempler på den arbeidsform og den strategi\nsom er utviklet i prosjektet av // ── Utilities ─────────────────────────────────────────────────────────

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const lower = text.toLowerCase();
  const idx   = lower.indexOf(q.toLowerCase());
  if (idx === -1) return esc(text);
  return esc(text.slice(0, idx))
    + '<mark>' + esc(text.slice(idx, idx + q.length)) + '</mark>'
    + highlight(text.slice(idx + q.length), q);
}

const byYear = {};
DATA.forEach(e => { (byYear[e.year] = byYear[e.year] || []).push(e); });
const years  = Object.keys(byYear).sort();

function render() {
  document.getElementById('tl-root').innerHTML = years.map(yr => {
    const ents = byYear[yr];
    const rows = ents.map((e, i) => {
      const snippet  = e.desc.length > 200 ? e.desc.slice(0, 197) + '…' : e.desc;
      const isStar   = starred.has(e.stem);
      const nPhotos  = (e.stems || [e.stem]).length;
      const photoTag = nPhotos > 1 ? `<span class="en-photos">&#128247; ${nPhotos}</span>` : '';
      return `<article class="en${isStar ? ' starred' : ''}" data-idx="${DATA.indexOf(e)}" data-stem="${esc(e.stem)}"
          data-s="${esc((e.date+' '+e.box+' '+e.desc+' '+(e.ocr||'')).toLowerCase())}"
          title="Click to view document">
        <button class="en-star" title="${isStar ? 'Unstar' : 'Star'}" data-stem="${esc(e.stem)}">${isStar ? '★' : '☆'}</button>
        <div class="en-left">
          <div class="en-date">${esc(e.date)}</div>
          <div class="en-box">${esc(e.box)}</div>
        </div>
        <div class="en-right">
          <div class="en-desc" data-orig="${esc(e.desc)}" data-snip="${esc(snippet)}">${esc(snippet)}${photoTag}</div>
        </div>
      </article>`;
    }).join('');

    return `<section class="yr" data-y="${yr}" id="yr${yr}">
      <div class="yr-hd">
        <button class="yr-toggle">
          <span class="yr-arrow">&#9662;</span>
          <span class="yr-num">${yr}</span>
        </button>
        <div class="yr-rule"></div>
        <span class="yr-ct" id="ct${yr}">${ents.length} entries</span>
      </div>
      <div class="yr-body">${rows}</div>
    </section>`;
  }).join('');

  document.querySelectorAll('.yr-toggle').forEach(btn => {
    btn.addEventListener('click', () => btn.closest('.yr').classList.toggle('collapsed'));
  });

  document.querySelectorAll('.en').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('.en-star')) return;
      const idx = parseInt(el.dataset.idx, 10);
      lbOpen(DATA[idx]);
    });
  });

  document.querySelectorAll('.en-star').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      toggleStar(btn.dataset.stem);
    });
  });
}

const PRE_STARRED = new Set([
  'IMG_3167', 'IMG_3174', 'IMG_3175 2',  // 13 May 1970

  'IMG_0338',                             // 13 Sep 1972 — Thorsrud

const STARRED_KEY = 'njmf-starred';

function loadStarred() {
  try {
    const saved = JSON.parse(localStorage.getItem(STARRED_KEY));
    if (Array.isArray(saved)) return new Set(saved);
  } catch (_) {}
  return new Set(PRE_STARRED);
}

function saveStarred() {
  localStorage.setItem(STARRED_KEY, JSON.stringify([...starred]));
}

let starred = loadStarred();

// Seed localStorage with pre-starred on first visit
if (!localStorage.getItem(STARRED_KEY)) saveStarred();

let starredOnly = false;

function toggleStar(stem) {
  if (starred.has(stem)) {
    starred.delete(stem);
  } else {
    starred.add(stem);
  }
  saveStarred();

  // Update just the affected entry in place
  const el = document.querySelector(`.en[data-stem="${CSS.escape(stem)}"]`);
  if (el) {
    const isNow = starred.has(stem);
    el.classList.toggle('starred', isNow);
    const btn = el.querySelector('.en-star');
    if (btn) { btn.textContent = isNow ? '★' : '☆'; btn.title = isNow ? 'Unstar' : 'Star'; }
  }

  if (starredOnly) filter(document.getElementById('search').value);
}

// ── Filter ────────────────────────────────────────────────────────────

function filter(q) {
  const ql = q.toLowerCase().trim();
  let shown = 0;
  years.forEach(yr => {
    const sec  = document.getElementById('yr' + yr);
    let secVis = 0;
    sec.querySelectorAll('.en').forEach(el => {
      const textMatch = !ql || (el.dataset.s || '').includes(ql);
      const starMatch = !starredOnly || starred.has(el.dataset.stem);
      const match = textMatch && starMatch;
      el.classList.toggle('gone', !match);
      if (match) secVis++;
      const d = el.querySelector('.en-desc');
      if (d) d.innerHTML = match
        ? highlight(d.dataset.orig.length > 200 ? d.dataset.orig.slice(0,197)+'…' : d.dataset.orig, ql)
        : esc(d.dataset.snip);
    });
    sec.classList.toggle('gone', secVis === 0);
    if ((ql || starredOnly) && secVis > 0) sec.classList.remove('collapsed');
    const ct = document.getElementById('ct' + yr);
    if (ct) ct.textContent = (ql || starredOnly)
      ? secVis + ' / ' + byYear[yr].length
      : byYear[yr].length + ' entries';
    shown += secVis;
  });
  document.getElementById('entry-count').textContent =
    (ql || starredOnly) ? shown + ' matching' : TOTAL + ' entries';
}

// ── Lightbox ──────────────────────────────────────────────────────────

const lb      = document.getElementById('lb');
const lbImg   = document.getElementById('lb-img');
const lbWrap  = document.getElementById('lb-img-wrap');
const lbPh    = document.getElementById('lb-placeholder');
const lbPct   = document.getElementById('lb-zoom-pct');

// Zoom state
let zScale = 1, zTx = 0, zTy = 0;
let dragging = false, dStartX, dStartY, dTx0, dTy0;

function zApply() {
  lbImg.style.transform = 'translate(' + zTx + 'px,' + zTy + 'px) scale(' + zScale + ')';
  lbPct.textContent = Math.round(zScale * 100) + '%';
  lbWrap.style.cursor = zScale > 1 ? (dragging ? 'grabbing' : 'grab') : 'default';
}

function zInit() {
  const w  = lbWrap.clientWidth, h = lbWrap.clientHeight;
  const iw = lbImg.naturalWidth,  ih = lbImg.naturalHeight;
  const fit = Math.min(w / iw, h / ih, 1);
  zScale = fit;
  zTx    = (w - iw * fit) / 2;
  zTy    = (h - ih * fit) / 2;
  zApply();
}

function zSet(newScale, cx, cy) {
  // cx, cy: zoom focal point in wrap-local coords (defaults to centre)
  const w = lbWrap.clientWidth, h = lbWrap.clientHeight;
  if (cx === undefined) { cx = w / 2; cy = h / 2; }
  const clamped = Math.max(0.25, Math.min(10, newScale));
  const ratio   = clamped / zScale;
  zTx    = cx * (1 - ratio) + zTx * ratio;
  zTy    = cy * (1 - ratio) + zTy * ratio;
  zScale = clamped;
  zApply();
}

function zReset() {
  zInit();
}

// Scroll to zoom
lbWrap.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = lbWrap.getBoundingClientRect();
  zSet(zScale * (e.deltaY < 0 ? 1.15 : 0.87),
       e.clientX - rect.left, e.clientY - rect.top);
}, { passive: false });

// Drag to pan
lbWrap.addEventListener('mousedown', e => {
  if (zScale <= 1) return;
  dragging = true; dStartX = e.clientX; dStartY = e.clientY;
  dTx0 = zTx; dTy0 = zTy;
  zApply();
  e.preventDefault();
});

window.addEventListener('mousemove', e => {
  if (!dragging) return;
  zTx = dTx0 + (e.clientX - dStartX);
  zTy = dTy0 + (e.clientY - dStartY);
  zApply();
});

window.addEventListener('mouseup', () => { dragging = false; zApply(); });

// Zoom buttons
document.getElementById('lb-zoom-in').addEventListener('click',  () => zSet(zScale * 1.25));
document.getElementById('lb-zoom-out').addEventListener('click', () => zSet(zScale * 0.8));
document.getElementById('lb-zoom-reset').addEventListener('click', zReset);

function lbLoadStem(stem, thumbs) {
  lbImg.classList.add('loading');
  lbPh.style.display = 'flex';
  lbPh.innerHTML = '<div id="lb-spinner"></div><div class="ph-text">Loading preview</div>';
  thumbs.forEach(t => t.classList.toggle('active', t.dataset.stem === stem));
  const src = 'images/previews/' + stem + '.jpg';
  lbImg.onload = () => { lbImg.classList.remove('loading'); lbPh.style.display = 'none'; zInit(); };
  lbImg.onerror = () => { lbPh.innerHTML = '<div class="ph-icon">&#8984;</div><div class="ph-text">Preview unavailable</div>'; };
  lbImg.src = src;
}

  const thumbs = [...strip.querySelectorAll('.lb-thumb')];
  thumbs.forEach(t => {
    t.addEventListener('click', () => lbLoadStem(t.dataset.stem, thumbs));
  });

  document.getElementById('lbm-file').textContent = stems.length > 1
    ? stems.join(' · ')
    : stems[0];

  // Transcript
  const raw = entry.ocr || '';
  const q   = document.getElementById('search').value.trim();
  const transcriptEl  = document.getElementById('lbm-transcript');
  const readMoreBtn   = document.getElementById('lbm-read-more');
  const transcriptWrap = document.getElementById('lbm-transcript-wrap');

  if (raw) {
    transcriptWrap.style.display = '';
    const paras = raw.split(/\n{2,}/).map(p => p.replace(/\n/g,' ').replace(/\s+/g,' ').trim()).filter(Boolean);
    transcriptEl.innerHTML = paras.map(p => '<p>' + highlight(p, q) + '</p>').join('');
    transcriptEl.classList.remove('expanded');
    readMoreBtn.textContent = 'Read more ↓';

    // Only show read-more if content overflows
    requestAnimationFrame(() => {
      const overflows = transcriptEl.scrollHeight > 225;
      readMoreBtn.style.display = overflows ? 'block' : 'none';
    });
  } else {
    transcriptWrap.style.display = 'none';
  }

  lbLoadStem(stems[0], thumbs);

  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

document.getElementById('lbm-read-more').addEventListener('click', function() {

  const expanded = t.classList.toggle('expanded');
  this.textContent = expanded ? 'Collapse ↑' : 'Read more ↓';
});

    const id = 'cxc-' + Math.random().toString(36).slice(2,7);
    const people = (c.people||[]).map(p => `<span class="cx-node-person">${esc(p)}</span>`).join('');
    const docs   = (c.docs||[]).map(s => `<img class="ms-doc-thumb" src="images/previews/${esc(s)}.jpg" data-stem="${esc(s)}" title="${esc(s)}" alt="${esc(s)}">`).join('');
    const sigLabel = {major:'Crossover', critical:'★ Critical crossover', divergence:'Divergence', minor:'Connection'}[c.significance] || 'Crossover';
    return `<div class="cx-cross-row sig-${esc(c.significance)}">
      <div class="cx-cross-spacer"></div>
      <div class="cx-cross-card" data-cx-id="${id}">
        <div class="cx-cross-sig">${sigLabel}</div>
        <div class="cx-cross-label">${esc(c.label)}</div>
        <div class="cx-cross-body">
          <p>${esc(c.body)}</p>
          ${c.quote ? `<div class="cx-cross-quote">${esc(c.quote)}</div>` : ''}
          ${people ? `<div class="cx-cross-people">${people}</div>` : ''}
          ${docs ? `<div><div class="cx-cross-sec">Primary documents</div><div class="cx-cross-docs">${docs}</div></div>` : ''}
        </div>
      </div>
      <div class="cx-cross-spacer"></div>
    </div>`;
  }

  const beatsHTML = CX_DATA.map(beat => {
    const hasContent = beat.left || beat.right || beat.cross;
    if (!hasContent) return '';

    const yr = `<div class="cx-yr">${esc(beat.year)}</div>`;
    return `<div class="cx-beat">
      <div class="cx-cell-l">${nodeHTML(beat.left, 'l')}</div>
      <div class="cx-cell-s">${yr}</div>
      <div class="cx-cell-r">${nodeHTML(beat.right, 'r')}</div>
      ${beat.cross ? crossHTML(beat.cross, beat.year) : ''}
    </div>`;
  }).join('');

  root.innerHTML = `
    <div class="cx-intro-band">
      <div class="cx-lane-hd cx-lane-hd-left">
        <div class="cx-lane-pill" style="background:${leftColor}">Thorsrud / Samarbeidsprosjektet</div>
        <div class="cx-lane-title">Sociotechnical Design<br>& Everyday Democracy</div>
        <div class="cx-lane-sub">AFI · Tavistock · Gustavsen</div>
      </div>
      <div></div>
      <div class="cx-lane-hd cx-lane-hd-right">
        <div class="cx-lane-pill" style="background:${rightColor}">NJMF / Nygaard</div>
        <div class="cx-lane-title">Collective Resource<br>& Participatory Design</div>
        <div class="cx-lane-sub">Norsk Regnesentral · Ehn · Bødker</div>
      </div>
    </div>
    <div class="cx-body">${beatsHTML}</div>`;

  // clicks — nodes
  root.querySelectorAll('.cx-node[data-cx-id]').forEach(n => {
    n.addEventListener('click', e => {
      if (e.target.classList.contains('ms-doc-thumb')) return;
      root.querySelectorAll('.cx-node.open').forEach(o => { if (o !== n) o.classList.remove('open'); });
      n.classList.toggle('open');
    });
  });

  // clicks — crossover cards
  root.querySelectorAll('.cx-cross-card[data-cx-id]').forEach(c => {
    c.addEventListener('click', e => {
      if (e.target.classList.contains('ms-doc-thumb')) return;
      root.querySelectorAll('.cx-cross-card.open').forEach(o => { if (o !== c) o.classList.remove('open'); });
      c.classList.toggle('open');
    });
  });

  // doc thumbnails
  root.querySelectorAll('.ms-doc-thumb').forEach(img => {
    img.addEventListener('click', e => { e.stopPropagation(); openByStem(img.dataset.stem); });
  });
}

</script>
</body>
</html>
