<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NJMF — Archive Timeline 1969–1975</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:   #0f0f0e;
      --mid:   #808080;
      --faint: #d0d0ce;
      --rule:  #ebebea;
      --hl:    #f2efe6;
      --bg:    #ffffff;
      --img-bg:#f4f3f0;
      --lx:    52px;   /* timeline line x-position */
      --gap:   36px;   /* gap from line to content */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Playfair Display', 'Times New Roman', Georgia, serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── App layout ──────────────────────────────────────────────────── */

    .layout { display: flex; height: 100vh; }

    /* ── Sidebar ─────────────────────────────────────────────────────── */

    .sidebar {
      flex-shrink: 0;
      width: 268px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--ink);
      overflow: hidden;
    }

    .sb-hd {
      padding: 48px 36px 28px;
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
    }

    .sb-eyebrow {
      font-size: 9px;
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 14px;
    }

    .sb-title {
      font-size: 54px;
      font-weight: 800;
      letter-spacing: 0.04em;
      line-height: 0.9;
      margin-bottom: 12px;
    }

    .sb-dates {
      font-size: 13px;
      font-style: italic;
      color: var(--mid);
    }

    .sb-search {
      padding: 22px 36px 18px;
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
    }

    .search-row {
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--ink);
      padding-bottom: 7px;
      margin-bottom: 14px;
    }

    #search {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-family: inherit;
      font-size: 13px;
      font-style: italic;
      color: var(--ink);
      padding: 0;
      min-width: 0;
    }

    #search::placeholder { color: var(--faint); }

    #search-clear {
      background: none; border: none; cursor: pointer;
      color: var(--faint); font-size: 18px; line-height: 1;
      padding: 0; display: none; flex-shrink: 0;
    }

    #search-clear.show { display: block; }

    .chips { display: flex; flex-wrap: wrap; gap: 5px; }

    .chip {
      background: none;
      border: 1px solid var(--faint);
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 0.16em;
      color: var(--mid);
      padding: 3px 8px;
      cursor: pointer;
      transition: border-color .12s, color .12s, background .12s;
      white-space: nowrap;
    }

    .chip:hover { border-color: var(--ink); color: var(--ink); }

    .chip.on { background: var(--ink); border-color: var(--ink); color: var(--bg); }

    .sb-ft {
      margin-top: auto;
      padding: 18px 36px;
      border-top: 1px solid var(--rule);
      flex-shrink: 0;
    }

    #entry-count { font-size: 10px; letter-spacing: 0.2em; color: var(--faint); }

    /* ── Main timeline ───────────────────────────────────────────────── */

    .main {
      flex: 1;
      height: 100vh;
      overflow-y: scroll;
      overflow-x: hidden;
      padding-left: calc(var(--lx) + var(--gap));
      padding-right: 60px;
      padding-bottom: 120px;
      background-color: var(--bg);
      background-image: linear-gradient(var(--ink), var(--ink));
      background-size: 1px auto;
      background-position: var(--lx) 0;
      background-repeat: repeat-y;
      background-attachment: local;
    }

    /* ── Year section ────────────────────────────────────────────────── */

    .yr { padding-top: 52px; }
    .yr.gone { display: none; }

    .yr-hd {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 2px;
    }

    .yr-hd::before {
      content: '';
      position: absolute;
      left: calc(-1 * var(--gap));
      top: 50%;
      width: var(--gap);
      height: 1px;
      background: var(--ink);
    }

    .yr-toggle {
      background: none; border: none; cursor: pointer;
      font-family: inherit;
      display: flex; align-items: center; gap: 10px;
      padding: 0; flex-shrink: 0;
    }

    .yr-arrow {
      font-size: 9px; color: var(--mid);
      display: inline-block;
      transition: transform .16s;
      margin-top: 1px;
    }

    .yr.collapsed .yr-arrow { transform: rotate(-90deg); }

    .yr-num {
      font-size: 24px; font-weight: 700;
      letter-spacing: -0.01em; line-height: 1;
    }

    .yr-rule { flex: 1; height: 1px; background: var(--rule); }

    .yr-ct {
      font-size: 9px; letter-spacing: 0.22em;
      color: var(--faint); white-space: nowrap;
    }

    .yr-body { padding-top: 2px; }
    .yr.collapsed .yr-body { display: none; }

    /* ── Entry ───────────────────────────────────────────────────────── */

    .en {
      position: relative;
      display: grid;
      grid-template-columns: 116px 1fr;
      gap: 0 18px;
      padding: 16px 0;
      border-bottom: 1px solid var(--rule);
      cursor: pointer;
      transition: background .1s;
    }

    .en:hover { background: var(--hl); margin: 0 -60px 0 calc(-1 * var(--gap));
                padding-left: var(--gap); padding-right: 60px; }

    .en.gone { display: none; }

    .en::before {
      content: '';
      position: absolute;
      left: calc(-1 * var(--gap));
      top: 28px;
      width: 9px;
      height: 1px;
      background: var(--faint);
      transition: background .1s;
    }

    .en:hover::before { background: var(--ink); }

    .en-left { padding-top: 1px; }

    .en-date {
      font-size: 10px; letter-spacing: 0.16em;
      color: var(--mid); line-height: 1.6; margin-bottom: 5px;
    }

    .en-box { font-size: 9px; letter-spacing: 0.13em; color: var(--faint); line-height: 1.6; }

    .en-desc {
      font-size: 13px; font-style: italic;
      font-weight: 400; line-height: 1.85; color: var(--ink);
    }

    mark { background: var(--hl); color: var(--ink); padding: 0 1px; }

    /* ── Multi-photo badge ───────────────────────────────────────────── */

    .en-photos {
      display: inline-block;
      font-size: 8.5px;
      letter-spacing: 0.18em;
      color: var(--faint);
      margin-left: 6px;
      vertical-align: middle;
    }

    /* Photo strip in lightbox */
    #lb-strip {
      display: flex;
      gap: 6px;
      padding: 8px 14px;
      border-top: 1px solid var(--rule);
      background: var(--img-bg);
      overflow-x: auto;
      flex-shrink: 0;
    }
    #lb-strip:empty { display: none; }

    .lb-thumb {
      flex-shrink: 0;
      width: 48px; height: 62px;
      object-fit: cover;
      cursor: pointer;
      opacity: 0.45;
      border: 1.5px solid transparent;
      transition: opacity .12s, border-color .12s;
    }
    .lb-thumb:hover { opacity: 0.8; }
    .lb-thumb.active { opacity: 1; border-color: var(--ink); }

    /* ── Star ───────────────────────────────────────────────────────── */

    .en-star {
      position: absolute;
      top: 14px; right: 0;
      background: none; border: none; cursor: pointer;
      font-size: 16px; line-height: 1; padding: 2px 4px;
      color: var(--faint);
      opacity: 0;
      transition: opacity .1s, color .1s;
      z-index: 2;
    }

    .en:hover .en-star { opacity: 1; }
    .en.starred .en-star { opacity: 1; color: #c8923a; }
    .en.starred::before { background: #c8923a; }

    /* Starred filter button */
    #starred-filter {
      display: flex; align-items: center; gap: 6px;
      background: none; border: 1px solid var(--faint);
      font-family: inherit; font-size: 9px; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--mid);
      padding: 5px 10px; cursor: pointer; width: 100%;
      transition: border-color .12s, color .12s, background .12s;
      margin-top: 12px;
    }
    #starred-filter:hover { border-color: var(--mid); color: var(--ink); }
    #starred-filter.on { background: #fdf6ec; border-color: #c8923a; color: #c8923a; }
    #starred-filter .sf-star { font-size: 13px; }

    /* ── Terminus ────────────────────────────────────────────────────── */

    .terminus { position: relative; padding: 52px 0 80px; }

    .terminus::before {
      content: '';
      position: absolute;
      left: calc(-1 * var(--gap) - 3px);
      top: 63px;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--ink);
    }

    .t-label { font-size: 9px; letter-spacing: 0.3em; color: var(--faint); margin-bottom: 7px; }
    .t-text  { font-size: 19px; font-weight: 400; font-style: italic; }

    /* ── Lightbox ────────────────────────────────────────────────────── */

    #lb {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s;
    }

    #lb.open { opacity: 1; pointer-events: auto; }

    #lb-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(10, 10, 9, 0.9);
    }

    #lb-panel {
      position: relative;
      z-index: 1;
      display: flex;
      width: min(1100px, 94vw);
      height: min(820px, 90vh);
      background: var(--bg);
      overflow: hidden;
    }

    /* Image area */
    #lb-img-area {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: var(--img-bg);
      position: relative;
      overflow: hidden;
    }

    #lb-img-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
      cursor: default;
      user-select: none;
    }

    #lb-img {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
      max-width: none;
      display: block;
      /* initial sizing handled by JS after load */
    }

    #lb-img.loading { display: none; }

    #lb-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--faint);
    }

    #lb-placeholder .ph-icon {
      font-size: 36px;
      opacity: 0.4;
    }

    #lb-placeholder .ph-text {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    #lb-spinner {
      width: 24px; height: 24px;
      border: 1.5px solid var(--faint);
      border-top-color: var(--mid);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #lb-zoom-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-top: 1px solid var(--rule);
      background: var(--bg);
    }

    .zb-btn {
      background: none; border: 1px solid var(--faint);
      cursor: pointer; font-family: inherit;
      font-size: 14px; color: var(--ink);
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .1s;
    }

    .zb-btn:hover { border-color: var(--ink); }

    #lb-zoom-pct {
      font-size: 10px; letter-spacing: 0.18em;
      color: var(--mid); min-width: 38px;
      text-align: center;
    }

    #lb-zoom-reset {
      margin-left: auto;
      font-size: 9px; letter-spacing: 0.2em;
      text-transform: uppercase;
      background: none; border: none; cursor: pointer;
      color: var(--faint); font-family: inherit;
      transition: color .1s;
    }

    #lb-zoom-reset:hover { color: var(--ink); }

    /* Metadata sidebar */
    #lb-meta {
      flex-shrink: 0;
      width: 320px;
      border-left: 1px solid var(--rule);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 40px 32px 32px;
    }

    #lb-close {
      position: absolute;
      top: 16px; right: 16px;
      z-index: 10;
      background: none; border: none;
      font-size: 22px; line-height: 1;
      color: var(--mid); cursor: pointer;
      transition: color .1s;
      padding: 4px 6px;
    }

    #lb-close:hover { color: var(--ink); }

    .lbm-label {
      font-size: 8.5px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 6px;
    }

    .lbm-val {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--ink);
      margin-bottom: 28px;
    }

    .lbm-val.italic { font-style: italic; }

    #lbm-desc {
      font-size: 13px;
      font-style: italic;
      font-weight: 400;
      line-height: 1.85;
      color: var(--mid);
      margin-bottom: 28px;
      flex: 1;
    }

    #lbm-file {
      font-size: 9px;
      letter-spacing: 0.16em;
      color: var(--faint);
      padding-top: 16px;
      border-top: 1px solid var(--rule);
    }

    /* Transcript */
    #lbm-transcript-wrap {
      margin-top: 24px;
      border-top: 1px solid var(--rule);
      padding-top: 20px;
    }

    #lbm-transcript-wrap .lbm-label { margin-bottom: 10px; }

    #lbm-transcript {
      font-size: 12px;
      line-height: 1.9;
      color: var(--ink);
      font-style: italic;
      max-height: 220px;
      overflow: hidden;
      position: relative;
      transition: max-height .3s ease;
    }

    #lbm-transcript.expanded { max-height: 2000px; }

    #lbm-transcript p { margin-bottom: 0.8em; }

    #lbm-transcript:not(.expanded)::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      background: linear-gradient(transparent, var(--bg));
      pointer-events: none;
    }

    #lbm-transcript mark { background: var(--hl); color: var(--ink); padding: 0 1px; font-style: normal; }

    #lbm-read-more {
      display: block;
      margin-top: 8px;
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--mid);
      background: none; border: none;
      cursor: pointer; padding: 0;
      font-family: inherit;
      transition: color .1s;
    }
    #lbm-read-more:hover { color: var(--ink); }

    /* ── View tabs ── */
    .view-tabs {
      display: flex;
      gap: 0;
      padding: 0 40px;
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .vtab {
      font-family: 'Playfair Display', serif;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 14px 0 12px;
      margin-right: 28px;
      cursor: pointer;
      color: var(--mid);
      transition: color .15s;
    }
    .vtab:hover { color: var(--ink); }
    .vtab.active { color: var(--ink); border-bottom-color: var(--ink); }

    /* ── Milestone timeline ── */
    #view-milestones {
      padding: 48px 56px 80px;
      max-width: 860px;
    }
    .ms-intro {
      font-size: 13px;
      color: var(--mid);
      margin-bottom: 48px;
      line-height: 1.7;
      max-width: 560px;
    }
    .ms-track {
      position: relative;
      padding-left: 52px;
    }
    .ms-track::before {
      content: '';
      position: absolute;
      left: 14px;
      top: 8px;
      bottom: 0;
      width: 1px;
      background: var(--rule);
    }
    .ms-item {
      position: relative;
      margin-bottom: 36px;
    }
    .ms-dot {
      position: absolute;
      left: -44px;
      top: 10px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid var(--bg);
      outline: 1px solid currentColor;
      box-shadow: 0 0 0 3px var(--bg);
    }
    .ms-year {
      position: absolute;
      left: -108px;
      top: 7px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--mid);
      text-align: right;
      width: 56px;
    }
    .ms-card {
      background: var(--bg);
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 18px 22px 16px;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
    }
    .ms-card:hover {
      border-color: #c0beba;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .ms-card.open {
      border-color: var(--ink);
    }
    .ms-phase {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 5px;
    }
    .ms-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 0;
    }
    .ms-date {
      font-size: 10.5px;
      color: var(--mid);
      margin-top: 3px;
    }
    .ms-body {
      display: none;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--rule);
      font-size: 13px;
      line-height: 1.75;
      color: var(--ink);
    }
    .ms-card.open .ms-body { display: block; }
    .ms-sources {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ms-src-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 8px;
      font-weight: 700;
    }
    .ms-doc-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .ms-doc-thumb {
      width: 48px;
      height: 64px;
      object-fit: cover;
      border: 1px solid var(--rule);
      border-radius: 2px;
      cursor: pointer;
      transition: opacity .15s, border-color .15s;
      background: var(--img-bg, #f4f3f0);
    }
    .ms-doc-thumb:hover { opacity: 0.8; border-color: var(--ink); }
    .ms-sec-link {
      display: inline-block;
      font-size: 11.5px;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--faint);
      padding-bottom: 1px;
      transition: border-color .15s;
    }
    .ms-sec-link:hover { border-color: var(--ink); }
    .ms-sec-links { display: flex; flex-direction: column; gap: 5px; }

    /* Phase colours */
    .ph-pre  { color: #8a8a88; }
    .ph-p1   { color: #b07d2a; }
    .ph-p2   { color: #5a7a42; }
    .ph-leg  { color: #4a6080; }
    .ms-item.ph-pre  .ms-dot { color: #8a8a88; }
    .ms-item.ph-p1   .ms-dot { color: #b07d2a; }
    .ms-item.ph-p2   .ms-dot { color: #5a7a42; }
    .ms-item.ph-leg  .ms-dot { color: #4a6080; }

    .ms-people { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }
    .ms-person {
      font-size: 9.5px;
      letter-spacing: 0.06em;
      padding: 2px 7px;
      border: 1px solid var(--faint);
      border-radius: 20px;
      color: var(--mid);
    }

    /* ── Crossover view ── */
    #view-crossover { padding: 0 0 80px; }
    .cx-intro-band {
      padding: 32px 56px 28px;
      border-bottom: 1px solid var(--rule);
      display: grid;
      grid-template-columns: 1fr 140px 1fr;
      gap: 0;
      align-items: end;
    }
    .cx-lane-hd { padding-bottom: 4px; }
    .cx-lane-hd-left  { text-align: right; padding-right: 24px; }
    .cx-lane-hd-right { text-align: left;  padding-left:  24px; }
    .cx-lane-pill {
      display: inline-block;
      font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
      font-weight: 700; padding: 3px 10px; border-radius: 20px; color: #fff;
      margin-bottom: 6px;
    }
    .cx-lane-title { font-size: 14px; font-weight: 700; line-height: 1.3; }
    .cx-lane-sub   { font-size: 10.5px; color: var(--mid); margin-top: 2px; }

    /* Grid body */
    .cx-body { position: relative; }
    .cx-beat {
      display: grid;
      grid-template-columns: 1fr 140px 1fr;
      position: relative;
    }
    /* Spine line runs full height */
    .cx-beat::after {
      content: '';
      position: absolute;
      left: calc(50% - 0.5px);
      top: 0; bottom: 0;
      width: 1px;
      background: var(--rule);
      pointer-events: none;
    }
    .cx-cell-l { padding: 10px 24px 10px 56px; display: flex; justify-content: flex-end; }
    .cx-cell-r { padding: 10px 56px 10px 24px; display: flex; justify-content: flex-start; }
    .cx-cell-s { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 14px; position: relative; z-index: 1; }
    .cx-yr {
      font-size: 9px; letter-spacing: 0.1em; font-weight: 700;
      color: var(--mid); background: var(--bg);
      padding: 1px 4px;
    }
    /* Event nodes */
    .cx-node {
      max-width: 320px; width: 100%;
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 12px 15px 11px;
      cursor: pointer;

"IMG_3098", "ocr": "- 120 -\n8. FORSKNINGSPROSJEKTET\n8.1 Klubben og forskningsprosjektet.\nHydraulik var en av de fire bedriftene NJMF trakk inn i pro-\nsjektet. Det hele startet med et landsmøtevedtak i 1970 der\ndet ble påpekt nødvendigheten av fagbevegelsens engasjement\nsett i lys av den raske tekniske forandring i verksteds-\nindustrien.\nDet som gjorde at vi ble tatt med var vel at forbundet. ønsket\nå få med bedrifter av litt varierende størrelse, forskjellige\nprodukttyper, samtidig å få en geografisk spreäning. Repre-\nsentanten vår på landsmøtet var dessuten opptatt av og hadde\nsamme syn om disse problem.\nUnder de forberedende konferanser og i diskusjonen meilom\nNorsk Regnesentral, NJMF og de fire impliserte klubber må vi\nvel si at vi hadde en meget skeptisk holdning til prosjektet.\nVi kunne forstå at det var nødvendig med forskning og at\nbedriftens styrings- og planleggingssystem målte analyseres\nut fra arbeidstakernes og fagbevegelsens syn. Men når vi\nskulle knytte dette til klubbens arbeid og våre muligheter\nrent organisasjonsmessig og faglig, var det vanskelig å se\ndette i sammenheng. Denne skepsis vedvarte under hele det\nforberedende arbeid. Men når vi en gang var blitt uttatt så\nvi det som en utfordring og besluttet å følge opp saken uten\nat vi forestilte oss hvilken innvirkning dette ville få på\nklubbens arbeid. Vi kunne heller ikke på dette tidspunkt\nforestille oss hvor mye arbeid som var nødvendig for at vi\nselv skulle få en rapport som vi kunne bruke. Samtidig hadde\nvi et ansvar overfor forbundet for å gi et bidrag i forsknings-\nprosjektet i lag med de fire andre klubbene.\nDet som videre skjedde var at vi fikk i hende de to bøkene\nom databehandling, planlegging os styring, utarbeidet av\nforskerne i samarbeid med NJMF. Disse skulle være et hjelpe-\nmiddel for oss fire klubbene i dette prosjektet."}, {"year": 1970, "date": "1970", "box": "Forskningsrapport Nr. 8", "desc": "Norwegian document page 28 discussing workplace democracy and labor organization (LO/NAF), with sections on worker participation in industrial and economic development, dated 1970.", "stem": "IMG_3138 2", "ocr": "- 28 -\nFAGBEVEGELSENS FORSKNINGS-ENGASJEMENT\nFagbevegelsen har i løpet av de senere ån vist en stadig\nsterkere interesse for bruk av forskning og for forsknings-\npolitikk i sin alminnelighet.\n4.1 Samarbeidsforsøkene LO/NAF.\nSamarbeidsforsøkene er vel kjent og beskrevet gjennom en\nlang rekke publikasjoner. Vi vil her nøye oss med å gjengi\nuttalelsen om samarbeidsforsøkene fra NJMF's landsmøte 1970.\nDenne uttalelsen gir også mange andre synspunkter av interesse.\nPå NJMF's landsmøte i\nmars 1970 ble det vedtatt følgende\nuttalelse om Samarbeidsprosjektet LO/NAF:\net samfunn preget av industriell vekst og økonomisk ut-\nvikling, vil faren for en maktkonsentrasjon på siden\nav demoknatisk valgte organer være sterk.\nUten et mål.-\nbevisst arbeid for utvikling\nav demokratiet på alle områder,\nvil det parlamentariske\ndemokrati svekkes.\nav avgjørende betydning\nat beslutningsprosessene innenfor\nsamfunnets arbeidsliv som skaper realverdiene, og\ninstitusjonene som forvalter kapitalen, blir demokratisert.\nDemokratiseringsprosessen må føres fram\nlinjer - som hver for seg krever sine\nspesielle løsninger -\nmen som samlet utgjør en helhet.\nmenneskes demokratiske rett å ha inn-\nflytelse over sin\negen arbeidssituasjon innenfor de prak-\ntiske muligheters begrensninger.\nDenne målsetting kan\nbare oppnås gjennom en grunnleggende endring i den\norganisas jonstenking som preger den tradisjonelie bedrifts-\norganisasjon.\norganisasjonsform som med\nsine prinsipper\nfor maktfordeling har sin rot i et tidlig\nstadium av\ndemokratiets lange utvikling.\nOrganisasjonsprinsipper som\nevnet å tilpasse\nseg endringene i den\nalminnelige oppfatning av individets rettigheter og behov.\nDe samarbeidsforsøk som hovedorganisasjonene i arbeids-\nLO og NAF, har tatt initiativet til, viser at det\ntoveligger muligheten for utvikling av en\nny og bedre\narbeidssituasjon for det enkelte menneske.\nMen hvis en\nunnlater å sette\ntiltak av denne karakter\ninn som lead\ni en helhetsløsning,\nvil de ikke bære i\nseg mulighetene\ntil å skape en reell demokratisk situasjon.\nDerfor må\ndette arbeid følges opp med lov- og avtalemessige bestem-\nmelser som gir de ansatte en stadig økende grad av inn-\nflytelse i bedriftens formelle besluttende organer."}, {"year": 1970, "date": "1970", "box": "G – L06", "desc": "Norwegian text document discussing challenges at a technical club and describing the Iron and Metals Research Project (Jern- og Metalls forskningsprosjekt), which was started in 1970 and involved collaboration with local companies and NJMF, eventually transferred to the Norwegian Technical-Scientific Research Council in 1970.", "stem": "IMG_3212", "ocr": "For verkstedklubben er problemene store nok, og man må\nregne med at de vil bli større. Tiden stiller større og\nstørre krav til tillitsmannsarbeide, ikke minst som\nIølge av den raske teknologiske utvikling. Mennesket\nkan lett komme i bakgrunnen. Derfor er det om å giøre\nat klubbens tillitsmenn og medlemmen søken å arbeide etter\nmålsettingen så godt som mulig.\"\n1.3 Jern- og Metalls forskningsprosjekt.\nJern- og Metalls forskningsprosjekt er et rent fagbevegelses-\nprosjekt. Det tar opp de systemene som blir brukt for plan-\nlegging og styring i industrien og vurderer dem sett fra\nfagbevegelsens synspunkt. Prosjektet tar utgangspunkt i\nhva de enkelte lokale fagforeninger og klubber i bedriftene\nkan gjøre for å øke sine kunnskaper og sin innflytelse over\nplanleggingen og styringen, og derved over utviklingen av\nbedriftene…\nProsjektet ble startet etter at Jern- og Metall på sitt\nlandsmøte i 1970 hadde drøftet de nye metodene som nå blir\ntatt i bruk av arbeidsgiverne. Vår verkstedklubb la fram\net forslag til vedtak om at fagbevegelsen må \"... kunne\ngjennomføre slike utredninger og studier som kan styrke\nbedriften ut fra ar rsvarlig måte.\nFor det første må de metoder som brukes, trekke inn de sider av arbeids-\nsituasjonen som berører våre medlemmer. For det annet må vurderingen\nav de mulige alternativer foregå ut fra definisjoner av hva som er\nfordelaktig for\nvåre medlemmer og oppfatninger av hva de ønsker av sin\narbeidsplass.\n\nNORSK\nJERN• OG METALL\nARBEIDERFORBUND\nYoungspaten 11, VII\nOslo 1\nTelefon * 204890\nPosteiro 12 562\nTelegramadresse: Forbundet, Osle\nJ. nr.\nOslo, den 13. mal 1970.\nKT/KS\nNorsk Regnesentral,\nForskningsveien 1 B,\nOSLO 3.\n1/5. 70\naulin\nčesani\nKristew Nygaard\nEveusmo\nDen teknologiske utvikl ingen har 1 de senere årene ført t11\nat\nstadig\nmer avanserte metoder for forbedring av produksjonen kommer ut på\nmarkedet. Dette fører for arbeidstakerne og deres\ntillitsmenn til en\nstadig vanskeligere situasjon med hensyn til kontroll og medvirkning.\nPå vårt forbunds siste landsmøte ble\ndet derfor vedtatt at forbundet\nmåtte føre en mer aktiv rolle 1 utformingen av framtidige former for\nrasjonalisering, slik at også\narbeidstakernes interesser blir ivaretatt.\nVi ser at arbeidsgiverne nå - 1 stigende grad - tar moderne planleggings-\nmetoder 1 bruk for å vurdere:\nomlegginger 1 bedriftene\noppbygging av nye produksjonskjeder\nstyring av produksjonen\nFor våre medlemmer er det viktig at våre interesser 1 slike studier\nblir tatt hensyn til på en forsvarlig måte.\nFor det første må de metoder som brukes, trekke inn de sider av arbeids-\nsituasjonen som berører våre medlemmer. For det annet må vurderingen.\nav de mulige alternativer foregå ut fra definisjoner av hva som er\nfordelaktig for våre medlemmer og oppfatninger av hva de ønsker av sin\narbeidsplass.\n\nNORSK\nJERN- OG METALL\nARBEIDERFORBUND\nYoungsgaten 11. VIl\nOslo 1\nTelefon * 204890\nPostgiro 12 562\nTelegramadresse: Forbundet, Oslo\nJ.nr.\nKT/KS\nOslo, den\n13. mai 1970.\nNorsk Regnesentral,\nForskningsveien 1 B,\nOSLO 3.\n1/s. 70\nalin-\nỞepens\nKrishew Nygaard\nEvcusma\nDen teknologiske utviklingen har 1 de senere årene ført t1l at stadig\nmer avanserte metoder for forbedring av\nproduksjonen kommer ut på\nmarkedet. Dette fører for arbeidstakerne\nog deres tillitsmenn til en\nstadig vanskeligere situasjon med hensyn til kontroll og medvirkning.\nPå vårt forbunds siste landsmøte ble det derfor vedtatt at forbundet\nmåtte føre en mer aktiv rolle 1 utformingen av framtidige\nformer for\nrasjonalisering, slik at også arbeidstakernes interesser blir ivaretatt.\nV1 ser at arbeidsgiverne nå - 1 stigende grad - tar moderne planleggings-\nmetoder 1 bruk for å vurdere:\nomlegginger 1 bedriftene\noppbygging av nye produksjonskjeder\nstyring av produksjonen\nFor våre medlemmer er det viktig at våre interesser 1 slike studier\nblir tatt hensyn til på en forsvarlig måte.\nFor det første må de metoder som brukes, trekke inn de sider av arbeids-\nsituasjonen som berører våre medlemmer. For det annet må vurderingen\nav de mulige alternativer foregå ut fra definisjoner av hva som er\nfordelaktig for våre medlemmer og oppfatninger av hva de ønsker av sin\narbeidsplass.\nstorstilt med\n6 provisjon\nprosjoktet\nfor at\ndi\nbruk 1\navgjores e\nog forsk Jern- og Ne\nmaterialet ber benyttes\nstudievirksomheten samt\nspesialt kursmateriale\nsom er reist i prosjek", "stems": ["IMG_3167", "IMG_3174", "IMG_3175 2"]}, {"year": 1970, "date": "10. Juni 1970", "box": "G – L06", "desc": "Letter from Norsk Regnesentral (Norwegian Computing Center) dated June 10, 1970, addressed to Norsk Jarn- og Metallarbeider forbund regarding a research project on planning methods in industrial and private sector operations.", "stem": "IMG_3170", "ocr": "NORSK REGVESENTBAE / NORWEGIAN\nNº\nTR\nCOMPUTING CENTEIE\nForsicringson, 1 B, Middern, Oslo 3, Norwey, delefon 40 60 30 ll'elex 16518\nBlindern, 10. juni 1970\nNorsk Jern- og Metallarbeiderforbund\nFolkets hus\nYoungsgt. 11\nOslo 1.\nDeltagelse i forskningsprosjekt\nVi har med stor interesse lest forbundets brev av 13. mai.\nDet oppdrag som beskrives i brevet ligger sentralt i NR's\narbeidsfelt og representerer samtidig noe nytt. Vi har tid-\nligere alltid i våre planleggingsoppdrag arbeidet ut fra det\noffentliges eller private bedrifteieres målsettinger. Dette\nhar selvsagt måttet prege oppdragene - både i utvalget av de\nfaktorer som trekkes inn i analysen og i søkingen etter \"gode\"\nløsninger. Forbundets oppdrag til oss vil gi oss en anledning\ntil også å bygge opp innsikt i hvordan bedriftsanalyser bøn\nlegges opp ut fra arbeidstakernes interesser.\nSiden brevet ble mottatt har NR hatt konferanser med represen-\ntanter for forbundet og en representant for Instituttet for\nArbeidspsykologi. NR vil gjerne delta i det prosjektet for-\nbundet har beskrevet, og vi vil i det følgende søke å besvare\nde spørsmål som er stillet i brevet.\nVi tror prosjektet bør gi forbundet:\n1.\nEn oversikt over de viktigste av de planleggingsmetoder\nsom i dag\ner i bruk i bedrifter som sogner til forbundet,\nfra de enkle til de mere avanserte teknikker.\nMetodene\nmå analyseres ut fra hvilke målsettinger de gir muligheter\nfor å belyse og hvilke sider av virksomheten de tar i\nbetraktning.\nPost bes adressert til instituttet, ikke til enkeltpersoner."}, {"year": 1970, "date": "12 juni 1970", "box": "Box 1", "desc": "Letter from Arbeidsforskningsinstituttene (Work Research Institutes) to Norsk Jern og Metallarbeider-forbund regarding a research project (NJUP-Norsk Regmesentral) discussing workplace cooperation, committee structures, and collaborative arrangements between parties.", "stem": "IMG_1110", "ocr": "ARBEIDSFORSKNINGSINSTITUTTENE\nYrkeshygienisk Institutt * Arbeidsfysiologisk Institutt * Arbeidspsykologisk Institutt\nGydas vei 8, Oslo 3 * Postboks 5387 * Telefon 46 68 50\nNorsk Jern og Metallarbeider-\nforbund, v/ Tangnes - Balstad,\nYoungsgt. 11,\nL Oslo 1.\nJ\nNy adrense la ::1 :070:\nARDEE SPORS NING NSTITUTTENS\nPortoel 31 4 Oio Dep\nOio 1\nМОГТАТ\n36.70\nNORSI REGNESENTRAL\nakir\nNygaard\nElgsans\nDato: 12 juni 1970\nDeres ref.:\nVân ref.: KL/K1\nFonskningsprosjekt NJMF-Norsk Regnesentral.\nI tilknytning til Regnesentralens brev av 10 juni vil jeg gjerme\nkomme med et par kommentarer som muligens kan vare av verdi for\nvurderingen av oppsettingen av søknaden til NTNF.\nTil pkt. 2 i Regnesentralens brev: Det vil vel være en fordel om\nman presiserer bedriftsklubbens/tillitsmannsapparatets målsettings-\nproblematikk i lys av klubbens spesielle stilling som forhandlings-\nmotpart og samarbeidspartner innenfor rammen av lover, avtaler og\netablert praksis i arbeidslivet. Det vil derfor trolig være riktig\nå sette inn tillitsmannsapparatets arbeidssituasjon som et fjerde\nstikkord.\nDet må sees som et viktig poeng ved prosjektet at det kan bidra\ntil å gi tillitsmennene verktøy og forutsetninger for å fylle\nHovedavtalens samarbeidsledd ($9 og del B) med et mer aktivt\nbidrag fra fagforeningssiden. Det vil også kunne bidra til å äpne\nnye muligheter når det gjelder det kontaktfelt mellom partene i\narbeidslivet som er dekket av avtalen om retningslinjer for bruk\nav arbeidsstudier. Jeg vil tro det er en svakhet for alle parter\nat tillitsmennene under de nåværende forhold ikke har tilfreds-\nstillende mulighet for selvstendig og kritisk vurdering av mot-\npartens ulike opplegg, og langt mindre har muligheter for å utvikle\negne opplegg som alternativer til motpartens, slik at det kan fore-\nligge reelle valg før partene bindes gjennom formelle vedtak.\nDet ser ut til å være en viktig erfaring fra Samarbeidsprosjekdet:\nLO-NAF at en samarbeidssituasjon har lett for å bli ustabil i den\nutstrekning det ikke er et samarbeid mellom noenlunde jevnbyrdige\nparter som går til samarbeidet på selvstendig grunnlag, med selv-\nstendige målsettinger hvor samarbeidet kan dekke områder hvor\nPost skal adresseres til instituttene, ikke til enkeltpersoner."}, {"year": 1970, "date": "25. juni 1970", "box": "Box 3", "desc": "Page 10 of a Norwegian document discussing a research project (NJMF) about club activities, modernization of planning systems, and club members' work and involvement in organizations, with specific mention of a research project quote from June 25, 1970.", "stem": "IMG_0660", "ocr": "- 10 -\nF'orskerne gikk rett på oppgaven å lage en grunnbok, en lærebok for fag-\nbevegelsen (FR 1, FR 2 og FR 3) istedetfor, på mere tradisjonell måte,\nå foreta undersøkelser om hva NJMF's medlemmer mente og visste om\nmoderne planleggingssystemer, noe som ville konkludert i at det trengtes\nkunnskaper•\nDette visste man på forhånd. Behovet for kunnskaper var\npåtenkt fra NJMF helt fra starten av prosjektet.\nAnalyse av flere av de konkrete oppgaver i NJMF ønsket klarlagt gjennom\nprosjektet, er bygget inn i grunnboken. Dette er en fordel, idet et under-\nvisningsmateriale hos Forbundets medlemmer kan ventes å bli lest med\nstørre intensitet enn hva som ville vært tilfelle med mere tradisjonelt\nutformede forskningsrapporter.\nSærlig i den siste fase av prosjektet, hvor dets utviklingslinjer og profil\nvar klarlagt, ble klubbene ved de fire bedrifter trukket sterkt inn. Isedetfor\nå ha klubbene som referansegrupper, ble de og deres enkelte tillitsmenn\nog medlemmer trukket inn som aktive medarbeidere. Dette er i samsvar\nmed NJMF's ønske. I søknaden til NTNF av 25. juni 1970 heter det:\n\"Forskningsprosjektet vil knyttes nært til dem det angår,\nmedlemmene, klubbene, avdelingene, forbundsledelsen,\nog forutsetter gjensidig opplæring og samarbeid mellom\ndisse leddene og forskerne. Vi vil derfor ha med i prosjektet\n3 - 4 bedriftsklubber foruten vår egen forbundsadministrasjon.\"\nResultatet av klubbenes arbeid består i de fire rapporter FR 4, 5, 6 og 7 og\ni en øket aktivitet i klubbene. Avklaring av klubbenes plass og form for\nmedvirkning i prosjektet tok lang tid og det konkrete arbeidet kom sent i gang.\nDenne svakhet er imidlertid kompensert ved at tidsrammen for prosjaktet\nble noe utvidet. Ved at den vesentligste del av klubbens arbeid kom i\nprosjektets siste fase, oppnådde man på den annen side den fordel at det\nforelå et betydelig større materiale å ta utgangspunkt i.\nKlubbenes egenaktivitet må anses som/meget verdifull del av det samlede\nresultat av prosjektet.\nDet er innhentet erfaringer om forholdet mellom\nforskere og faglige tillitsmenn. Klubbenes innsats i prosjektet vil utvilsomt\nogså virke tilbake på produsenter av styrings- og planleggingssystemer for\nfremtiden.\nKlubbrapportene frembyr både viktige konstruktive forslag og kritiske\nvurderinger. Dette gjenspeiler den arbeidshypotese som synes å ha preget\narbeidet i prosjektet, nemlig at bedriftsledelse og klubb både har motstridende\nog felles interesser på området planlegging, styring og databehandling."}, {"year": 1970, "date": "26. juni 1970", "box": "Box 1", "desc": "A Norwegian typed letter dated 26 June 1970 addressed to the Norwegian Technical-Scientific Research Council in Oslo, discussing research proposals and modern planning methods for a research project.", "stem": "IMG_1108", "ocr": "30-26.\nJB: AM.\n25. juni 2970.\nNorges Teknisk-Naturvitenskapelige Forskningsråd,\nGaustadalléen 30,\nOslo 3.\nSØKNAD OM BIDRAG TIL FORSKNINGSPROSJEKT.\nMed utgangspunkt i vedtak på vårt forbunds landsmøte 1970 og senere vedtak i\nvårt forbundsstyre, ønsker Norsk Jern- og Metallarbeiderforbund å vere aktivt\nmed ved utforming og bruk av moderne planleggingsmetoder i bedriftene.\ninnebærer at vi må få utført forsknings- og utredningsarbeid fra forbundet,\nidet de metoder som nå tas i bruk stort sett tar utgangspunkt i rene privat-\nøkonomiske Lønnsomhetsbetraktninger.\nVi trenger derfor en vurdering av\ndisse metodene ut fra våre medlemmers målsettinger,\nog utvikling av alternative\nplanleggingsmetoder som bedre tar hensyn til våre interesser.\nDen teknologiske utviklingen har i de senere årene ført til at stadig mer\navanserte metoder for planlegging og styring av produksjonen blir tatt i bruk.\nDette skaper for arbeidstakerne og deres tillitsmenn en ny situasjon med hen-\nsyn til kontroll og medvirkning.\nDe moderne planleggingsmetoder brukes til å vurdere\n- omlegginger i bedriftene\n- oppbygging av nye produksjonskjeder\n- styring av produksjonen.\nDet er viktig at våre medlemmers interesser i slike studier blir forsvarlig\nivaretatt, og forbundet ønsker å vere aktivt med i utformingen av fremtidige\nformer for rasjonalisering.\nFor det første må de metoder som brukes trekke inn de sider av arbeidssitua-\nsjonen som berører våre medlemmer. For det annet må vurderingen av de vanlige\nalternativer også foregå ut fra definisjoner av hva som er fordelaktig for\nvåre medlemmer og oppfatninger av hva de ønsker av sin arbeidsplass.\nVi ønsker nå å gjennomføre et forskningsprogram som konkret skal gi 08s:\n2.\nEn oversikt over de viktigste av de planleggingsmetoder som i dag\nbruk i bedrifter som sogner til forbundet, fra de enkle til de mer\navanserte teknikker.\nMetodene må analyseres ut fra hvilke målsettinger\nde gir muligheter for å belyse og hvilke sider av virksomheten de tar i\nbetraktning."}, {"year": 1970, "date": "26. august 1970", "box": "Box 3", "desc": "A letter from Norsk Regnesentral (Norwegian Computing Center) to Norsk Jern- og Metallarbeiderforbund regarding research project note 1, discussing the establishment of a working group and mentioning participants from various Norwegian organizations including Jan Evensmo, Knut Eigsaas, Jan Balstad, Kåre Tanghes, and Knut Lange.", "stem": "IMG_0561", "ocr": "N\nNORSK REGNESEWTRAL I NOEWEGIAN COMPUTINE CENTER\nForskningsun. 1 E; Blindern, Oslo 3, Norway, telefon 46 69 30 Telex 6518\nconsmo\nOslo, 26. august 1970\nNorsk Jern- og Metallarbeiderforbund\nYoungsgt. 11\nOs1o 1\nIR\nNotat nr. 1 til forskningsprosjekt\n1. Opprettelse av en arbeidsgruppe.\nDet daglige arbeid med forskningsprosjektet tenkes utført\nav en arbeidsgruppe der deltakerne forutsettes å ha stadig\nog nær kontakt.\nFra Norsk Regnesentral vil Jan Evensmo delta på heltid\nsamt  bør ta sikte på å utarbeide en rapport med forslag til\nen foreløpig strategi for forbundet på dette området.\nRapporten bør inneholde føigende hovedpunkter:\n1. En vurdering av utviklingen innen området og hvordan\nNJ&M og dets medlemmer blir påvirket.\n2. En analyse av hvilke muligheter NJ&M har for å stille\nkrav i forbindelse med innføring av systemer. Eksempel-\nvis: krav til fleksibilitet, krav til dokumentasjon, krav\nom kontrollorganer med representanter for de ansatte eic.."}, {"year": 1971, "date": "1971", "box": "Box 3", "desc": "Norwegian language document discussing a research project with sections Ad D and Ad E, including a quote from NTNF about a research program, mentions of Olav Bergo, and references to workplace psychology and analysis of planning systems.", "stem": "IMG_0649", "ocr": "- 3 -\nOmrådet egner seg godt til et avgrenset delprosjekt. Det\nforeslås at Tangnes og Løver med god kontakt til de andre\nprosjektdeltagere arbeider med dette, og at det lages en\nrapport innen utgangen av 1971.\nAd D\nDet arbeidet som er gjort og som forestår i forbindelse med\nutarbeidelse av databehandlings- og styringskurs for AOF\nligger nært inntil forbundets forskningsprosjekt. Utvik-\nlingen av begreper og modeller for kommunikasjon og illu-\nstrasjon av sentrale problemstillinger for fagbevegelsen\nansees verdifullt. Et verkstedlaboratorium vil kunne være\nen måte å gripe dette an på.\nAd E\nSøknaden til NTNF sier:\n\"Vi ønsker å gjennomføre et forskningsprogram som konkret\nskal gi oss:\nEn kartlegging av målsettingene til forbundets medlemmer i\nrelasjon til\n- den enkeltes arbeidssituasjon\n- bedriften og dens utvikling\n- bedriftens samspill med samfunnet omkring\n- tillitsmannsapparatets arbeidssituasjon.\"\nSelv om arbeidet med dette er langsiktig og bør knyttes til\nerfaringer ved analyse av eksisterende planleggingssystemer,\nvil det likevel foreløpig egne seg som et delprosjekt. Det\ner ønskelig at en forsker fra Arbeidspsykologisk Institutt\nkny \nfire bedriftsklubber.\nnei fon\nSam\n2112\nvinit\"\n') 197\nid.\nthe\nWor\nplied for Univ"}, {"year": 1971, "date": "1971", "box": "Box 3", "desc": "A Norwegian-language document discussing project work and methodology, with handwritten annotations in the margins, referencing a 'Strategirapporten' from January 1971 and describing work procedures and data handling practices.", "stem": "IMG_0659", "ocr": "- 9 -\ndisse spørsmålene. Tidligere nølte en i bedriftsledelsen med å ta opp disse\nsakene med klubben, fordi dens holdning og synspunkter kunne skifte fra dag\ntil dag, avhengig av hvor skoen trykket i øyeblikket.\nDet er like klart at det tidkrevende arbeid med det teoretiske stoffet, som\nførte til at aktiviteten i klubbene ble utført relativt sent i forskningsperioden,\nhar gitt et materiale som er en nødvendig forutsetning for den aktiviteten\nsom er skapt.\nDette presiseres av de tillitsmenn som har arbeidet direkte\ni prosjektene.\nOm balansen mellom de enkelte delei i rapportene kan det være delte meninger.\nEnkelte deler av rapporten kan synes unødvendig detaljert, slik som i detaljene\nnår det gjelder dataspråk, mens andre deler er mer overflatisk behandlet, som\nnår det gjelder en prinsipiell analyse av de partssynspunkter og de ubevisste\nbindingene som legges inn i de datastyrte planleggingssystemene når de ut-\nformes av konsulenter som er vant til å tjene næringslivets ledere.\nEn mer spesifik behandling av lønnsproblematikken kan også savnes. Dette\nspørsmålet kan en imidlertid på teoretisk grunnlag ikke komme særlig langt\nmed, slik at det må bli et resultat av det praktiske arbeidet i forsøksklubbene\nom en her kan komme frem med nye resultater. Kommentarer til lønns-\nproblematikken finnes likevel rundt om i de enkelte rapportene.\nAlt i alt viser denne gjennomgangen\nat det i liten grad er skjedd forskyvninger\ni prosjektmålene i forhold til forskningsprogrammet. Komitéen vil likevel\ntrekke frem en del synspunkter som tar sikte på å plasere pro ha nytte av de fantastisk\nhøye hastighetene er at datamaskinen får beskjed om hva\nden skal gjøre like raskt som den selv gjør unna grunn-\noperasjonene. Dette krever at hele arbeidsprogrammet\nfor et gitt oppdrag foreligger tilgjengelig i data-\nmaskinen når utførelsen skal finne sted. Programmet\nlagres i datamaskinens lager sammen med de data som\ninngår i oppdragets løsning."}, {"year": 1972, "date": "1972", "box": "Del I", "desc": "A Norwegian document page (numbered 156) describing work training programs and activities within business clubs, including a bedriftspolitisk handling program initiated by A/S Hydraulik Brattvåg in May 1972.", "stem": "IMG_2464", "ocr": "- 156 -\n4.5 Eksempler på utredningsarbeid innen bedriftsklubser.\nDet arbeid som nå pågår i de fire bedriftsklubbene som ex\nknyttet til NJMF's forskningsprosjekt, kan gi nyttige er-\nfaringen for andre klubber. Som nevnt i avsnitt 4.3 er cet\nmeget viktig at slike erfaringer raskt blir formidlet til\nandre ledd i fagbevegelsen. Derfor vil vi gjengi en del av\ndet som er hendt i klubbene, selv om arbeidet der fortsetter.\nSlik arbeidet i prosjektet utviklet seg, var forutsetningene\nfor en mer omfattende innsats fra klubbenes side først til\nstede etten at strategi-rapporten (Arbeidsrapport nr. 1) og\ngrunnboka (Arbeidsrapport nr. 2) var ferdige, d.v.s. våren\n1972.\n4.5.1\nEt bedriftspolitisk handlingsprogram.\nEt klubbmøte på A/S Hydraulik, Brattvåg i mai 1972 gjorde det\nklart at klubbens største problem innen området planlegging\nvar at klubben selv manglet gjennomtenkte planer for sin egen\nvirksomhet. Spesielt gjaldt dette for de nye oppgavene som\nblir aktuelle ved styredeltakelse og representasjon i den nye\nbedriftsforsamlingen. Det ble besluttet å koble sammen\nstudiet av grunnboka med et programarbeid for klubben.\nEtter en del diskusjoner i juni, startet arbeidet for alvor\ni juli med et helgekurs på en turisthytte nær Brattvåg.\nCa. 12-14 fra klubben deltok sammen med forskerne fra NR,\nfra fredag ettermiddag til søndag middag. I Iøpet av ca.\n22 timers arbeid ble de viktigste sidene av program-opplegget\ngjennomdiskutert og en arbeidsplan fastlagt.\nFra august kom over tyve medlemmer, fordelt på tre arbeids-\ngrupper,i gang med samtidig studievirksomhet og programarbeid.\nGjennom hele høsten og vinteren hadde gruppene møter minst hver\nfjortende dag, ofte hver uke. Arbeidsoppgavene ble systematisk\ngjennomdiskutert, og medlemmene fikk i oppdrag å skrive arbeids-\nnotater til neste møte."}, {"year": 1972, "date": "1972", "box": "Del I", "desc": "A Norwegian language document from page 158 discussing work group activities, October seminar planning, December 1972 club visit, and a January/February 1973 research cooperation meeting regarding a business democracy report on Hydraulik (A/S Hydraulik, Brattvåg).", "stem": "IMG_2466", "ocr": "- 158 -\nUt over høsten begynte arbeidet med rapporten å gå i stå,\nselv om motivering og innsatsvilje van høy i alle arbeids-\ngruppene. Diskusjonene i gruppene gikk \"i ring\". Nå var\ndet behov for\nmer kunnskap og nye impulser om en skulle\nkomme videre.\nPå oktober-seminaret ble derfor mye tid avsatt til foreles-\nninger - i hovedsak innen området planlegging og styring.\nEn del av tida ble også brukt til å fortsette diskusjonen\nfra juli om klubb-rapportens innhold. Som i juli, var det\nbehov for forskernes hjelp i tilretteleggingen av stoffet.\nDen mer detaljerte disposisjonen som nå ble utarbeidet, var\nen utdyping av den tidligere. Den ble, med små endringer\nbrukt i den endelige rapporten.\nI desember 1972 ble klubben igjen besøkt, og arbeidet med å\nstudere bedriftens produksjonsplanlegging ble påbegynt.\nI månedsskiftet januar/februar var begge forskerne oppover\nog samarbeidet med arbeidsgruppene om den endelige redigeringen\nav klubbens rapport. Rapporten ble lagt til grunn for et\nforslag fra NJMF til alle, klubbene som skulle velge repre-\nsentanter til styrer og bedriftsforsamlinger. Materiale fra\nrapporten blir nå innarbeidet i AOF's studieopplegg om\nbedriftsdemokrati.\nTittelen på Hydraulik-rapporten (Forskningsrapport nr. 7)\ner \"Bedriftspolitisk handlingsprogram for Bedriftsklubben\nved A/S Hydraulik, Brattvåg.\" Innholdsfortegnelsen skal\ngjengis her, siden den gir en god oversikt over stoffet\nsom behandles og hvordan det er ordnet. (Også side-tallene\ner tatt med for å vise omfanget av de ulike avsnittene.)"}, {"year": 1972, "date": "1972", "box": "Databehandling, Planlegging og Styring – Del i", "desc": "Norwegian typewritten document discussing academic contributions from Ole-Johan Dahl at University of Oslo and Graham Birtwistle at University of Bradford, with chapters written by Håvard Hegna, Olav Terje Bergo, and Jon Bing, mentioning illustrations by Svein Aarset and graphic design by Norges Teknisk Naturvitenskapelige Forskningsråd, and referencing a May 1972 work report.", "stem": "IMG_3057", "ocr": "Ole-Johan Dahl ved Universitetet i Os10 og Graham Birtwistle\nsom den gang arbeidet ved Norsk Regnesentral. (Han er nå ved\nUniversitetet i Bradford, England.) Kapittel 6 er skrevet\nav Håvard Hegna, kapittel 7 av Olav Terje Bergo, begge\narbeider ved Norsk Regnesentral. Kapittel 8 og vedlegget\ner skrevet av Jon Bing ved Institutt for privatrett, Uni-\nversitet i Oslo. De skal alle ha takk for sine bidrag.\nSvein Aarset ved Grafisk kontor, Norges Teknisk Naturviten-\nskapelige Forskningsråd, har tegnet illustrasjonene etter\negne og felles idéer.\nOlav Terje Bergo har vert forfatterens nærmeste medarbeider\ni forskningsprosjektet og har betydd svært meget for hvor-\ndan boka er blitt. Verdifulle kommentarer er også kommet\nfra alle dem som har brukt boka etter at den kom i foreløpig\nutgave i mai 1972 (som Arbeidsrapport nr. 2): deltakere\npå en lang rekke kurs i fagbevegelsen, medlemmer i de fire\nbedriftsklubbene som har vært med i forskningsprosjektet."}, {"year": 1972, "date": "1972", "box": "Forskningsrapport Nr. 7", "desc": "A Norwegian typewritten page (page 121) discussing an EDB-course and work groups from July 1972, detailing three work assignments (Kravene til arbeidsplassen, Bedriftens forhold til omverdenen, and Klubbens arbeid) and group activities related to organizational structure and discussions.", "stem": "IMG_3100", "ocr": "- 121 -\nSamtidig sendte vi folk på EDB-kurs hvor nettopp de to nevnte\nbøkene var kursets opplegg og må ses i sammenheng med prosjektet.\nVi hadde i denne tiden et nært samarbeid med forskerne om\nhvorledes det videre arbeid skulle legges opp. Våren 1972\nbestemte vi oss for å opprette arbeidsgrupper til å arbeide\nmed vår oppgave, et handlingsprogram for klubben.\nI denne forbindelse var det avholdt et helgeseminar på\nØrskogfjellet den 7.-9. juli 1972 som var starten til ut-\nformingen av rapporten hvor vi diskuterte opplegg og for-\ndeling av arbeidsoppgavene. Det ble nedsatt tre arbeids-\ngrupper, hver på 7 mann, som igjen fikk hver sin oppgave\nfordelt på emnene:\n- Kravene til arbeidsplassen\n- Pedriftens forhold til omverdnen\n- Klubbens arbeid\nGr. I\nH.R.\nGr. II O.D.\nGr. III R.D.\nDisse tre oppgavene er oppdelt i mange deloppgaver. Vi skal.\nikke her spesifisere hver enkelt deloppgave. Vi skal isteden\nta for oss klubben og den måte prosjektet organisasjonsmessig\nog faglig grep inn i klubbens virksomhet.\nGruppen var da sammensatt dels av egne interesseområder for\nå få den rette mann nå den rette plass, dels for å få de\nfleste avdelingene representert. Det var dessuten en eller\nflere tidligere eller nåværende tillitsmenn i hver arbeids-\ngruppe.\nDe tre gruppelederne pluss klubbformann og en ringleder\ndannet styringskomitëen. Gruppene hadde møte en gang i uken.\nDet ble arbeidet på følgende måte: Vi diskuterte på møtet\net emne f.eks. lønn og lønnssystem på den måte at vi noterte\nned stikkord og diskuterte godt igjennom emne. Vi hadde da\ndette emne i hjemmelekse til neste uke. For å få så bred\ndebatt som mulig om dette brukte vi å få i gang en diskusjon"}, {"year": 1972, "date": "1972", "box": "Forskningsrapport Nr. 7", "desc": "A Norwegian typewritten report page discussing fire safety club activities, planning, data handling, and various organizational matters related to A/S Hydraulik and workplace safety initiatives.", "stem": "IMG_3118", "ocr": "128 B\n- 127 ~\nfire bedriftsklubber. Dette viste seg å være en riktig\nbeslutning - det var først og fremst diskusjonene med\nklubbene og med NJMF's forbundsstyre som i tide fikk pro-\nsjektet over i riktig spor. Våre hovedtanker fra denne\nfasen er nedfelt i Arbeidsrapport nr. 1. Den er senere om-\nskrevet og foreligger nå under tittelen: Forskningsrapport\nnr. 1: \"Planlegging, styring og databehandling - forslag\ntil strategi for fagbevegelsen\". Neste skritt i arbeidet\nble Arbeidsrapport nr. 2: \"Databehandling, styring og plan-\nlegging - grunnbok for fagbevegelsen\". Først da den lå ferdig\nkunne vi for alvor gå inn i samarbeid med klubbene.\nKlubben ved A/S Hydraulik var den første av klubbene som så\nmulighetene i et slikt samarbeid. Allerede i mai 1972\nhadde den formulert sin egen arbeidsoppgave i prosjektet.\nVi hadde opprinnelig regnet med at arbeidsoppgavene skulle\nligge innen rammen av bedriftens planlegging, styring og\ndatabehandling. Klubben ønsket imidlertid å bryte denne\nrammen og ta opp sin egen virksomhet til systematisk gjennom-\ndrøfting og planlegging. Utgangspunktet for arbeidsoppgavene\nmåtte være det klubben selv oppfattet som vesentlig, og vi\ngikk in i et samarbeid om arbeidsoppgaver. (Ved nærmere\nettertanke er selvsagt klubbens planlegging, styring og\ndatabehandling en viktig del av bedriftens virksomhet.)\nEtter innledende drøftinger hadde vi den første omfattende\ngjennomdrøftingen på en helgekonferanse i begynnelsen av\njuli. Resultatet av denne konferansen er summert opp i en\negen rapport (upublisert). Vi samlet oss om å\n- ordne de problemene som skulle studeres\ndisposisjon,\ni en\n- diskutere hvordan klubbens arbeid med prosjektet\nburde organiseres."}, {"year": 1972, "date": "1972", "box": "Forskningsrapport Nr. 7", "desc": "Norwegian-language typed document discussing conclusions and perspectives on club work, mentioning involvement with a club's activities from summer 1972 onwards, investment in training programs, and contact with Norwegian Research Council (Norsk Forskningsråd).", "stem": "IMG_3127", "ocr": "- 131 -\n9. -\nKONKLUSJONER OG PERSPEKTIVER\nVi har 1 denne tiden lagt ned\net stort arbeid i dette pro-\nsjektet fra klubbens side. 20-25 mann har vart 1øpende\nengasjert med møter en gang i uken siden sonmeren 1972 og\nhar arbeidet selvstendig mellom møtene. Det har vaert et\nrekke konferanser og klubbmøter hvor flere har vært trukket\ninn•\nDette er derfor en stor investering fra klubbens side.\nlikeledes er det klart at dette arbeidet har vart en viss\nbelastning for bedriften. Ved flere anledninger har det\nvært nødvendig å lente folk ut for å arbeide med prosjektet\ni arbeidstiden. Delvis har dette vært folk som har stått\ni NC hvor maskinstans er temmelig kostbart.\nKlubben har imidlertid vært villig til å investere dette i\narbeidet med et bedriftspolitisk handlingsprogram og når\nalle resultatene summeres opp mener vi å ha fått lønn for\nstrevet.\nKlubben har lært mye i løpet av dette arbeidet, vi har\nallerede oppnådd resultater som forbedrer vår arbeidsplass,\nvi har fått flere medlemmer og vi har fått flere aktive.\nForholdet til hedriftsledelsen er også bedret i denne tiden.\nEndelig har vi et program som vil være absolutt nødvendig\nnår vi nå skal inn i styre og bedriftsforsamling.\nNå føler vi et ansvar overfor forbundet for å bruke de\nkunnskapene vi har bygget opp i klubben i løpet av prosjektet\npå en slik måte at det kommer forbundet og fagbevegelsen\nfor øvrig til nytte. Samtidig er vi klar over at vår\narbeidsform og våre kunnskaper vil falle tilbake i det gamle\nsporet dersom vi nå ikke følger opp prosjektet og bruker det\nvi har lært. Vi ønsker derfor også å bruke forskning som en\ndel av vårt arbeid også i framtida. Ikke bare Norsk Regne-\nsentral, men også andre forskningsmiljøer vil vi gjerne ha\nen kontakt med."}, {"year": 1972, "date": "1972", "box": "Forskningsrapport Nr. 8", "desc": "Norwegian text document (page 12) discussing organizational strategy reports and working conditions in clubs, referencing Arbeidsrapport nr. 1 and 2, with mentions of summer 1972 and four enterprises' reports in collaboration with NR's clubs.", "stem": "IMG_3132 2", "ocr": "- 12 -\n(Etter at: hovedarbeidet var gjort, fikk vi se forslaget til\nnorske faguttrykk i Olav B. Brusdals og Arne Lyses verdi-\nfulle ordliste \"Dataterminologi\". Vi kunne konstatere at vi\nstort sett lå på linje med dens ordvalg der den inneholder\nord som vi har hatt bruk for i vår framstilling).\nVi har også sett at ord og begreper som fagbevegelsen vil\ntrenge, rett og slett ikke har foreligget og nå må utvikles.\nAndre ord og begreper som er i bruk er ikke vurdert og til-\npasset til fagbevegelsens bruk.\nSelve framstillingsformen - måten å legge fram stoffet på -\ner også vesentlig for hvordan lesernes holdning til stoffet\ndannes. Det finnes autoritære og det finnes demokratiske\nog frigjørende framstillingsformer. Det dreier seg her ikke\nom hva som sies, men om framstillingen gir oversikt, om den\nskaper en kritisk og selvkritisk holdning, om den lærer folk\nå velge og bruke ord og begreper som redskap for å forstå\nsin egen situasjon og for å kunne handle med større virkning.\nVi regner våre forsøk i denne sammenhengen som en viktig del\nav forskningsprosjektet.\"\nMed strategi-rapporten (Arbeidsrapport nr. l) og grunnboka\n(Arbeidsrapport nr. 2) var grunnlaget lagt for at arbeidet\nkunne komme i gang i klubbene. Ut fra vår definisjon av\nhva et \"resultat\" skal være, var det naturlig å bruke den\navsluttende fasen av prosjektet til å la klubbene få prøve\ni praksis den arbeidsformen vi mener må bli vanlig i framtida:\n- at klubbene selv utreder sine viktige problemer innen\nbedriften og i bedriftens forhold til omverdenen, cz\nat de i dette arbeidet trekker både på fagfolk utenfra\nOg På personale og andre ressurser som bedriften kan\nstille til rådighet.\nFra sommeren og høsten 1972 arbeidet derfor de fire bedrifts-\nklubbere med å lage hver sin rapport i samarbeid med NR's"}, {"year": 1972, "date": "1972", "box": "Forskningsrapport Nr. 8", "desc": "Norwegian project report discussing data processing, planning and styling, with references to work reports and organizational procedures related to 'Fagbevegelsen' (the labor movement).", "stem": "IMG_3134", "ocr": "- 11 -\nEn slik definisjon av begrepet \"resultat\" ble selvsagt valgt\nfordi den skulle medvirke\ntil å styre resten av prosjekt-\narbeidet i den retning vi ønsket.\nArbeidsrapport nr. 1 inneholder også de handlingseksemplene\nsom er gjengitt i forrige avsnitt (1.2), foruten den første\nutgaven av avsnittene i kapittel 4, \"Hva kan fagbevegelsen\ngjøre\", i FR-1.\nEn vesentlig del\nav prosjektarbeidet besto i å bygge opp kunn-\nskaper om databehandling, planlegging og styring sett ut fra\nde fagorganisertes synspunkter, og å formidle disse kunnskapene\nved å lage egnet undervisningsmateriale.\nStrategien som ble foreslått i Arbeidsrapport nr. 1 forut-\nsatte handlinger som øyeblikkelig ville skape behov for kunn-\nskaper. Det ble derfor nødvendig å la Arbeidsrapport nr. 2\nbii en lærebok: \"Databehandling, planlegging og styring.\nGrunnbok for fagbevegelsen\" (mai 1972).\nArbeidsrapport nr. 2 består av 2 bind:\n\"Del I: Databehandling, systemer\nog språk\" og Del II:\n\"Planlegging og Styring\". Det er Arbeidsrapport nr. 2 som\nforeligger i bearbeidet form i denne boka (se forordet).\nOm opplegget av rapporten sies det i innledningen:\n\"Vi har sett det som en nødvendig og viktig del av prosjektet\nå skape en framstilling av stoffet på norsk, og i en form som\ndyktige folk uten høyere utdannelse fullt ut kan forstå. Denne\ndel av arbeidet har krevet tid, blant annei fordi det her ikke\ndreier seg om enkelte ord eller om en popularisering som inne-\nbærer en forflatning eller forenkling av stoffet. Vi ønsker\nå formidle alle de vesentlige sider av stoffet, slik det\netter vår oppfatning burde undervises ved såkalte høyere lære-\nanstalter.\nVi har iallfall selv lært meget av dette arbeidet\nved at mange begreper har fått. et klarere innhold for oss\nunder forsøkene på å kle dem i norsk språkdrakt."}, {"year": 1972, "date": "1972", "box": "G – L06", "desc": "A Norwegian letter or memorandum from 1972 discussing the background of an appointment or assignment from summer 1871 through 1971, signed by Drude Berntsen (institutsjef) and addressed to Kristen Nygaard (forskningsjef).", "stem": "IMG_3173 2", "ocr": "4.\nVi mener det er rimelig å vurdere omfanget av innsatsen i\n1972 på bakgrunn av erfaringene fram til sommeren 1971. Går\noppdraget godt, bør rammen for 1972 utvides i forhold til 1971.\nVi håper at vi med dette har gitt forbundet de opplysninger\nsom var ønsket og ser fram til et interessant samarbeid.\nVennlig hilsen\nmide Bentsen\nDrude Berntsen\ninstituttsjef\nKristen Nygaard\nforskningssjef\nItak i\naktivt\nDette\nlet,\nvat-\nnative\nкик.\nen-"}, {"year": 1972, "date": "1972", "box": "G – L06", "desc": "A typed Norwegian document discussing research project work and collaboration between clubs, mentioning Norsk Regnesentral and work groups established in 1970-71 and 1972.", "stem": "IMG_3214", "ocr": "både av tillitsmenn og medlemmer som hittil hadde vært\nmindre aktive, gıkk gjennom det stoffet som finnes i\nForskningsrapport nr. 1. Samtidig arbeidet de med å\nanalysere og danne seg meninger om den utredningsoppgaven\nde skulle løse. Forskerne hjalp til med undervisning\ni utvalgte deler av stoffet, ved å svare på spørsmål og å\ngi utfyllende opplysninger.\nDessuten hjalp forskerne til med å legge til rette utred-\nningsarbeidet, skrev enkelte avsnitt i klubbenes rapporter,\nog var med i diskusjoner. Hovedmengden av stoffet ble\nført i pennen av arbeidsgruppene.\nVår klubb kom noe sent i gang, og denne rapporten legger\nfram foreløpige synspunkter til diskusjon i gruppene.\n1.4 Arbeidet til nå med prosjektet.\nVerkstedklubben på NEBB er en av de fire klubbene som ble\ntatt ut til å være med på forskningsprosjektet. I 1970-71\nble det satt ned et samarbeidsutvalg blant de fire klubbene\ni forskningsprosjektet. Dette utvalget hadde flere møter.\nDet har også blitt diskutert i tidsstudietillitsmannsgruppa\nog andre organer innen klubben.\nHøsten 1972 ble det i samarbeid med forskerne fra Norsk\nRegnesentral bestent at vi skulle sette ned arbeidsgrupper.\nVi fikk samlet 25 personer som ble fordelt i tre grupper\nsammensatt av lokale og sentrale tillitsmenn samt andre\nmedlemmer av klubben.\nDisse gruppene fikk hver sine oppgaver. Den ene gruppa\nskulle ta for seg planleggingsystemene på bedriften og\nstille krav til disse. Den andre skulle ta for seg kravet"}, {"year": 1972, "date": "1972", "box": "Box 3", "desc": "A Norwegian letter or document from 1972 concerning immigration matters and administrative procedures, addressed to Oslo with official letterhead and formal correspondence.", "stem": "IMG_0531", "ocr": "Kopi:\nBergo\nNygaard\nArkiv\nOs1o, 29. desember 1972\nForsker Solstrand\nForsvarets Forskningsinstitutt\n2007\nKjeller.\nI samsvar med samtale med Høgberg i OA-foreningen over-\nsender jeg forslag til tittel og en kort forklarende tekst\nfor møtet 22. mars:\n\"Databehandling, planlegging og styring - forskning for\nfagbevegelsen\"\nSekretar Jan Balstad, Norsk Jern- og Metallarbeiderforbund,\nforskningssjef Kristen Nygaard og forsker Olav Terje Bergo,\nNorsk Regnesentral.\nRedegjørelse:\n\"I 1970 tok Norsk Jern- og Metallarbeiderforbund opp sam-\narbeid med NR for å klarlegge farer og muligheter for\nFagbevegelsen på området databehandling, planlegging og\nSiden dette er et nytt fagområde for fag-\nbevegelsen er det fra NR's side lagt stor vekt på kun
